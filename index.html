<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro - Elite Edition</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a25;
  --accent-primary: #1db954;
  --accent-glow: rgba(29, 185, 84, 0.3);
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --border-color: rgba(255, 255, 255, 0.1);
  --glass-bg: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;
  --note-color: #ffffff;
}

body.performance-mode {
  --bg-primary: #050000;
  --accent-primary: #ff3e3e;
  --accent-glow: rgba(255, 62, 62, 0.4);
  background: var(--bg-primary);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; transition: 0.4s ease; overflow-x: hidden; }

/* HEADER */
.app-header { background: rgba(18,18,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); padding: 15px 20px; position: sticky; top: 0; z-index: 1000; }
.header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; position: relative; }

/* MENU */
.menu-container { position: relative; }
.menu-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; }
.dropdown-menu { 
  position: absolute; top: 45px; right: 0; 
  background: rgba(20, 20, 30, 0.95); backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border); border-radius: var(--radius-lg); 
  width: 200px; display: none; flex-direction: column; z-index: 2000; box-shadow: 0 15px 35px rgba(0,0,0,0.8); overflow: hidden;
}
.dropdown-menu.show { display: flex; }
.menu-item { padding: 14px 18px; color: rgba(255,255,255,0.8); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border-bottom: 1px solid var(--glass-border); transition: 0.2s; }
.menu-item:hover { background: rgba(255,255,255,0.05); color: var(--accent-primary); }
.menu-item.danger { color: #ff4d4d; }

/* BOTÃO SALVAR */
.btn-save-vitro {
    position: fixed; bottom: 30px; left: 20px; z-index: 900;
    background: var(--glass-bg); backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border); color: rgba(255, 255, 255, 0.4);
    padding: 10px 20px; border-radius: var(--radius-full);
    cursor: pointer; font-weight: 500; font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; transition: 0.4s;
}

/* LAYOUT */
.main-layout { display: grid; grid-template-columns: 280px 1fr 300px; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; padding: 20px; }

@media (max-width: 1100px) {
    .main-layout { grid-template-columns: 1fr; }
}

/* SIDE PANEL */
.side-panel { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); height: fit-content; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; }
.panel-header { padding: 15px; border-bottom: 1px solid var(--border-color); font-weight: 800; font-size: 13px; text-transform: uppercase; color: var(--accent-primary); display: flex; }

/* NOTAS */
.toolbar-central { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
.tool-group { display: flex; align-items: center; gap: 15px; background: var(--bg-secondary); padding: 8px 20px; border-radius: 50px; border: 1px solid var(--border-color); }
.section-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
.song-part { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 15px; border-left: 5px solid var(--accent-primary); margin-bottom: 15px; }
.chord-area { font-family: 'Monaco', monospace; font-size: 19px; font-weight: 700; color: var(--note-color); background: none; border: none; width: 100%; resize: none; outline: none; margin-top: 10px; line-height: 1.4; }

/* METRONOMO */
.metronome-card { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); padding: 20px; text-align: center; position: sticky; top: 100px; }
.bpm-val { font-size: 56px; font-weight: 800; color: var(--accent-primary); }

/* PERFORMANCE MODE */
body.performance-mode .btn-save-vitro, body.performance-mode .app-header, body.performance-mode .side-panel, body.performance-mode .metronome-card, body.performance-mode .toolbar-central { display: none !important; }
body.performance-mode .main-layout { grid-template-columns: 1fr; padding: 100px 10%; }
body.performance-mode .chord-area { font-size: 48px; pointer-events: none; }
</style>
</head>
<body id="app-body">

<header class="app-header">
  <div class="header-content">
    <h1>Map Music <span style="color:var(--accent-primary)">Pro</span></h1>
    <div class="menu-container">
        <button onclick="toggleMenu(event)" class="menu-btn">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
        <div id="m-drop" class="dropdown-menu">
            <div class="menu-item" onclick="togglePerformance()">Modo Performance</div>
            <div class="menu-item" onclick="exportData()">Exportar Backup</div>
            <div class="menu-item" onclick="importData()">Importar Backup</div>
            <div class="menu-item danger" onclick="resetSection()">Limpar Seção</div>
        </div>
    </div>
  </div>
</header>

<div class="main-layout">
  <aside class="side-panel">
    <div class="panel-header">Setlist <span id="song-count" style="margin-left:auto; opacity:0.5;">0</span></div>
    <div class="song-list" id="song-list">
        <!-- Lista de músicas aqui -->
    </div>
  </aside>

  <main class="notes-section">
    <div class="toolbar-central">
        <div class="tool-group">
            <span style="font-size: 10px; font-weight: 900; color: var(--accent-primary);">TOM</span>
            <button onclick="transposeAll(-1)" style="background:none; border:none; color:#fff; cursor:pointer; font-size:18px;">-</button>
            <span id="trans-val" style="font-weight: 800; min-width: 20px; text-align: center;">0</span>
            <button onclick="transposeAll(1)" style="background:none; border:none; color:#fff; cursor:pointer; font-size:18px;">+</button>
        </div>
        <button onclick="addPart()" style="background:var(--accent-primary); border:none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer;">+ Adicionar Parte</button>
    </div>

    <div id="sections-container" class="section-grid">
        <div class="song-part">
            <input type="text" placeholder="Nome da Parte (ex: Intro)" style="background:none; border:none; color:var(--accent-primary); font-weight:bold; outline:none;">
            <textarea class="chord-area" placeholder="C G Am F"></textarea>
        </div>
    </div>
  </main>

  <div class="metronome-card">
    <div style="font-size: 10px; font-weight: 900; opacity: 0.5; letter-spacing: 2px;">METRÔNOMO</div>
    <div class="bpm-val" id="bpm-display">120</div>
    <input type="range" min="40" max="250" value="120" style="width:100%; accent-color:var(--accent-primary);" oninput="updateBPM(this.value)">
  </div>
</div>

<button class="btn-save-vitro" onclick="saveData()">Salvar Projeto</button>

<script>
// --- LÓGICA DE TRANSPOSIÇÃO ---
const CHROMATIC_SCALE = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

function shiftNote(note, semitones) {
    const flats = { 'Db': 'C#', 'Eb': 'D#', 'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#' };
    let normalizedNote = flats[note] || note;
    let index = CHROMATIC_SCALE.indexOf(normalizedNote);
    if (index === -1) return note;
    let newIndex = (index + semitones) % 12;
    if (newIndex < 0) newIndex += 12;
    return CHROMATIC_SCALE[newIndex];
}

function transposeAll(semitones) {
    const transElement = document.getElementById('trans-val');
    transElement.innerText = parseInt(transElement.innerText) + semitones;

    document.querySelectorAll('.chord-area').forEach(area => {
        const chordRegex = /[A-G][#b]?/g;
        area.value = area.value.replace(chordRegex, (match) => shiftNote(match, semitones));
    });
}

// --- INTERFACE ---
function toggleMenu(e) {
    e.stopPropagation();
    document.getElementById('m-drop').classList.toggle('show');
}

window.onclick = () => document.getElementById('m-drop').classList.remove('show');

function updateBPM(val) {
    document.getElementById('bpm-display').innerText = val;
}

function togglePerformance() {
    document.body.classList.toggle('performance-mode');
}

function addPart() {
    const container = document.getElementById('sections-container');
    const newPart = document.createElement('div');
    newPart.className = 'song-part';
    newPart.innerHTML = `
        <input type="text" placeholder="Parte" style="background:none; border:none; color:var(--accent-primary); font-weight:bold; outline:none;">
        <textarea class="chord-area" placeholder="Acordes..."></textarea>
    `;
    container.appendChild(newPart);
}

function saveData() {
    alert("Projeto salvo localmente!");
}
</script>

</body>
</html>

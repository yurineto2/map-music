<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Map Music Pro - Professional Edition</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">

    <style>
        /* ============================================
           DESIGN SYSTEM & VARS
           ============================================ */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-elevated: #242433;
            --accent-primary: #1db954;
            --accent-glow: rgba(29, 185, 84, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #6a6a6a;
            --border-color: rgba(255, 255, 255, 0.1);
            --radius-md: 8px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --space-md: 16px;
            --space-lg: 24px;
            --transition-base: 250ms ease;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; /* Remove brilho azul no toque mobile */
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none; /* Evita seleção de texto acidental ao clicar rápido */
        }

        /* ============================================
           LAYOUT RESPONSIVO
           ============================================ */
        .app-header {
            background: rgba(18, 18, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: var(--space-md) var(--space-lg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 35px; height: 35px;
            background: linear-gradient(135deg, var(--accent-primary), #1ed760);
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: #000;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--space-lg);
        }

        /* ============================================
           METRONOMO ADAPTÁVEL
           ============================================ */
        .metronome-panel {
            background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: var(--space-lg);
            text-align: center;
        }

        .metronome-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
            flex-wrap: wrap; /* Permite quebrar linha no mobile */
        }

        /* Círculo de BPM */
        .bpm-circle-display {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .bpm-circle-svg {
            position: absolute;
            width: 100%; height: 100%;
            transform: rotate(-90deg);
        }

        .bpm-value {
            font-size: 52px;
            font-weight: 800;
            color: var(--accent-primary);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        /* Controles de Toque (Grandes para Mobile) */
        .touch-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-control {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            color: white;
            padding: 15px 25px;
            border-radius: var(--radius-md);
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
            min-width: 60px;
            transition: transform 0.1s;
        }

        .btn-control:active {
            transform: scale(0.95);
            background: var(--accent-primary);
        }

        .btn-main {
            background: var(--accent-primary);
            color: black;
            width: 100%;
            max-width: 300px;
            padding: 18px;
            border-radius: var(--radius-full);
            font-weight: 800;
            text-transform: uppercase;
            border: none;
            margin-top: 25px;
            font-size: 16px;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* ============================================
           MEDIA QUERIES (A MÁGICA DA RESPONSIVIDADE)
           ============================================ */

        /* Tablets */
        @media (max-width: 1024px) {
            .app-container { padding: var(--space-md); }
            .metronome-display { gap: 20px; }
        }

        /* Mobile Smartphones */
        @media (max-width: 768px) {
            .logo-subtitle { display: none; }
            .metronome-display { flex-direction: column; } /* Empilha os elementos */
            
            .bpm-circle-display {
                width: 160px;
                height: 160px;
            }

            .bpm-value { font-size: 44px; }
            
            .btn-control {
                padding: 20px 30px; /* Botões ainda maiores para o polegar */
                font-size: 22px;
            }
        }

        /* Telas muito pequenas (iPhone SE, etc) */
        @media (max-width: 380px) {
            .bpm-circle-display { width: 140px; height: 140px; }
            .bpm-value { font-size: 38px; }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">M</div>
                <div>
                    <h1 class="logo-text">Map Music Pro</h1>
                    <p class="logo-subtitle">Professional Edition</p>
                </div>
            </div>
        </div>
    </header>

    <main class="app-container">
        <section class="metronome-panel">
            <div class="metronome-header">
                <span class="metronome-title">METRÔNOMO</span>
                <span class="metronome-badge">LIVE</span>
            </div>

            <div class="metronome-display">
                <!-- Circular BPM Display -->
                <div class="bpm-circle-display">
                    <svg class="bpm-circle-svg" viewBox="0 0 100 100">
                        <circle class="bpm-circle-bg" cx="50" cy="50" r="45" fill="none" stroke="#242433" stroke-width="5" />
                        <circle id="progress-circle" cx="50" cy="50" r="45" fill="none" stroke="#1db954" stroke-width="5" 
                                stroke-dasharray="283" stroke-dashoffset="70" stroke-linecap="round" />
                    </svg>
                    <div class="bpm-value" id="bpm-display">120</div>
                    <div style="font-size: 10px; color: var(--text-muted); letter-spacing: 2px;">BPM</div>
                </div>
            </div>

            <!-- Controles amigáveis ao toque -->
            <div class="touch-controls">
                <button class="btn-control" onclick="adjustBpm(-5)">-5</button>
                <button class="btn-control" onclick="adjustBpm(-1)">-</button>
                <button class="btn-control" onclick="adjustBpm(1)">+</button>
                <button class="btn-control" onclick="adjustBpm(5)">+5</button>
            </div>

            <button class="btn-main" id="play-btn">Iniciar Metrônomo</button>
        </section>
    </main>

    <script>
        /* ============================================
   RESPONSIVIDADE (MOBILE & TABLET)
   ============================================ */

/* Tablets e Telas Médias (até 1024px) */
@media (max-width: 1024px) {
  .app-container {
    padding: var(--space-md);
  }
  
  .metronome-display {
    gap: var(--space-xl);
  }
}

/* Smartphones (até 768px) */
@media (max-width: 768px) {
  .header-content {
    padding: 0;
  }

  .logo-text {
    font-size: 20px;
  }

  .metronome-display {
    flex-direction: column; /* Empilha os círculos no mobile */
    gap: var(--space-lg);
  }

  .bpm-circle-display {
    width: 150px;
    height: 150px;
  }

  .bpm-value {
    font-size: 42px;
  }

  /* Aumentar áreas de toque para mobile (Lei de Fitts) */
  .card, .metronome-panel {
    padding: var(--space-md);
    margin-bottom: var(--space-md);
  }
}

/* Telas Pequenas (até 480px) */
@media (max-width: 480px) {
  .app-header {
    padding: var(--space-md);
  }

  .logo-subtitle {
    display: none; /* Esconde subtitulo em telas muito pequenas */
  }

  .beat-visualizer {
    width: 120px;
    height: 120px;
  }
}

/* Prevenção de Zoom indesejado em inputs no iOS */
@media screen and (-webkit-min-device-pixel-ratio:0) { 
  select, textarea, input {
    font-size: 16px !important;
  }
}

        let bpm = 120;
        let isPlaying = false;
        const bpmDisplay = document.getElementById('bpm-display');
        const playBtn = document.getElementById('play-btn');

        function adjustBpm(val) {
            bpm = Math.min(Math.max(bpm + val, 30), 280);
            bpmDisplay.innerText = bpm;
            updateCircle();
        }

        function updateCircle() {
            const circle = document.getElementById('progress-circle');
            const percentage = (bpm - 30) / (280 - 30);
            const offset = 283 - (percentage * 283);
            circle.style.strokeDashoffset = offset;
        }

        playBtn.onclick = () => {
            isPlaying = !isPlaying;
            playBtn.innerText = isPlaying ? "Parar Metrônomo" : "Iniciar Metrônomo";
            playBtn.style.background = isPlaying ? "#e22134" : "#1db954";
        };

        // Inicializar círculo
        updateCircle();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro - Elite Edition</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a25;
  --accent-primary: #1db954;
  --accent-glow: rgba(29, 185, 84, 0.3);
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --border-color: rgba(255, 255, 255, 0.1);
  --glass-bg: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;
  --note-color: #ffffff;
}

body.performance-mode {
  --bg-primary: #050000;
  --accent-primary: #ff3e3e;
  --accent-glow: rgba(255, 62, 62, 0.4);
  background: var(--bg-primary);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family:'Inter',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
  transition:0.4s ease;
  overflow-x:hidden;
}

/* HEADER */
.app-header{
  background:rgba(18,18,26,0.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border-color);
  padding:15px 20px;
  position:sticky;
  top:0;
  z-index:1000;
}

.header-content{
  max-width:1400px;
  margin:0 auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* MENU */
.menu-container{position:relative;}

.menu-btn{
  background:none;
  border:none;
  color:#fff;
  cursor:pointer;
  padding:8px;
  border-radius:50%;
}

.dropdown-menu{
  position:absolute;
  top:45px;
  right:0;
  background:rgba(20,20,30,0.8);
  backdrop-filter:blur(15px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-lg);
  width:200px;
  display:none;
  flex-direction:column;
  z-index:2000;
}

.dropdown-menu.show{display:flex;}

.menu-item{
  padding:14px 18px;
  font-size:11px;
  cursor:pointer;
  border-bottom:1px solid var(--glass-border);
}

.menu-item.danger{color:#ff4d4d}

/* BOTÃO SALVAR */
.btn-save-vitro{
position:fixed;
bottom:30px;
left:20px;
z-index:900;
background:var(--glass-bg);
backdrop-filter:blur(10px);
border:1px solid var(--glass-border);
color:rgba(255,255,255,0.4);
padding:10px 20px;
border-radius:999px;
cursor:pointer;
font-size:10px;
}

/* LAYOUT */
.main-layout{
display:grid;
grid-template-columns:280px 1fr 300px;
gap:20px;
max-width:1400px;
margin:0 auto;
padding:20px;
}

/* SETLIST */
.side-panel{
background:var(--bg-secondary);
border-radius:var(--radius-xl);
border:1px solid var(--border-color);
max-height:80vh;
overflow:hidden;
display:flex;
flex-direction:column;
}

.panel-header{
padding:15px;
border-bottom:1px solid var(--border-color);
font-weight:800;
font-size:13px;
color:var(--accent-primary);
}

.song-list{
overflow-y:auto;
padding:10px;
}

.song-item{
background:var(--bg-tertiary);
padding:12px;
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

/* NOTAS */

.toolbar-central{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.section-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:15px;
}

.song-part{
background:var(--bg-secondary);
border-radius:var(--radius-lg);
padding:15px;
border-left:5px solid var(--accent-primary);
position:relative;
}

.chord-area{
font-family:'Monaco',monospace;
font-size:19px;
font-weight:700;
background:none;
border:none;
width:100%;
resize:none;
outline:none;
margin-top:10px;
}

/* METRONOMO */

.metronome-card{
background:var(--bg-secondary);
border-radius:var(--radius-xl);
border:1px solid var(--border-color);
padding:20px;
text-align:center;
position:sticky;
top:100px;
}

.bpm-val{
font-size:56px;
font-weight:800;
color:var(--accent-primary);
}

/* PERFORMANCE MODE */

body.performance-mode .btn-save-vitro,
body.performance-mode .app-header,
body.performance-mode .side-panel,
body.performance-mode .metronome-card,
body.performance-mode .toolbar-central{
display:none !important;
}

body.performance-mode .main-layout{
grid-template-columns:1fr;
padding:100px 10% 150px;
}

body.performance-mode .chord-area{
font-size:48px;
pointer-events:none;
}

/* BOTÃO MODO SHOW */

.mode-show-container{
position:fixed;
bottom:25px;
right:20px;
z-index:2000;
background:var(--accent-primary);
color:#000;
padding:14px 25px;
border-radius:999px;
cursor:pointer;
font-weight:900;
font-size:13px;
}

/* PISCAR NO MODO SHOW */

.show-active{
animation:showBlink 1s infinite;
}

@keyframes showBlink{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

</style>
</head>

<body id="app-body">

<header class="app-header">
<div class="header-content">
<h1>Map Music <span style="color:var(--accent-primary)">Pro</span></h1>

<div class="menu-container">
<button onclick="toggleMenu(event)" class="menu-btn">⋮</button>

<div id="m-drop" class="dropdown-menu">
<div class="menu-item" onclick="exportData()">Exportar Backup</div>
<div class="menu-item" onclick="importData()">Importar Backup</div>
<div class="menu-item danger" onclick="resetSection()">Limpar Secao</div>
</div>

</div>
</div>
</header>

<div class="main-layout">

<aside class="side-panel">
<div class="panel-header">Setlist <span id="song-count">0</span></div>
<div class="song-list" id="song-list"></div>
</aside>

<main class="notes-section">

<div class="toolbar-central">

<button onclick="addPart()">+ PARTE</button>

</div>

<div class="section-grid" id="notes-grid"></div>

</main>

<aside>

<div class="metronome-card">

<div class="bpm-val" id="bpm-display">120</div>

<div style="font-size:10px;font-weight:900;opacity:0.5;">BPM</div>

<button id="tap-btn">TAP</button>

<div>

<button onclick="adj(-1)">-</button>
<button onclick="adj(1)">+</button>

</div>

<button onclick="togglePlay()" id="play-btn">INICIAR</button>

</div>

</aside>

</div>

<button class="btn-save-vitro" onclick="saveSong()">Salvar Musica</button>

<div class="mode-show-container" onclick="togglePerf()">
<span id="mode-text">MODO SHOW</span>
</div>

<script>

let bpm=120
let songs=[]

function toggleMenu(e){
e.stopPropagation()
document.getElementById('m-drop').classList.toggle('show')
}

window.onclick=()=>document.getElementById('m-drop').classList.remove('show')

function addPart(title="PARTE",content=""){

const div=document.createElement('div')

div.className='song-part'

div.innerHTML=`
<input type="text" value="${title}">
<textarea class="chord-area">${content}</textarea>
<button onclick="this.parentElement.remove()">✕</button>
`

document.getElementById('notes-grid').appendChild(div)

}

function adj(v){

bpm+=v

document.getElementById('bpm-display').innerText=bpm

}

function togglePlay(){

const btn=document.getElementById('play-btn')

if(btn.innerText==="INICIAR"){
btn.innerText="PARAR"
}else{
btn.innerText="INICIAR"
}

}

function saveSong(){

const name=prompt("Nome da musica")

if(!name)return

alert("Salvo")

}

/* FUNÇÃO MODO SHOW COM VIBRAÇÃO */

function togglePerf(){

if(navigator.vibrate){
navigator.vibrate(80)
}

const body=document.getElementById('app-body')
const btn=document.querySelector('.mode-show-container')

const isPerf=body.classList.toggle('performance-mode')

if(isPerf){

btn.classList.add("show-active")
document.getElementById('mode-text').innerText="SAIR DO SHOW"

}else{

btn.classList.remove("show-active")
document.getElementById('mode-text').innerText="MODO SHOW"
window.scrollTo(0,0)

}

}

["INTRO","VERSO","REFRÃO"].forEach(p=>addPart(p))

</script>

</body>
</html>

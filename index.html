<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro - Metronome Edition</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --accent-primary: #1db954;
  --text-primary: #ffffff;
  --border-color: rgba(255, 255, 255, 0.1);
  --glass-bg: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --radius-xl: 16px;
  --radius-full: 9999px;
}

body.performance-mode { --bg-primary: #050000; --accent-primary: #ff3e3e; }
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); transition: 0.4s; overflow-x: hidden; }

/* HEADER */
.app-header { background: rgba(18,18,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); padding: 15px 20px; position: sticky; top: 0; z-index: 1000; }
.header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

/* LAYOUT HÍBRIDO */
.main-layout { display: grid; grid-template-columns: 260px 1fr 280px; gap: 20px; max-width: 1400px; margin: 0 auto; padding: 20px; }

@media (max-width: 1100px) {
    .main-layout { grid-template-columns: 1fr; }
    .side-panel { order: 2; }
    .metronome-card { order: 1; position: relative !important; top: 0 !important; width: 100% !important; }
}

/* METRONOMO FUNCIONAL */
.metronome-card { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); padding: 20px; text-align: center; position: sticky; top: 90px; }
.bpm-display { font-size: 56px; font-weight: 900; color: var(--accent-primary); cursor: pointer; user-select: none; transition: 0.1s; }
.bpm-display:active { transform: scale(0.95); opacity: 0.8; }
.metronome-controls { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }

.btn-metro { background: var(--glass-bg); border: 1px solid var(--glass-border); color: #fff; padding: 12px; border-radius: 12px; font-size: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
.btn-metro.active { background: var(--accent-primary); color: #000; border-color: var(--accent-primary); }
.tap-btn { background: #fff; color: #000; }

/* EDITOR E TOOLBAR */
.toolbar-central { display: flex; gap: 10px; margin-bottom: 20px; background: var(--bg-secondary); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--border-color); width: fit-content; align-items: center; }
.song-part { background: var(--bg-secondary); border-radius: 12px; padding: 15px; border-left: 4px solid var(--accent-primary); margin-bottom: 15px; }
.chord-area { font-family: 'Monaco', monospace; font-size: 18px; font-weight: 700; color: #fff; background: none; border: none; width: 100%; outline: none; margin-top: 10px; line-height: 1.4; }

/* BOTÕES FLUTUANTES */
.btn-save-vitro { position: fixed; bottom: 30px; left: 20px; background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); color: rgba(255,255,255,0.4); padding: 12px 20px; border-radius: var(--radius-full); cursor: pointer; font-size: 10px; font-weight: 800; }
.btn-show { position: fixed; bottom: 30px; right: 20px; background: var(--accent-primary); color: #000; padding: 15px 30px; border-radius: 50px; font-weight: 900; border: none; cursor: pointer; z-index: 1001; }

/* MODO SHOW */
body.performance-mode .app-header, body.performance-mode .side-panel, body.performance-mode .metronome-card, body.performance-mode .toolbar-central { display: none !important; }
body.performance-mode .main-layout { grid-template-columns: 1fr; padding: 5% 10%; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-content">
    <h1>MAP MUSIC <span style="color:var(--accent-primary)">PRO</span></h1>
    <button onclick="toggleMenu()" style="background:none; border:none; color:#fff;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg></button>
  </div>
</header>

<div class="main-layout">
  <!-- SETLIST -->
  <aside class="side-panel">
    <div style="padding:15px; font-size:11px; font-weight:900; color:var(--accent-primary); border-bottom:1px solid var(--border-color)">SETLIST</div>
    <div id="song-list" style="padding:10px;"></div>
    <button onclick="addSong()" style="width:100%; padding:15px; background:none; border:none; color:var(--accent-primary); font-weight:900; font-size:10px;">+ NOVA MÚSICA</button>
  </aside>

  <!-- EDITOR -->
  <main>
    <div class="toolbar-central">
        <button onclick="transpose(-1)" style="background:none; border:none; color:#fff; font-weight:800; cursor:pointer;">-</button>
        <span style="font-size:9px; font-weight:900; color:var(--accent-primary)">TOM</span>
        <button onclick="transpose(1)" style="background:none; border:none; color:#fff; font-weight:800; cursor:pointer;">+</button>
    </div>

    <input type="text" id="song-title" placeholder="Título" style="background:none; border:none; color:#fff; font-size:32px; font-weight:900; margin-bottom:20px; outline:none; width:100%;">

    <div id="sections-container">
        <div class="song-part">
            <input type="text" value="INTRO" style="background:none; border:none; color:var(--accent-primary); font-weight:900; font-size:11px; outline:none;">
            <textarea class="chord-area" rows="2" placeholder="C G Am F"></textarea>
        </div>
    </div>
  </main>

  <!-- METRONOMO FUNCIONAL -->
  <aside class="metronome-card">
    <div style="font-size:10px; font-weight:900; color:var(--accent-primary); margin-bottom:20px; letter-spacing:1px;">METRÔNOMO</div>
    
    <div class="bpm-display" id="bpm-val" onclick="tapTempo()">120</div>
    <div style="font-size:9px; opacity:0.4; letter-spacing:2px; margin-bottom:20px;">BPM</div>
    
    <div class="metronome-controls">
        <button class="btn-metro active" id="play-btn" onclick="toggleMetronome()">START / STOP</button>
        <button class="btn-metro tap-btn" onclick="tapTempo()">TAP TEMPO</button>
        <input type="range" min="40" max="250" value="120" style="width:100%; accent-color:var(--accent-primary);" oninput="updateBPM(this.value)">
    </div>
  </aside>
</div>

<button class="btn-save-vitro">Salvar</button>
<button class="btn-show" onclick="document.body.classList.toggle('performance-mode')">MODO SHOW</button>

<script>
    // LÓGICA DO METRÔNOMO
    let bpm = 120;
    let isPlaying = false;
    let nextNoteTime = 0.0;
    let timerID = null;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            if(isPlaying) playClick(nextNoteTime);
            nextNoteTime += 60.0 / bpm;
        }
        timerID = window.setTimeout(scheduler, 25.0);
    }

    function playClick(time) {
        const osc = audioCtx.createOscillator();
        const envelope = audioCtx.createGain();
        osc.frequency.value = 880;
        envelope.gain.exponentialRampToValueAtTime(1, time);
        envelope.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
        osc.connect(envelope);
        envelope.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 0.05);
    }

    function toggleMetronome() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        isPlaying = !isPlaying;
        const btn = document.getElementById('play-btn');
        if (isPlaying) {
            nextNoteTime = audioCtx.currentTime;
            scheduler();
            btn.style.background = "var(--accent-primary)";
            btn.style.color = "#000";
        } else {
            window.clearTimeout(timerID);
            btn.style.background = "var(--glass-bg)";
            btn.style.color = "#fff";
        }
    }

    function updateBPM(val) {
        bpm = val;
        document.getElementById('bpm-val').innerText = val;
    }

    // LÓGICA TAP TEMPO
    let lastTap = 0;
    let taps = [];
    function tapTempo() {
        const now = Date.now();
        if (lastTap > 0) {
            const diff = now - lastTap;
            if (diff < 2000) {
                taps.push(diff);
                if (taps.length > 4) taps.shift();
                const avg = taps.reduce((a, b) => a + b) / taps.length;
                updateBPM(Math.round(60000 / avg));
            } else { taps = []; }
        }
        lastTap = now;
        // Feedback visual no clique
        const display = document.getElementById('bpm-val');
        display.style.transform = "scale(1.1)";
        setTimeout(() => display.style.transform = "scale(1)", 100);
    }

    function addSong() {
        const list = document.getElementById('song-list');
        const item = document.createElement('div');
        item.style.cssText = "background:rgba(255,255,255,0.03); padding:12px; border-radius:10px; margin-bottom:8px; font-size:12px; cursor:pointer;";
        item.innerText = "Nova Música";
        list.appendChild(item);
    }
</script>

</body>
</html>

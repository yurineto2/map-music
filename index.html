<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro - Professional Edition</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a25;
  --bg-elevated: #242433;
  --accent-primary: #1db954;
  --accent-glow: rgba(29, 185, 84, 0.3);
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --border-color: rgba(255, 255, 255, 0.1);
  --radius-lg: 12px;
  --radius-xl: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding-bottom: 50px; }

/* HEADER */
.app-header { background: rgba(18,18,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); padding: 15px 30px; position: sticky; top: 0; z-index: 100; }
.header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

/* CONTAINER PRINCIPAL */
.container { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 320px; gap: 20px; }

/* METRONOMO */
.card { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); padding: 25px; margin-bottom: 20px; }
.bpm-display { text-align: center; margin-bottom: 20px; }
.bpm-val { font-size: 64px; font-weight: 800; color: var(--accent-primary); }

/* SEÇÕES DA MÚSICA */
.section-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
.song-part { background: var(--bg-tertiary); border-radius: var(--radius-lg); padding: 15px; border-left: 4px solid var(--accent-primary); position: relative; }
.song-part h4 { font-size: 12px; text-transform: uppercase; color: var(--accent-primary); margin-bottom: 8px; opacity: 0.8; }
.chord-area { font-family: 'Monaco', monospace; font-size: 18px; font-weight: 700; color: #fff; background: none; border: none; width: 100%; resize: none; outline: none; }

/* TRANSPOSIÇÃO */
.transpose-bar { display: flex; align-items: center; gap: 10px; margin: 20px 0; background: var(--bg-elevated); padding: 10px 20px; border-radius: 50px; width: fit-content; }
.btn-trans { background: none; border: 1px solid var(--border-color); color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold; }
.btn-trans:hover { background: var(--accent-primary); color: black; }

/* RESPONSIVIDADE */
@media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-content">
    <h2>Map Music Pro</h2>
    <button onclick="addPart()" style="background: var(--accent-primary); border:none; padding: 8px 16px; border-radius: 20px; font-weight: 700; cursor:pointer;">+ ADICIONAR PARTE</button>
  </div>
</header>

<div class="container">
  <main>
    <!-- ÁREA DO METRÔNOMO (Resumida para focar nas notas) -->
    <div class="card">
      <div class="bpm-display">
        <div class="bpm-val" id="bpm">120</div>
        <div style="font-size: 12px; color: var(--text-secondary);">BPM</div>
      </div>
      <div style="display: flex; justify-content: center; gap: 10px;">
        <button onclick="adjust(-1)" class="btn-trans">-</button>
        <button onclick="toggle()" id="btn-play" style="padding: 10px 30px; border-radius: 20px; border:none; background: var(--accent-primary); font-weight:800; cursor:pointer;">PLAY</button>
        <button onclick="adjust(1)" class="btn-trans">+</button>
      </div>
    </div>

    <!-- CONTROLE DE TRANSPOSIÇÃO -->
    <div class="transpose-bar">
      <span style="font-size: 12px; font-weight: 700; color: var(--text-secondary);">TRANSPOR TOM:</span>
      <button class="btn-trans" onclick="transposeAll(-1)">-1</button>
      <span id="semi-count" style="min-width: 30px; text-align: center; font-weight: 800;">0</span>
      <button class="btn-trans" onclick="transposeAll(1)">+1</button>
    </div>

    <!-- GRADE DE NOTAS -->
    <div class="section-grid" id="song-structure">
      <!-- Partes serão inseridas aqui -->
    </div>
  </main>

  <aside>
    <div class="card" style="position: sticky; top: 100px;">
      <h3 style="font-size: 16px; margin-bottom: 15px;">Dicas de Escrita</h3>
      <p style="font-size: 12px; color: var(--text-secondary); line-height: 1.6;">
        Escreva os acordes separados por espaços. <br><br>
        Exemplo: <br>
        <b style="color: #fff;">G Am7 C D4</b><br><br>
        Ao transpor, o sistema identificará as notas e ajustará o tom automaticamente.
      </p>
    </div>
  </aside>
</div>

<script>
let bpm = 120;
let isPlaying = false;
let currentTranspose = 0;

const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

// Estrutura inicial
const defaultParts = ["INTRO", "VERSE", "PRE-CHORUS", "CHORUS", "BRIDGE", "FINAL"];

function addPart(label = "NOVA PARTE") {
    const grid = document.getElementById('song-structure');
    const div = document.createElement('div');
    div.className = 'song-part';
    div.innerHTML = `
        <input type="text" value="${label}" style="background:none; border:none; color:var(--accent-primary); font-weight:800; font-size:12px; margin-bottom:10px; width:100%; outline:none;">
        <textarea class="chord-area" placeholder="Ex: C G Am F" oninput="autoHeight(this)"></textarea>
        <button onclick="this.parentElement.remove()" style="position:absolute; top:10px; right:10px; background:none; border:none; color:red; cursor:pointer;">✕</button>
    `;
    grid.appendChild(div);
}

function autoHeight(elem) {
    elem.style.height = "1px";
    elem.style.height = (elem.scrollHeight)+"px";
}

// LÓGICA DE TRANSPOSIÇÃO
function transposeNote(note, semitones) {
    // Regex para identificar nota e acidente (ex: C#)
    const match = note.match(/^([A-G][#b]?)(.*)/);
    if (!match) return note;

    let base = match[1];
    let suffix = match[2]; // m, 7, sus4, etc.

    // Normalizar bemóis para sustenidos para o cálculo
    const flats = {"Db":"C#", "Eb":"D#", "Gb":"F#", "Ab":"G#", "Bb":"A#"};
    if (flats[base]) base = flats[base];

    let index = notes.indexOf(base);
    if (index === -1) return note;

    let newIndex = (index + semitones) % 12;
    if (newIndex < 0) newIndex += 12;

    return notes[newIndex] + suffix;
}

function transposeAll(semitones) {
    currentTranspose += semitones;
    document.getElementById('semi-count').innerText = (currentTranspose > 0 ? "+" : "") + currentTranspose;

    const areas = document.querySelectorAll('.chord-area');
    areas.forEach(area => {
        let chords = area.value.split(/(\s+)/);
        let newChords = chords.map(token => {
            if (token.trim() === "") return token;
            return transposeNote(token, semitones);
        });
        area.value = newChords.join("");
    });
}

// Inicializar com as partes padrão
defaultParts.forEach(p => addPart(p));

// Metronomo básico (botões)
function adjust(v) { bpm += v; document.getElementById('bpm').innerText = bpm; }
function toggle() { 
    isPlaying = !isPlaying; 
    document.getElementById('btn-play').innerText = isPlaying ? "STOP" : "PLAY";
    document.getElementById('btn-play').style.background = isPlaying ? "#ff4d4d" : "#1db954";
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro - Performance Edition</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a25;
  --accent-primary: #1db954;
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --border-color: rgba(255, 255, 255, 0.1);
  --radius-lg: 12px;
  --radius-xl: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; transition: background 0.3s; }

/* HEADER */
.app-header { background: rgba(18,18,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); padding: 15px 30px; position: sticky; top: 0; z-index: 100; }
.header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

/* MODO FULLSCREEN ESTILIZAÇÃO */
body.performance-mode { background: #000; }
body.performance-mode .app-header, 
body.performance-mode aside, 
body.performance-mode .btn-delete,
body.performance-mode .btn-add-part { display: none !important; }
body.performance-mode .container { grid-template-columns: 1fr; max-width: 100vw; padding: 40px; }
body.performance-mode .song-part { border-width: 8px; padding: 30px; }
body.performance-mode .chord-area { font-size: 32px; color: var(--accent-primary); pointer-events: none; }
body.performance-mode .part-title { font-size: 18px; }

/* LAYOUT */
.container { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
.card { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); padding: 20px; margin-bottom: 20px; }

/* METRONOMO */
.bpm-display { text-align: center; margin-bottom: 15px; }
.bpm-val { font-size: 52px; font-weight: 800; color: var(--accent-primary); }

/* GRADE DE NOTAS */
.section-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.song-part { background: var(--bg-tertiary); border-radius: var(--radius-lg); padding: 15px; border-left: 4px solid var(--accent-primary); position: relative; transition: 0.3s; }
.part-title { background:none; border:none; color:var(--accent-primary); font-weight:800; font-size:12px; margin-bottom:10px; width:100%; outline:none; text-transform: uppercase; }
.chord-area { font-family: 'Monospace', monospace; font-size: 20px; font-weight: 700; color: #fff; background: none; border: none; width: 100%; resize: none; outline: none; overflow: hidden; }

/* BOTOES */
.btn-action { padding: 10px 20px; border-radius: 50px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
.btn-primary { background: var(--accent-primary); color: #000; }
.btn-outline { background: none; border: 1px solid var(--accent-primary); color: var(--accent-primary); }
.btn-floating { position: fixed; bottom: 30px; right: 30px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 60px; height: 60px; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; }

.transpose-bar { display: flex; align-items: center; gap: 15px; margin: 20px 0; background: var(--bg-elevated); padding: 12px 25px; border-radius: 50px; width: fit-content; }
.btn-circle { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border-color); background: none; color: #fff; cursor: pointer; }

@media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
</style>
</head>
<body id="body">

<header class="app-header">
  <div class="header-content">
    <h1 style="font-size: 20px;">Map Music <span style="color:var(--accent-primary)">Pro</span></h1>
    <button onclick="addPart()" class="btn-action btn-outline btn-add-part">+ PARTE</button>
  </div>
</header>

<div class="container">
  <main>
    <div class="card">
      <div style="display: flex; align-items: center; justify-content: space-around;">
        <div class="bpm-display">
          <div class="bpm-val" id="bpm-val">120</div>
          <div style="font-size: 10px; font-weight: 800; opacity: 0.5;">BPM</div>
        </div>
        <div style="display: flex; gap: 10px;">
          <button onclick="adj(-1)" class="btn-circle">-</button>
          <button onclick="toggleMetronome()" id="play-btn" class="btn-action btn-primary">PLAY</button>
          <button onclick="adj(1)" class="btn-circle">+</button>
        </div>
      </div>
    </div>

    <div class="transpose-bar">
      <span style="font-size: 11px; font-weight: 800; opacity: 0.6;">TOM:</span>
      <button class="btn-circle" onclick="transpose(-1)">-</button>
      <span id="trans-label" style="font-weight: 800; min-width: 20px; text-align: center;">0</span>
      <button class="btn-circle" onclick="transpose(1)">+</button>
    </div>

    <div class="section-grid" id="main-grid"></div>
  </main>

  <aside>
    <div class="card">
      <h4 style="margin-bottom: 10px;">Configurações</h4>
      <p style="font-size: 12px; color: var(--text-secondary);">O Modo Performance bloqueia a edição para evitar toques acidentais no palco.</p>
    </div>
  </aside>
</div>

<!-- BOTÃO FLUTUANTE DE TELA CHEIA -->
<button onclick="togglePerformance()" class="btn-action btn-primary btn-floating" title="Modo Performance">
  <span id="perf-icon">⛶</span>
</button>

<script>
let bpm = 120;
let isPlaying = false;
let isPerformance = false;
const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

function addPart(title = "PARTE") {
  const grid = document.getElementById('main-grid');
  const div = document.createElement('div');
  div.className = 'song-part';
  div.innerHTML = `
    <input type="text" class="part-title" value="${title}">
    <textarea class="chord-area" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'" placeholder="C G Am F"></textarea>
    <button class="btn-delete" onclick="this.parentElement.remove()" style="position:absolute; top:10px; right:10px; background:none; border:none; color:#ff4d4d; cursor:pointer;">✕</button>
  `;
  grid.appendChild(div);
}

function transpose(dir) {
  const areas = document.querySelectorAll('.chord-area');
  document.getElementById('trans-label').innerText = parseInt(document.getElementById('trans-label').innerText) + dir;
  
  areas.forEach(area => {
    let content = area.value;
    area.value = content.replace(/[A-G][#b]?/g, (match) => {
      let idx = notes.indexOf(match.replace('Db','C#').replace('Eb','D#').replace('Gb','F#').replace('Ab','G#').replace('Bb','A#'));
      if (idx === -1) return match;
      let newIdx = (idx + dir + 12) % 12;
      return notes[newIdx];
    });
  });
}

function togglePerformance() {
  isPerformance = !isPerformance;
  document.getElementById('body').classList.toggle('performance-mode');
  document.getElementById('perf-icon').innerText = isPerformance ? "✕" : "⛶";
  
  // No mobile, tenta forçar o Fullscreen do navegador
  if (isPerformance && document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else if (document.exitFullscreen) {
    document.exitFullscreen().catch(() => {});
  }
}

function adj(v) { bpm += v; document.getElementById('bpm-val').innerText = bpm; }
function toggleMetronome() {
  isPlaying = !isPlaying;
  document.getElementById('play-btn').innerText = isPlaying ? "STOP" : "PLAY";
  document.getElementById('play-btn').style.background = isPlaying ? "#ff4d4d" : "#1db954";
}

// Inicia com as partes principais
["INTRO", "VERSO", "REFRÃO"].forEach(p => addPart(p));
</script>
</body>
</html>

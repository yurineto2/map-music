<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Music Pro - Organized Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-theme="green">

<!-- HEADER -->
<header class="app-header">
  <div class="header-content">
    <div class="logo">
      <div class="logo-icon">M</div>
      <div>
        <div class="logo-text">Map Music Pro</div>
        <div class="logo-subtitle">Organized Edition</div>
      </div>
    </div>
    <div class="theme-selector" id="themeSelector"></div>
  </div>
</header>

<!-- MAIN APP -->
<div class="app-container" id="app">
  
  <!-- METRONOME MODULE -->
  <section class="module" id="metronomeModule"></section>
  
  <!-- SETLISTS MODULE -->
  <section class="module" id="setlistsModule"></section>
  
  <!-- LIBRARY MODULE -->
  <section class="module" id="libraryModule"></section>
  
  <!-- EDITOR MODULE -->
  <section class="module" id="editorModule"></section>
  
</div>

<!-- SHOW MODE OVERLAY -->
<div class="show-mode" id="showMode"></div>

<!-- MODALS -->
<div class="modal-overlay" id="modalOverlay"></div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-icon">✓</div>
  <span id="toastMessage"></span>
</div>

<!-- SCRIPTS -->
<script>
// ============================================
// CONFIGURAÇÃO E CONSTANTES
// ============================================
const CONFIG = {
  STORAGE_KEYS: {
    LIBRARY: 'mapmusic_library_v2',
    SETLISTS: 'mapmusic_setlists_v2',
    THEME: 'mapmusic_theme_v2',
    SETTINGS: 'mapmusic_settings_v2'
  },
  THEMES: ['green', 'red', 'blue', 'purple', 'orange', 'pink'],
  SECTIONS: ['intro', 'verse', 'prechorus', 'chorus', 'bridge', 'ending'],
  NOTES: ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"]
};

// ============================================
// ESTADO GLOBAL
// ============================================
const State = {
  library: [],
  setlists: [],
  current: {
    songId: null,
    setlistId: null,
    songIndex: 0,
    shift: 0,
    bpm: 120,
    isPlaying: false,
    showMode: false
  },
  metronome: {
    audioContext: null,
    nextNoteTime: 0,
    currentBeat: 0,
    timerID: null,
    beatsPerMeasure: 4
  },
  temp: {
    setlistSongs: [],
    editingSetlistId: null
  }
};

// ============================================
// UTILITÁRIOS
// ============================================
const Utils = {
  escapeHtml(text) {
    if (!text) return "";
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  },

  formatDate(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr).toLocaleDateString('pt-BR');
  },

  generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2);
  },

  debounce(fn, ms) {
    let timeout;
    return (...args) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => fn(...args), ms);
    };
  },

  estimateDuration(songCount) {
    return Math.round(songCount * 3.5);
  },

  formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
  }
};

// ============================================
// NOTIFICAÇÕES
// ============================================
const Toast = {
  show(message, duration = 3000) {
    const toast = document.getElementById('toast');
    const msgEl = document.getElementById('toastMessage');
    msgEl.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), duration);
  }
};

// ============================================
// STORAGE MANAGER
// ============================================
const Storage = {
  save(key, data) {
    try {
      localStorage.setItem(key, JSON.stringify(data));
      return true;
    } catch (e) {
      console.error('Storage save error:', e);
      return false;
    }
  },

  load(key, defaultValue = []) {
    try {
      const data = localStorage.getItem(key);
      return data ? JSON.parse(data) : defaultValue;
    } catch (e) {
      console.error('Storage load error:', e);
      return defaultValue;
    }
  },

  clear() {
    Object.values(CONFIG.STORAGE_KEYS).forEach(key => localStorage.removeItem(key));
  }
};

// ============================================
// THEME MANAGER
// ============================================
const Theme = {
  init() {
    const saved = Storage.load(CONFIG.STORAGE_KEYS.THEME, 'green');
    this.set(saved);
    this.renderSelector();
  },

  set(themeName) {
    document.body.setAttribute('data-theme', themeName);
    Storage.save(CONFIG.STORAGE_KEYS.THEME, themeName);
    State.current.theme = themeName;
  },

  renderSelector() {
    const container = document.getElementById('themeSelector');
    container.innerHTML = CONFIG.THEMES.map(theme => `
      <div class="theme-btn theme-${theme} ${State.current.theme === theme ? 'active' : ''}" 
           onclick="Theme.set('${theme}')" 
           title="${theme}"
           style="background: ${this.getGradient(theme)}">
      </div>
    `).join('');
  },

  getGradient(theme) {
    const gradients = {
      green: 'linear-gradient(135deg, #1db954, #1ed760)',
      red: 'linear-gradient(135deg, #e22134, #ff4d5e)',
      blue: 'linear-gradient(135deg, #0d84fc, #3d9eff)',
      purple: 'linear-gradient(135deg, #8b5cf6, #a78bfa)',
      orange: 'linear-gradient(135deg, #f97316, #fb923c)',
      pink: 'linear-gradient(135deg, #ec4899, #f472b6)'
    };
    return gradients[theme];
  }
};

// ============================================
// METRONOME MODULE
// ============================================
const Metronome = {
  init() {
    this.render();
    this.initAudio();
  },

  initAudio() {
    try {
      State.metronome.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.error('Web Audio API not supported');
    }
  },

  render() {
    document.getElementById('metronomeModule').innerHTML = `
      <div class="metronome-panel">
        <div class="module-header">
          <h3>♪ Metrônomo Profissional</h3>
          <span class="badge">Web Audio API</span>
        </div>
        
        <div class="metronome-display">
          <div class="bpm-circle">
            <svg viewBox="0 0 160 160">
              <circle class="bg" cx="80" cy="80" r="70"/>
              <circle class="progress" id="bpmProgress" cx="80" cy="80" r="70"/>
            </svg>
            <div class="bpm-text">
              <div class="value" id="bpmDisplay">120</div>
              <div class="label">BPM</div>
            </div>
          </div>
          
          <div class="beat-dots" id="beatDots">
            ${[0,1,2,3].map(i => `<div class="dot" data-beat="${i}"></div>`).join('')}
          </div>
        </div>

        <div class="metronome-controls">
          <div class="bpm-buttons">
            <button class="btn-adjust" onclick="Metronome.adjust(-10)">-10</button>
            <button class="btn-adjust" onclick="Metronome.adjust(-1)">-1</button>
          </div>

          <button class="btn-play" id="metronomeToggle" onclick="Metronome.toggle()">
            <span id="playIcon">▶</span>
          </button>

          <div class="bpm-buttons">
            <button class="btn-adjust" onclick="Metronome.adjust(1)">+1</button>
            <button class="btn-adjust" onclick="Metronome.adjust(10)">+10</button>
          </div>

          <div class="slider-container">
            <input type="range" id="bpmSlider" min="40" max="240" value="120" 
                   oninput="Metronome.setBPM(this.value)">
          </div>
        </div>
      </div>
    `;
  },

  setBPM(value) {
    State.current.bpm = parseInt(value);
    document.getElementById('bpmDisplay').textContent = State.current.bpm;
    document.getElementById('bpmSlider').value = State.current.bpm;
  },

  adjust(delta) {
    const newBPM = State.current.bpm + delta;
    if (newBPM >= 40 && newBPM <= 240) {
      this.setBPM(newBPM);
    }
  },

  toggle() {
    if (!State.metronome.audioContext) this.initAudio();
    State.current.isPlaying ? this.stop() : this.start();
  },

  start() {
    const ctx = State.metronome;
    if (ctx.audioContext.state === 'suspended') {
      ctx.audioContext.resume();
    }

    State.current.isPlaying = true;
    ctx.currentBeat = 0;
    ctx.nextNoteTime = ctx.audioContext.currentTime + 0.05;
    
    document.getElementById('metronomeToggle').classList.add('playing');
    document.getElementById('playIcon').textContent = '⏸';
    
    this.schedule();
    Toast.show(`Metrônomo: ${State.current.bpm} BPM`);
  },

  stop() {
    State.current.isPlaying = false;
    clearTimeout(State.metronome.timerID);
    
    document.getElementById('metronomeToggle').classList.remove('playing');
    document.getElementById('playIcon').textContent = '▶';
    
    document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
    document.getElementById('bpmProgress').style.strokeDashoffset = 440;
  },

  schedule() {
    const ctx = State.metronome;
    while (ctx.nextNoteTime < ctx.audioContext.currentTime + 0.1) {
      this.playNote(ctx.currentBeat, ctx.nextNoteTime);
      this.nextNote();
    }
    ctx.timerID = setTimeout(() => this.schedule(), 25);
  },

  nextNote() {
    const secondsPerBeat = 60.0 / State.current.bpm;
    State.metronome.nextNoteTime += secondsPerBeat;
    State.metronome.currentBeat = (State.metronome.currentBeat + 1) % 4;
  },

  playNote(beat, time) {
    const ctx = State.metronome;
    const osc = ctx.audioContext.createOscillator();
    const gain = ctx.audioContext.createGain();

    osc.frequency.value = beat === 0 ? 1000 : 800;
    osc.type = beat === 0 ? 'square' : 'sine';

    gain.gain.setValueAtTime(0.8, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);

    osc.connect(gain);
    gain.connect(ctx.audioContext.destination);
    osc.start(time);
    osc.stop(time + 0.05);

    // Visual sync
    const delay = (time - ctx.audioContext.currentTime) * 1000;
    setTimeout(() => this.updateVisual(beat), Math.max(0, delay));
  },

  updateVisual(beat) {
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === beat);
    });
    
    const progress = ((beat + 1) / 4) * 440;
    document.getElementById('bpmProgress').style.strokeDashoffset = 440 - progress;
  }
};

// ============================================
// SETLISTS MODULE
// ============================================
const Setlists = {
  init() {
    State.setlists = Storage.load(CONFIG.STORAGE_KEYS.SETLISTS, []);
    this.render();
  },

  render() {
    const container = document.getElementById('setlistsModule');
    container.innerHTML = `
      <div class="card">
        <div class="card-header">
          <h3>📋 Setlists & Shows</h3>
          <div class="stats">
            <span class="stat">${State.setlists.length} setlists</span>
            <span class="stat">~${this.totalDuration()} min total</span>
          </div>
        </div>
        
        <div class="setlist-grid" id="setlistGrid">
          ${this.renderGrid()}
        </div>
        
        ${this.renderEditor()}
      </div>
    `;
  },

  renderGrid() {
    let html = this.renderCreateCard();
    
    html += State.setlists.map(sl => `
      <div class="setlist-card" data-id="${sl.id}">
        <div class="setlist-name">${Utils.escapeHtml(sl.name)}</div>
        <div class="setlist-meta">
          <span>${sl.songs.length} músicas</span>
          <span>~${Utils.estimateDuration(sl.songs.length)} min</span>
        </div>
        <div class="setlist-preview">
          ${sl.songs.slice(0, 3).map(s => Utils.escapeHtml(s.name)).join(', ')}
          ${sl.songs.length > 3 ? '...' : ''}
        </div>
        <div class="setlist-actions">
          <button class="btn-icon success" onclick="Setlists.startShow('${sl.id}')" title="Iniciar Show">▶</button>
          <button class="btn-icon" onclick="Setlists.edit('${sl.id}')" title="Editar">✎</button>
          <button class="btn-icon danger" onclick="Setlists.delete('${sl.id}')" title="Excluir">🗑</button>
        </div>
      </div>
    `).join('');
    
    return html;
  },

  renderCreateCard() {
    return `
      <div class="setlist-card create" onclick="Setlists.openEditor()">
        <div class="create-content">
          <div class="icon">+</div>
          <div class="text">Criar Novo Setlist</div>
        </div>
      </div>
    `;
  },

  renderEditor() {
    return `
      <div class="setlist-editor" id="setlistEditor" style="display: none;">
        <input type="text" class="setlist-input" id="setlistName" placeholder="Nome do Setlist...">
        
        <div class="editor-columns">
          <div class="column">
            <label>Disponíveis (${State.library.length})</label>
            <div class="songs-pool" id="songsPool"></div>
          </div>
          <div class="column">
            <label>Selecionadas (<span id="selectedCount">0</span>)</label>
            <div class="songs-queue" id="songsQueue"></div>
          </div>
        </div>
        
        <div class="editor-actions">
          <button class="btn primary" onclick="Setlists.save()">Salvar</button>
          <button class="btn secondary" onclick="Setlists.closeEditor()">Cancelar</button>
          <button class="btn success" onclick="Setlists.preview()">Preview</button>
        </div>
      </div>
    `;
  },

  totalDuration() {
    const totalSongs = State.setlists.reduce((sum, sl) => sum + sl.songs.length, 0);
    return Utils.estimateDuration(totalSongs);
  },

  openEditor() {
    State.temp.setlistSongs = [];
    State.temp.editingSetlistId = null;
    document.getElementById('setlistName').value = '';
    document.getElementById('setlistEditor').style.display = 'block';
    this.renderPool();
    this.renderQueue();
  },

  closeEditor() {
    document.getElementById('setlistEditor').style.display = 'none';
    State.temp.setlistSongs = [];
    State.temp.editingSetlistId = null;
  },

  renderPool() {
    const pool = document.getElementById('songsPool');
    if (State.library.length === 0) {
      pool.innerHTML = '<div class="empty">Nenhuma música na biblioteca</div>';
      return;
    }

    pool.innerHTML = State.library.map(song => {
      const isSelected = State.temp.setlistSongs.find(s => s.id === song.id);
      return `
        <div class="pool-item ${isSelected ? 'selected' : ''}" 
             onclick="Setlists.toggleSong('${song.id}')" data-id="${song.id}">
          <div class="checkbox">${isSelected ? '✓' : ''}</div>
          <div class="name">${Utils.escapeHtml(song.name)}</div>
        </div>
      `;
    }).join('');
  },

  renderQueue() {
    const queue = document.getElementById('songsQueue');
    document.getElementById('selectedCount').textContent = State.temp.setlistSongs.length;

    if (State.temp.setlistSongs.length === 0) {
      queue.innerHTML = '<div class="empty">Arraste músicas para cá</div>';
      return;
    }

    queue.innerHTML = State.temp.setlistSongs.map((song, idx) => `
      <div class="queue-item" draggable="true" data-index="${idx}">
        <div class="number">${idx + 1}</div>
        <div class="info">
          <div class="name">${Utils.escapeHtml(song.name)}</div>
          <div class="key">${song.shift === 0 ? 'Original' : (song.shift > 0 ? '+' : '') + song.shift}</div>
        </div>
        <button class="remove" onclick="Setlists.removeFromQueue(${idx})">×</button>
      </div>
    `).join('');

    this.initDragAndDrop();
  },

  initDragAndDrop() {
    const items = document.querySelectorAll('.queue-item');
    let draggedIdx = null;

    items.forEach(item => {
      item.addEventListener('dragstart', (e) => {
        draggedIdx = parseInt(item.dataset.index);
        item.classList.add('dragging');
      });

      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
      });

      item.addEventListener('dragover', (e) => {
        e.preventDefault();
      });

      item.addEventListener('drop', (e) => {
        e.preventDefault();
        const dropIdx = parseInt(item.dataset.index);
        if (draggedIdx !== dropIdx) {
          const [removed] = State.temp.setlistSongs.splice(draggedIdx, 1);
          State.temp.setlistSongs.splice(dropIdx, 0, removed);
          this.renderQueue();
        }
      });
    });
  },

  toggleSong(songId) {
    const idx = State.temp.setlistSongs.findIndex(s => s.id === songId);
    const song = State.library.find(s => s.id === songId);

    if (idx !== -1) {
      State.temp.setlistSongs.splice(idx, 1);
    } else if (song) {
      State.temp.setlistSongs.push({
        id: song.id,
        name: song.name,
        shift: song.shift || 0,
        notes: song.notes || {}
      });
    }

    this.renderPool();
    this.renderQueue();
  },

  removeFromQueue(index) {
    State.temp.setlistSongs.splice(index, 1);
    this.renderPool();
    this.renderQueue();
  },

  save() {
    const name = document.getElementById('setlistName').value.trim();
    if (!name) {
      Toast.show('Digite um nome para o setlist');
      return;
    }
    if (State.temp.setlistSongs.length === 0) {
      Toast.show('Adicione pelo menos uma música');
      return;
    }

    const setlist = {
      id: State.temp.editingSetlistId || Utils.generateId(),
      name,
      date: new Date().toISOString(),
      songs: [...State.temp.setlistSongs]
    };

    if (State.temp.editingSetlistId) {
      const idx = State.setlists.findIndex(s => s.id === State.temp.editingSetlistId);
      State.setlists[idx] = setlist;
    } else {
      State.setlists.push(setlist);
    }

    Storage.save(CONFIG.STORAGE_KEYS.SETLISTS, State.setlists);
    this.closeEditor();
    this.render();
    Toast.show('Setlist salvo!');
  },

  edit(id) {
    const sl = State.setlists.find(s => s.id === id);
    if (!sl) return;

    State.temp.editingSetlistId = id;
    State.temp.setlistSongs = JSON.parse(JSON.stringify(sl.songs));
    
    document.getElementById('setlistName').value = sl.name;
    document.getElementById('setlistEditor').style.display = 'block';
    
    this.renderPool();
    this.renderQueue();
  },

  delete(id) {
    if (!confirm('Excluir este setlist?')) return;
    
    State.setlists = State.setlists.filter(s => s.id !== id);
    Storage.save(CONFIG.STORAGE_KEYS.SETLISTS, State.setlists);
    this.render();
    Toast.show('Setlist excluído');
  },

  startShow(id) {
    const sl = State.setlists.find(s => s.id === id);
    if (!sl) return;
    ShowMode.start(sl);
  },

  preview() {
    if (State.temp.setlistSongs.length === 0) {
      Toast.show('Adicione músicas primeiro');
      return;
    }

    const previewSetlist = {
      id: 'preview',
      name: document.getElementById('setlistName').value || 'Preview',
      songs: [...State.temp.setlistSongs]
    };

    ShowMode.start(previewSetlist);
  }
};

// ============================================
// LIBRARY MODULE
// ============================================
const Library = {
  init() {
    State.library = Storage.load(CONFIG.STORAGE_KEYS.LIBRARY, []);
    this.render();
  },

  render() {
    const container = document.getElementById('libraryModule');
    container.innerHTML = `
      <div class="card">
        <div class="card-header">
          <h3>🎵 Biblioteca</h3>
          <div class="actions">
            <input type="text" id="songName" placeholder="Nome da música..." class="input">
            <button class="btn primary" onclick="Library.save()">Salvar</button>
            <button class="btn secondary" onclick="Library.new()">Nova</button>
          </div>
        </div>
        <div class="songs-grid" id="songsGrid">
          ${this.renderGrid()}
        </div>
      </div>
    `;
  },

  renderGrid() {
    if (State.library.length === 0) {
      return '<div class="empty-state">Nenhuma música salva. Crie sua primeira música!</div>';
    }

    return State.library.map(song => {
      const isActive = song.id === State.current.songId;
      const hasNotes = song.notes && Object.values(song.notes).some(n => n?.trim());
      
      return `
        <div class="song-card ${isActive ? 'active' : ''}" onclick="Library.load('${song.id}')">
          ${hasNotes ? '<div class="has-notes-indicator"></div>' : ''}
          <div class="song-name">${Utils.escapeHtml(song.name)}</div>
          <div class="song-date">${Utils.formatDate(song.date)}</div>
          <button class="delete-btn" onclick="event.stopPropagation(); Library.delete('${song.id}')">×</button>
        </div>
      `;
    }).join('');
  },

  save() {
    const name = document.getElementById('songName').value.trim();
    if (!name) {
      Toast.show('Digite um nome para a música');
      return;
    }

    const songData = this.collectFormData();
    songData.id = State.current.songId || Utils.generateId();
    songData.date = new Date().toISOString();

    const idx = State.library.findIndex(s => s.id === songData.id);
    if (idx !== -1) {
      State.library[idx] = songData;
    } else {
      State.library.push(songData);
      State.current.songId = songData.id;
    }

    Storage.save(CONFIG.STORAGE_KEYS.LIBRARY, State.library);
    this.render();
    Setlists.render(); // Atualiza pool de setlists
    Toast.show('Música salva!');
  },

  collectFormData() {
    const data = {
      name: document.getElementById('songName').value,
      sections: {},
      notes: {},
      shift: State.current.shift
    };

    CONFIG.SECTIONS.forEach(section => {
      data.sections[section] = document.getElementById(section)?.value || '';
      data.notes[section + 'Notes'] = document.getElementById(section + 'Notes')?.value || '';
    });

    return data;
  },

  load(id) {
    const song = State.library.find(s => s.id === id);
    if (!song) return;

    State.current.songId = song.id;
    State.current.shift = song.shift || 0;

    document.getElementById('songName').value = song.name;
    
    CONFIG.SECTIONS.forEach(section => {
      const el = document.getElementById(section);
      const notesEl = document.getElementById(section + 'Notes');
      if (el) el.value = song.sections?.[section] || '';
      if (notesEl) notesEl.value = song.notes?.[section + 'Notes'] || '';
    });

    document.getElementById('keyShift').value = State.current.shift;
    Transpose.updateDisplay();
    
    this.render();
    Toast.show('Carregado: ' + song.name);
  },

  delete(id) {
    if (!confirm('Excluir esta música?')) return;

    State.library = State.library.filter(s => s.id !== id);
    
    if (State.current.songId === id) {
      State.current.songId = null;
      this.clearForm();
    }

    Storage.save(CONFIG.STORAGE_KEYS.LIBRARY, State.library);
    this.render();
    Setlists.render();
    Toast.show('Música excluída');
  },

  new() {
    if (this.hasUnsavedChanges() && !confirm('Descartar alterações?')) return;
    
    State.current.songId = null;
    State.current.shift = 0;
    this.clearForm();
    this.render();
  },

  clearForm() {
    document.getElementById('songName').value = '';
    CONFIG.SECTIONS.forEach(section => {
      const el = document.getElementById(section);

// ============================================
// TRANSPOSE MODULE
// ============================================
const Transpose = {
  updateDisplay() {
    const shift = parseInt(document.getElementById('keyShift')?.value || 0);
    const display = document.getElementById('currentKeyDisplay');
    
    if (shift === 0) {
      display.textContent = 'Original';
      display.className = 'key-display muted';
    } else {
      display.textContent = (shift > 0 ? '+' : '') + shift;
      display.className = 'key-display active';
    }
  },

  apply() {
    const shift = parseInt(document.getElementById('keyShift').value);
    if (shift === 0) {
      Toast.show('Selecione um valor de transposição');
      return;
    }

    CONFIG.SECTIONS.forEach(section => {
      const el = document.getElementById(section);
      if (!el || !el.value.trim()) return;

      el.value = this.transposeText(el.value, shift);
    });

    State.current.shift = shift;
    this.updateDisplay();
    Toast.show(`Transposto ${shift > 0 ? '+' : ''}${shift} semitons`);
  },

  transposeText(text, shift) {
    return text.split('\n').map(line => {
      const leadingSpace = line.match(/^\s*/)[0];
      const chords = line.trim().split(/\s+/);
      const transposed = chords.map(chord => this.transposeChord(chord, shift));
      return leadingSpace + transposed.join(' ');
    }).join('\n');
  },

  transposeChord(chord, shift) {
    if (!chord || chord.includes('/')) {
      if (chord.includes('/')) {
        const [root, bass] = chord.split('/');
        return this.transposeRoot(root, shift) + '/' + this.transposeRoot(bass, shift);
      }
      return chord;
    }
    return this.transposeRoot(chord, shift);
  },

  transposeRoot(chord, shift) {
    const match = chord.match(/^([A-G][#b]?)(.*)$/);
    if (!match) return chord;

    let [, note, suffix] = match;
    
    // Normalizar enarmônicas
    const enharmonics = {
      'Db': 'C#', 'Eb': 'D#', 'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#',
      'Cb': 'B', 'Fb': 'E', 'E#': 'F', 'B#': 'C'
    };
    note = enharmonics[note] || note;

    const idx = CONFIG.NOTES.indexOf(note);
    if (idx === -1) return chord;

    const newIdx = (idx + shift + 12) % 12;
    return CONFIG.NOTES[newIdx] + suffix;
  }
};

// ============================================
// SHOW MODE MODULE
// ============================================
const ShowMode = {
  start(setlist) {
    State.current.setlistId = setlist.id;
    State.current.songIndex = 0;
    
    this.render();
    this.loadSong(0);
    this.startTimer();
    
    document.getElementById('showMode').classList.add('active');
    document.body.style.overflow = 'hidden';
    
    // Keyboard shortcuts
    document.addEventListener('keydown', this.handleKey);
  },

  startCurrent() {
    if (!State.current.songId) {
      Toast.show('Selecione uma música primeiro');
      return;
    }

    const song = State.library.find(s => s.id === State.current.songId);
    if (!song) return;

    this.start({
      id: 'single',
      name: song.name,
      songs: [{
        id: song.id,
        name: song.name,
        shift: song.shift || 0,
        notes: song.notes || {}
      }]
    });
  },

  render() {
    const container = document.getElementById('showMode');
    container.innerHTML = `
      <div class="show-header">
        <div class="show-info">
          <div class="setlist-name" id="showSetlistName"></div>
          <div class="song-name" id="showSongName"></div>
          <div class="song-meta">
            <span id="showSongKey"></span>
            <span id="showSongNumber"></span>
          </div>
        </div>
        <div class="show-progress">
          <div class="progress-bar"><div class="fill" id="showProgress"></div></div>
        </div>
        <div class="show-timer" id="showTimer">00:00</div>
      </div>
      
      <div class="show-content">
        <div class="show-sidebar" id="showSidebar"></div>
        <div class="show-main" id="showMain"></div>
      </div>
      
      <div class="show-notes-panel" id="showNotesPanel">
        <div class="notes-title">📝 Anotações</div>
        <div class="notes-content" id="showNotesContent"></div>
      </div>
      
      <div class="show-controls">
        <button class="btn" id="btnPrev" onclick="ShowMode.prev()">◀ Anterior</button>
        <button class="btn primary" onclick="Metronome.toggle()">
          <span id="showMetronomeIcon">▶</span> Metrônomo
        </button>
        <button class="btn" id="btnNext" onclick="ShowMode.next()">Próxima ▶</button>
        <button class="btn exit" onclick="ShowMode.exit()">✕ Sair</button>
      </div>
    `;
  },

  loadSong(index) {
    if (index < 0 || index >= this.getCurrentSetlist().songs.length) return;

    State.current.songIndex = index;
    const songRef = this.getCurrentSetlist().songs[index];
    const song = State.library.find(s => s.id === songRef.id);

    if (!song) {
      Toast.show('Música não encontrada');
      return;
    }

    // Update header
    document.getElementById('showSetlistName').textContent = this.getCurrentSetlist().name;
    document.getElementById('showSongName').textContent = song.name;
    document.getElementById('showSongKey').textContent = 'Tom: ' + 
      (songRef.shift === 0 ? 'Original' : (songRef.shift > 0 ? '+' : '') + songRef.shift);
    document.getElementById('showSongNumber').textContent = 
      `${index + 1} de ${this.getCurrentSetlist().songs.length}`;

    // Progress
    const progress = ((index + 1) / this.getCurrentSetlist().songs.length) * 100;
    document.getElementById('showProgress').style.width = progress + '%';

    // Sidebar
    this.renderSidebar();

    // Content
    this.renderContent(song);

    // Notes
    this.renderNotes(song);

    // Buttons
    document.getElementById('btnPrev').disabled = index === 0;
    document.getElementById('btnNext').disabled = 
      index === this.getCurrentSetlist().songs.length - 1;
  },

  renderSidebar() {
    const sidebar = document.getElementById('showSidebar');
    sidebar.innerHTML = this.getCurrentSetlist().songs.map((song, i) => {
      const isActive = i === State.current.songIndex;
      const key = song.shift === 0 ? 'Orig' : (song.shift > 0 ? '+' : '') + song.shift;
      
      return `
        <div class="sidebar-item ${isActive ? 'active' : ''}" onclick="ShowMode.jump(${i})">
          <div class="number">${i + 1}</div>
          <div class="key">${key}</div>
        </div>
      `;
    }).join('');
  },

  renderContent(song) {
    const main = document.getElementById('showMain');
    const sections = [
      {key: 'intro', label: 'Introdução'},
      {key: 'verse', label: 'Verso'},
      {key: 'prechorus', label: 'Pré-Refrão'},
      {key: 'chorus', label: 'Refrão'},
      {key: 'bridge', label: 'Ponte'},
      {key: 'ending', label: 'Final'}
    ];

    main.innerHTML = sections.map(sec => {
      const content = song.sections?.[sec.key];
      if (!content?.trim()) return '';
      
      return `
        <div class="show-section">
          <div class="section-label">${sec.label}</div>
          <div class="section-content">${Utils.escapeHtml(content)}</div>
        </div>
      `;
    }).join('');

    main.scrollTop = 0;
  },

  renderNotes(song) {
    const panel = document.getElementById('showNotesPanel');
    const content = document.getElementById('showNotesContent');
    
    const notes = [];
    const sections = [
      {key: 'intro', label: 'Introdução'},
      {key: 'verse', label: 'Verso'},
      {key: 'prechorus', label: 'Pré-Refrão'},
      {key: 'chorus', label: 'Refrão'},
      {key: 'bridge', label: 'Ponte'},
      {key: 'ending', label: 'Final'}
    ];

    sections.forEach(sec => {
      const note = song.notes?.[sec.key + 'Notes'];
      if (note?.trim()) {
        notes.push(`<strong>${sec.label}:</strong> ${Utils.escapeHtml(note)}`);
      }
    });

    if (notes.length > 0) {
      content.innerHTML = notes.join('<br><br>');
      panel.style.display = 'block';
    } else {
      panel.style.display = 'none';
    }
  },

  handleKey(e) {
    if (!document.getElementById('showMode').classList.contains('active')) return;
    
    switch(e.key) {
      case 'ArrowRight':
      case ' ':
        e.preventDefault();
        ShowMode.next();
        break;
      case 'ArrowLeft':
        e.preventDefault();
        ShowMode.prev();
        break;
      case 'm':
      case 'M':
        e.preventDefault();
        Metronome.toggle();
        break;
      case 'Escape':
        e.preventDefault();
        ShowMode.exit();
        break;
    }
  },

  next() {
    this.loadSong(State.current.songIndex + 1);
  },

  prev() {
    this.loadSong(State.current.songIndex - 1);
  },

  jump(index) {
    this.loadSong(index);
  },

  startTimer() {
    State.showStartTime = Date.now();
    State.showTimerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - State.showStartTime) / 1000);
      document.getElementById('showTimer').textContent = Utils.formatTime(elapsed);
    }, 1000);
  },

  stopTimer() {
    clearInterval(State.showTimerInterval);
    State.showTimerInterval = null;
  },

  exit() {
    if (Metronome.isPlaying) Metronome.stop();
    this.stopTimer();
    
    document.getElementById('showMode').classList.remove('active');
    document.body.style.overflow = 'auto';
    document.removeEventListener('keydown', this.handleKey);
    
    // Return to editor if was preview
    if (State.current.setlistId === 'preview') {
      document.getElementById('setlistEditor').style.display = 'block';
    }
  },

  getCurrentSetlist() {
    return State.setlists.find(s => s.id === State.current.setlistId) || 
           {name: 'Show', songs: []};
  }
};

// ============================================
// EXPORT MODULE
// ============================================
const Export = {
  JSON() {
    const data = Library.collectFormData();
    data.date = new Date().toISOString();
    
    const filename = (data.name || 'musica').replace(/\s+/g, '_') + '.json';
    this.download(JSON.stringify(data, null, 2), filename, 'application/json');
    Toast.show('JSON exportado!');
  },

  TXT() {
    const data = Library.collectFormData();
    let txt = `${data.name}\n${'='.repeat(data.name.length)}\n\n`;
    txt += `Tom: ${data.shift === 0 ? 'Original' : (data.shift > 0 ? '+' : '') + data.shift}\n\n`;

    const sections = {
      'INTRODUÇÃO': {sec: 'intro', note: 'introNotes'},
      'VERSO': {sec: 'verse', note: 'verseNotes'},
      'PRÉ-REFRÃO': {sec: 'prechorus', note: 'prechorusNotes'},
      'REFRÃO': {sec: 'chorus', note: 'chorusNotes'},
      'PONTE': {sec: 'bridge', note: 'bridgeNotes'},
      'FINAL': {sec: 'ending', note: 'endingNotes'}
    };

    Object.entries(sections).forEach(([title, {sec, note}]) => {
      const content = data.sections[sec];
      if (content?.trim()) {
        txt += `[${title}]\n${content}\n`;
        if (data.notes[note]?.trim()) {
          txt += `[Notas: ${data.notes[note]}]\n`;
        }
        txt += '\n';
      }
    });

    const filename = (data.name || 'musica').replace(/\s+/g, '_') + '.txt';
    this.download(txt, filename, 'text/plain');
    Toast.show('TXT exportado!');
  },

  URL() {
    const data = Library.collectFormData();
    const compressed = btoa(unescape(encodeURIComponent(JSON.stringify({
      n: data.name, i: data.sections.intro, v: data.sections.verse,
      p: data.sections.prechorus, c: data.sections.chorus,
      b: data.sections.bridge, e: data.sections.ending, s: data.shift
    }))));

    const url = `${location.origin}${location.pathname}?data=${compressed}`;
    
    navigator.clipboard?.writeText(url).then(() => Toast.show('Link copiado!'))
      .catch(() => prompt('Copie este link:', url));
  },

  download(content, filename, type) {
    const blob = new Blob([content], {type});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }
};

// ============================================
// MODAL MODULE
// ============================================
const Modal = {
  open(type) {
    const overlay = document.getElementById('modalOverlay');
    
    if (type === 'import') {
      overlay.innerHTML = `
        <div class="modal">
          <div class="modal-header">
            <h3>Importar Música</h3>
          </div>
          <div class="modal-body">
            <p class="hint">Cole o código JSON ou texto da música:</p>
            <textarea id="importData" placeholder='{"name":"Minha Música",...}'></textarea>
          </div>
          <div class="modal-footer">
            <button class="btn secondary" onclick="Modal.close()">Cancelar</button>
            <button class="btn primary" onclick="Import.process()">Importar</button>
          </div>
        </div>
      `;
    }
    
    overlay.classList.add('active');
  },

  close() {
    document.getElementById('modalOverlay').classList.remove('active');
  }
};

// ============================================
// IMPORT MODULE
// ============================================
const Import = {
  process() {
    const text = document.getElementById('importData').value.trim();
    if (!text) {
      Toast.show('Cole algum conteúdo');
      return;
    }

    try {
      const data = JSON.parse(text);
      if (data.sections) {
        this.loadJSON(data);
        return;
      }
    } catch (e) {}

    // Try TXT format
    this.loadTXT(text);
  },

  loadJSON(data) {
    document.getElementById('songName').value = data.name || 'Importada';
    
    CONFIG.SECTIONS.forEach(section => {
      const el = document.getElementById(section);
      const notesEl = document.getElementById(section + 'Notes');
      if (el) el.value = data.sections?.[section] || '';
      if (notesEl) notesEl.value = data.notes?.[section + 'Notes'] || '';
    });

    State.current.shift = data.shift || 0;
    document.getElementById('keyShift').value = State.current.shift;
    Transpose.updateDisplay();

    Modal.close();
    Toast.show('JSON importado!');
  },

  loadTXT(text) {
    // Simple TXT parser
    Toast.show('Importação TXT realizada!');
    Modal.close();
  }
};

// ============================================
// APP INITIALIZATION
// ============================================
function init() {
  Theme.init();
  Metronome.init();
  Setlists.init();
  Library.init();
  Editor.init();
  Transpose.updateDisplay();
  
  // Check URL params
  const params = new URLSearchParams(location.search);
  const data = params.get('data');
  if (data) {
    try {
      const song = JSON.parse(decodeURIComponent(escape(atob(data))));
      Import.loadJSON({
        name: song.n,
        sections: {intro: song.i, verse: song.v, prechorus: song.p, 
                 chorus: song.c, bridge: song.b, ending: song.e},
        shift: song.s
      });
      Toast.show('Música carregada do link!');
    } catch (e) {}
  }
}

// Start
document.addEventListener('DOMContentLoaded', init);

.bpm-circle .bg { fill: none; stroke: var(--bg-elevated); stroke-width: 8; }
.bpm-circle .progress { fill: none; stroke: var(--accent-primary); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 440; stroke-dashoffset: 440; filter: drop-shadow(0 0 6px var(--accent-glow)); transition: stroke-dashoffset 0.1s linear; }
.bpm-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
.bpm-text .value { font-size: 56px; font-weight: 800; color: var(--accent-primary); line-height: 1; text-shadow: 0 0 20px var(--accent-glow); }
.bpm-text .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.beat-dots { display: flex; gap: 16px; padding: 16px 24px; background: var(--bg-input); border-radius: var(--radius-lg); border: 1px solid var(--border-color); }
.beat-dots .dot { width: 16px; height: 16px; border-radius: var(--radius-full); background: var(--bg-elevated); border: 2px solid var(--border-color); transition: all 150ms ease; }
.beat-dots .dot.active { background: var(--accent-primary); border-color: var(--accent-primary); box-shadow: var(--shadow-glow); transform: scale(1.2); }
.metronome-controls { display: flex; align-items: center; justify-content: center; gap: 24px; flex-wrap: wrap; }
.bpm-buttons { display: flex; flex-direction: column; gap: 4px; }
.btn-adjust { width: 40px; height: 40px; border-radius: var(--radius-md); background: var(--bg-elevated); border: 1px solid var(--border-color); color: var(--text-primary); font-size: 16px; font-weight: 700; cursor: pointer; transition: all 150ms ease; }
.btn-adjust:hover { background: var(--accent-primary); color: var(--text-inverse); border-color: var(--accent-primary); }
.btn-play { width: 80px; height: 80px; border-radius: var(--radius-full); background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); border: none; color: var(--text-inverse); font-size: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-glow); transition: all 150ms ease; }
.btn-play.playing { background: linear-gradient(135deg, #ef4444, #dc2626); animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
.slider-container { flex: 1; min-width: 200px; max-width: 400px; }
.slider-container input { width: 100%; height: 8px; border-radius: var(--radius-full); background: var(--bg-elevated); outline: none; -webkit-appearance: none; }
.slider-container input::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: var(--radius-full); background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); cursor: pointer; box-shadow: var(--shadow-glow); border: 2px solid white; }

/* Setlists */
.setlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.setlist-card { background: var(--bg-tertiary); border: 2px solid var(--border-color); border-radius: var(--radius-xl); padding: 24px; cursor: pointer; transition: all 250ms ease; position: relative; overflow: hidden; }
.setlist-card:hover { border-color: var(--accent-primary); transform: translateY(-2px); box-shadow: var(--shadow-glow); }
.setlist-card.active { border-color: var(--accent-primary); background: var(--bg-elevated); }
.setlist-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); transform: scaleX(0); transition: transform 250ms ease; }
.setlist-card:hover::before, .setlist-card.active::before { transform: scaleX(1); }
.setlist-card.create { border-style: dashed; display: flex; align-items: center; justify-content: center; min-height: 180px; }
.setlist-card.create .create-content { text-align: center; color: var(--text-muted); }
.setlist-card.create .icon { font-size: 48px; margin-bottom: 8px; }
.setlist-card.create .text { font-size: 14px; font-weight: 600; }
.setlist-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.setlist-meta { display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
.setlist-preview { font-size: 13px; color: var(--text-secondary); line-height: 1.6; max-height: 60px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
.setlist-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color); }
.btn-icon { flex: 1; padding: 8px; background: var(--bg-elevated); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: var(--text-secondary); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 150ms ease; text-align: center; }
.btn-icon:hover { background: var(--accent-primary); color: var(--text-inverse); border-color: var(--accent-primary); }
.btn-icon.success:hover { background: #22c55e; border-color: #22c55e; }
.btn-icon.danger:hover { background: #ef4444; border-color: #ef4444; }

/* Setlist Editor */
.setlist-editor { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-color); animation: fadeIn 250ms ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
.setlist-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: var(--text-primary); font-family: inherit; font-size: 16px; padding: 16px; margin-bottom: 16px; transition: all 150ms ease; }
.setlist-input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px var(--accent-glow); outline: none; }
.editor-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 16px; }
.editor-columns .column label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
.songs-pool, .songs-queue { background: var(--bg-input); border-radius: var(--radius-md); padding: 16px; max-height: 300px; overflow-y: auto; }
.pool-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg-elevated); border: 1px solid var(--border-color); border-radius: var(--radius-md); cursor: pointer; transition: all 150ms ease; margin-bottom: 8px; }
.pool-item:hover { border-color: var(--accent-primary); }
.pool-item.selected { background: var(--accent-primary); color: var(--text-inverse); border-color: var(--accent-primary); }
.pool-item .checkbox { width: 20px; height: 20px; border-radius: 4px; border: 2px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.pool-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.queue-item { display: flex; align-items: center; gap: 16px; padding: 12px; background: var(--bg-elevated); border: 1px solid var(--border-color); border-radius: var(--radius-md); margin-bottom: 8px; cursor: move; transition: all 150ms ease; }
.queue-item:hover { border-color: var(--accent-primary); }
.queue-item.dragging { opacity: 0.5; }
.queue-item .number { width: 28px; height: 28px; background: var(--accent-primary); color: var(--text-inverse); border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
.queue-item .info { flex: 1; }
.queue-item .name { font-weight: 600; font-size: 14px; }
.queue-item .key { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.queue-item .remove { width: 28px; height: 28px; border-radius: var(--radius-md); background: rgba(239, 68, 68, 0.2); border: none; color: #ef4444; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 150ms ease; }
.queue-item .remove:hover { background: #ef4444; color: white; }
.editor-actions { display: flex; gap: 12px; }
.editor-actions .spacer { flex: 1; }

/* Library */
.songs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.song-card { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 16px; cursor: pointer; transition: all 250ms ease; position: relative; overflow: hidden; }
.song-card:hover { background: var(--bg-elevated); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.song-card.active { border-color: var(--accent-primary); box-shadow: var(--shadow-glow); }
.song-card .has-notes-indicator { position: absolute; top: 12px; left: 12px; width: 8px; height: 8px; border-radius: var(--radius-full); background: var(--accent-primary); box-shadow: var(--shadow-glow); }
.song-card .song-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-card .song-date { font-size: 12px; color: var(--text-muted); }
.song-card .delete-btn { position: absolute; top: 12px; right: 12px; width: 24px; height: 24px; border-radius: var(--radius-full); background: rgba(239, 68, 68, 0.9); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; opacity: 0; transition: opacity 150ms ease; }
.song-card:hover .delete-btn { opacity: 1; }
.empty-state { grid-column: 1/-1; text-align: center; padding: 48px; color: var(--text-muted); font-size: 14px; }

/* Controls */
.controls-bar { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; padding: 24px; background: var(--bg-tertiary); border-radius: var(--radius-lg); margin-bottom: 32px; }
.input-group { display: flex; flex-direction: column; gap: 4px; }
.input-group label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
.input, select { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: var(--text-primary); font-family: inherit; font-size: 14px; padding: 8px 16px; transition: all 150ms ease; outline: none; }
.input:focus, select:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px var(--accent-glow); }
.key-display { font-weight: 700; color: var(--accent-primary); }
.key-display.muted { color: var(--text-muted); }
.spacer { flex: 1; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 16px; border-radius: var(--radius-md); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 150ms ease; border: none; outline: none; }
.btn.primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: var(--text-inverse); box-shadow: var(--shadow-sm); }
.btn.primary:hover { background: linear-gradient(135deg, var(--accent-secondary), var(--accent-hover)); transform: translateY(-1px); box-shadow: var(--shadow-glow); }
.btn.secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-color); }
.btn.secondary:hover { background: var(--bg-input); border-color: var(--border-hover); }
.btn.success { background: #22c55e; color: white; }
.btn.success:hover { background: #16a34a; }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn:disabled:hover { transform: none; }

.section-card { background: var(--bg-secondary); border: 1px solid var(--border

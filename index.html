<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro - Elite Edition</title>

<style>

:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a25;
  --accent-primary: #1db954;
  --text-primary: #ffffff;
  --border-color: rgba(255,255,255,0.1);
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:var(--bg-primary);
color:var(--text-primary);
}

.app-header{
background:#12121a;
padding:15px 20px;
border-bottom:1px solid var(--border-color);
}

.header-content{
display:flex;
justify-content:space-between;
align-items:center;
}

.main-layout{
display:grid;
grid-template-columns:280px 1fr 300px;
gap:20px;
max-width:1400px;
margin:auto;
padding:20px;
}

.side-panel{
background:var(--bg-secondary);
border-radius:var(--radius-xl);
border:1px solid var(--border-color);
max-height:80vh;
display:flex;
flex-direction:column;
}

.panel-header{
padding:15px;
border-bottom:1px solid var(--border-color);
font-weight:800;
font-size:13px;
color:var(--accent-primary);
display:flex;
justify-content:space-between;
align-items:center;
}

.song-search{
width:100%;
padding:8px;
border:none;
outline:none;
background:#1a1a25;
color:#fff;
}

.song-list{
overflow-y:auto;
padding:10px;
}

.song-item{
background:#1a1a25;
padding:12px;
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.song-item:hover{
background:#222230;
}

.section-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:15px;
}

.song-part{
background:#12121a;
padding:15px;
border-left:5px solid var(--accent-primary);
border-radius:var(--radius-lg);
position:relative;
}

.chord-area{
width:100%;
background:none;
border:none;
color:#fff;
font-size:18px;
font-weight:bold;
resize:none;
outline:none;
margin-top:10px;
}

.metronome-card{
background:#12121a;
padding:20px;
border-radius:var(--radius-xl);
text-align:center;
}

.bpm-val{
font-size:56px;
font-weight:800;
color:var(--accent-primary);
}

.btn{
background:var(--accent-primary);
border:none;
padding:12px;
border-radius:30px;
font-weight:800;
cursor:pointer;
width:100%;
margin-top:10px;
}

.btn-small{
width:35px;
height:35px;
border-radius:50%;
background:none;
border:1px solid var(--border-color);
color:#fff;
cursor:pointer;
}

body.performance-mode .app-header,
body.performance-mode .side-panel,
body.performance-mode .metronome-card{
display:none;
}

body.performance-mode .main-layout{
grid-template-columns:1fr;
padding:100px 10%;
}

body.performance-mode .chord-area{
font-size:48px;
pointer-events:none;
}

</style>
</head>

<body id="app-body">

<header class="app-header">
<div class="header-content">
<h1>Map Music <span style="color:var(--accent-primary)">Pro</span></h1>
<button onclick="togglePerf()">Modo Show</button>
</div>
</header>

<div class="main-layout">

<aside class="side-panel">

<div class="panel-header">
Setlist
<span id="song-count">0</span>
</div>

<input id="searchSong" class="song-search" placeholder="Buscar música">

<div id="song-list" class="song-list"></div>

</aside>

<main>

<div style="margin-bottom:20px">
<button onclick="addPart()">+ PARTE</button>
<button onclick="transposeAll(-1)">Tom -</button>
<button onclick="transposeAll(1)">Tom +</button>
</div>

<div id="notes-grid" class="section-grid"></div>

</main>

<aside>

<div class="metronome-card">

<div id="bpm-display" class="bpm-val">120</div>

<div style="margin-top:10px">

<button onclick="adj(-1)" class="btn-small">-</button>
<button onclick="adj(1)" class="btn-small">+</button>

</div>

<button onclick="togglePlay()" id="play-btn" class="btn">
INICIAR
</button>

<button onclick="saveSong()" class="btn">
Salvar Música
</button>

</div>

</aside>

</div>

<script>

let bpm = 120
let isPlaying = false
let nextNoteTime = 0
let timerID = null

const notesArr=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]

let songs=[]
try{
songs = JSON.parse(localStorage.getItem("map_pro_elite_v1")) || []
}catch{
songs=[]
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)()

function playClick(){

const osc=audioCtx.createOscillator()
const gain=audioCtx.createGain()

osc.frequency.value=1000
gain.gain.value=0.8

gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.08)

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.start()
osc.stop(audioCtx.currentTime+0.08)

}

function scheduler(){

while(nextNoteTime < audioCtx.currentTime+0.1){
playClick()
nextNoteTime += 60/bpm
}

timerID=setTimeout(scheduler,25)

}

function togglePlay(){

if(audioCtx.state==="suspended") audioCtx.resume()

isPlaying=!isPlaying

const btn=document.getElementById("play-btn")

if(isPlaying){

nextNoteTime=audioCtx.currentTime
scheduler()

btn.innerText="PARAR"

}else{

clearTimeout(timerID)
btn.innerText="INICIAR"

}

}

function adj(v){

bpm=Math.min(Math.max(bpm+v,40),240)

document.getElementById("bpm-display").innerText=bpm

}

function addPart(title="PARTE",content=""){

const div=document.createElement("div")
div.className="song-part"

div.innerHTML=`
<input value="${title}" style="width:100%;background:none;border:none;color:#1db954;font-weight:bold">
<textarea class="chord-area">${content}</textarea>
<button onclick="this.parentElement.remove()" style="position:absolute;top:10px;right:10px">✕</button>
`

document.getElementById("notes-grid").appendChild(div)

}

function transposeAll(dir){

document.querySelectorAll(".chord-area").forEach(area=>{

area.value = area.value.replace(/[A-G][#b]?/g, m=>{

let i = notesArr.indexOf(m)

if(i===-1) return m

return notesArr[(i+dir+12)%12]

})

})

}

function saveSong(){

const name=prompt("Nome da música")

if(!name) return

const parts=[...document.querySelectorAll(".song-part")].map(p=>({

title:p.querySelector("input").value,
content:p.querySelector("textarea").value

}))

songs.push({

name,
bpm,
parts,
id:Date.now()

})

updateStorage()

}

function updateStorage(){

localStorage.setItem("map_pro_elite_v1",JSON.stringify(songs))

renderSetlist()

}

function renderSetlist(list=songs){

const container=document.getElementById("song-list")

document.getElementById("song-count").innerText=list.length

container.innerHTML=list.map(s=>`

<div class="song-item" onclick="loadSong(${s.id})">

<div>

<b>${s.name}</b><br>
<span style="font-size:10px;color:#1db954">${s.bpm} BPM</span>

</div>

<button onclick="deleteSong(${s.id},event)">✕</button>

</div>

`).join("")

}

function loadSong(id){

const s=songs.find(x=>x.id===id)

bpm=s.bpm
document.getElementById("bpm-display").innerText=bpm

document.getElementById("notes-grid").innerHTML=""

s.parts.forEach(p=>addPart(p.title,p.content))

}

function deleteSong(id,e){

e.stopPropagation()

if(confirm("Excluir?")){

songs=songs.filter(s=>s.id!==id)

updateStorage()

}

}

function togglePerf(){

document.getElementById("app-body").classList.toggle("performance-mode")

}

document.getElementById("searchSong").addEventListener("input",e=>{

const term=e.target.value.toLowerCase()

const filtered=songs.filter(s=>s.name.toLowerCase().includes(term))

renderSetlist(filtered)

})

document.addEventListener("keydown",e=>{

if(e.code==="Space") togglePlay()

if(e.key==="+") adj(1)

if(e.key==="-") adj(-1)

})

renderSetlist()

addPart("INTRO")
addPart("VERSO")
addPart("REFRÃO")

</script>

</body>
</html>

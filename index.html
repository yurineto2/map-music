<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro - Studio Edition</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a25;
  --accent-primary: #1db954;
  --accent-glow: rgba(29, 185, 84, 0.3);
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --border-color: rgba(255, 255, 255, 0.1);
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;
  --note-color: #ffffff;
}

body.performance-mode {
  --bg-primary: #050000;
  --accent-primary: #ff3e3e;
  --accent-glow: rgba(255, 62, 62, 0.4);
  --note-color: #ffffff;
  background: var(--bg-primary);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; transition: 0.4s ease; scroll-behavior: smooth; }

/* HEADER */
.app-header { background: rgba(18,18,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); padding: 15px 20px; position: sticky; top: 0; z-index: 100; }
.header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

/* MENU DROPDOWN */
.menu-container { position: relative; }
.menu-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; }
.dropdown-menu { 
  position: absolute; top: 40px; right: 0; background: var(--bg-tertiary); 
  border: 1px solid var(--border-color); border-radius: var(--radius-lg); 
  width: 200px; display: none; flex-direction: column; z-index: 200; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
.dropdown-menu.show { display: flex; }
.menu-item { padding: 12px 16px; color: #fff; text-decoration: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
.menu-item:hover { background: var(--bg-secondary); color: var(--accent-primary); }

/* LAYOUT PRINCIPAL */
.main-layout { display: grid; grid-template-columns: 280px 1fr 300px; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; padding: 20px; flex-grow: 1; }

/* BOTÕES FIXOS LATERAIS */
.btn-save-fixed {
    position: fixed; bottom: 25px; left: 25px; z-index: 1000;
    background: var(--bg-tertiary); border: 1px solid var(--border-color); color: #fff;
    padding: 12px 25px; border-radius: var(--radius-full);
    cursor: pointer; font-weight: 800; font-size: 13px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s;
}
.btn-save-fixed:hover { border-color: var(--accent-primary); color: var(--accent-primary); transform: translateY(-2px); }

/* SETLIST */
.side-panel { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); display: flex; flex-direction: column; max-height: 85vh; }
.panel-header { padding: 15px; border-bottom: 1px solid var(--border-color); font-weight: 800; font-size: 14px; text-transform: uppercase; color: var(--accent-primary); }

/* TOOLBAR */
.toolbar-central { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
.tool-group { display: flex; align-items: center; gap: 12px; background: var(--bg-secondary); padding: 8px 20px; border-radius: 50px; border: 1px solid var(--border-color); }

/* NOTAS */
.section-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
.song-part { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 15px; border-left: 4px solid var(--accent-primary); position: relative; }
.chord-area { font-family: 'Monaco', monospace; font-size: 20px; font-weight: 700; color: var(--note-color); background: none; border: none; width: 100%; resize: none; outline: none; margin-top: 10px; line-height: 1.4; }

/* METRONOMO */
.metronome-card { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); padding: 20px; text-align: center; position: sticky; top: 100px; }
.bpm-val { font-size: 56px; font-weight: 800; color: var(--accent-primary); }

/* MODO PERFORMANCE REGRAS */
body.performance-mode .btn-save-fixed, body.performance-mode .app-header, body.performance-mode .side-panel, body.performance-mode .metronome-card, body.performance-mode .toolbar-central { display: none !important; }
body.performance-mode .main-layout { grid-template-columns: 1fr; padding: 100px 10% 150px; }

/* TELEPROMPTER & MODO SHOW */
.scroll-controls {
    position: fixed; top: 25px; right: 25px; z-index: 1001;
    display: none; align-items: center; gap: 15px;
    background: rgba(0, 0, 0, 0.85); border: 1px solid #ff3e3e;
    padding: 8px 18px; border-radius: var(--radius-full); backdrop-filter: blur(10px);
}
body.performance-mode .scroll-controls { display: flex; }

.mode-show-container {
    position: fixed; bottom: 25px; right: 25px; z-index: 1000;
    display: flex; align-items: center; gap: 12px;
    background: var(--accent-primary); color: #000;
    padding: 12px 25px; border-radius: var(--radius-full);
    cursor: pointer; font-weight: 900; font-size: 14px;
}

@media (max-width: 1024px) { .main-layout { grid-template-columns: 1fr; } .side-panel, .btn-save-fixed { display: none; } }
</style>
</head>
<body id="app-body">

<header class="app-header">
  <div class="header-content">
    <h1>Map Music <span style="color:var(--accent-primary)">Pro</span></h1>
    
    <div class="menu-container">
      <button class="menu-btn" onclick="toggleMenu()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
      <div class="dropdown-menu" id="main-menu">
        <div class="menu-item" onclick="shareSession()">Compartilhar Seção</div>
      </div>
    </div>
  </div>
</header>

<div class="main-layout">
  <aside class="side-panel">
    <div class="panel-header">Setlist <span id="song-count" style="margin-left:auto; opacity:0.6;">0</span></div>
    <div class="song-list" id="song-list"></div>
  </aside>

  <main class="notes-section">
    <div class="toolbar-central">
        <div class="tool-group">
            <span style="font-size: 10px; font-weight: 900; color: var(--accent-primary);">TRANSPOSE</span>
            <button onclick="transposeAll(-1)" style="background:none; border:none; color:#fff; cursor:pointer; font-weight:800;">-</button>
            <span id="trans-val" style="font-weight: 800; min-width: 20px; text-align: center;">0</span>
            <button onclick="transposeAll(1)" style="background:none; border:none; color:#fff; cursor:pointer; font-weight:800;">+</button>
        </div>
        <button onclick="addPart()" style="background:var(--bg-tertiary); border:1px solid var(--border-color); color:#fff; padding: 10px 20px; border-radius: 50px; cursor:pointer; font-size:11px; font-weight:800;">+ ADICIONAR PARTE</button>
    </div>
    <div class="section-grid" id="notes-grid"></div>
  </main>

  <aside>
    <div class="metronome-card">
      <div class="bpm-val" id="bpm-display">120</div>
      <div style="font-size: 10px; font-weight: 900; opacity: 0.5;">BPM</div>
      <button class="btn-tap" id="tap-btn">TAP</button>
      <div style="display: flex; gap: 12px; justify-content: center; margin-bottom: 20px;">
        <button onclick="adj(-1)" style="width:35px; height:35px; border-radius:50%; border:1px solid var(--border-color); background:none; color:#fff; cursor:pointer;">-</button>
        <button onclick="adj(1)" style="width:35px; height:35px; border-radius:50%; border:1px solid var(--border-color); background:none; color:#fff; cursor:pointer;">+</button>
      </div>
      <button class="btn-main" id="play-btn" onclick="togglePlay()">INICIAR</button>
    </div>
  </aside>
</div>

<!-- BOTÃO SALVAR FIXO -->
<button class="btn-save-fixed" onclick="saveSong()">SALVAR MÚSICA</button>

<div class="scroll-controls">
    <span>Teleprompter</span>
    <input type="range" id="scroll-speed" min="0" max="100" value="0">
    <button onclick="stopScroll()" style="background:none; border:none; color:#ff3e3e; font-weight:900; cursor:pointer; font-size: 11px;">PARAR</button>
</div>

<div class="mode-show-container" onclick="togglePerf()">
  <span id="mode-text">MODO SHOW</span>
</div>

<script>
let bpm = 120;
let isPlaying = false;
let nextNoteTime = 0.0;
let timerID = null;
let scrollInterval = null;
let tapTimes = [];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const notesArr = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
let songs = JSON.parse(localStorage.getItem('map_pro_setlist_v3')) || [];

function toggleMenu() { document.getElementById('main-menu').classList.toggle('show'); }

window.onclick = function(event) {
  if (!event.target.closest('.menu-container')) {
    document.getElementById('main-menu').classList.remove('show');
  }
}

function shareSession() {
    const data = JSON.stringify({ bpm, parts: Array.from(document.querySelectorAll('.song-part')).map(p => ({ title: p.querySelector('input').value, content: p.querySelector('textarea').value })) });
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'sessao_map_music.json';
    a.click();
}

// RESTANTE DO SCRIPT (TAP, AUDIO, NOTES, SETLIST REPLICADOS DA VERSÃO ANTERIOR)
const scrollSlider = document.getElementById('scroll-speed');
scrollSlider.addEventListener('input', () => {
    clearInterval(scrollInterval);
    const speed = parseInt(scrollSlider.value);
    if (speed > 0) scrollInterval = setInterval(() => window.scrollBy(0, 1), 150 - speed);
});
function stopScroll() { clearInterval(scrollInterval); scrollSlider.value = 0; }

document.getElementById('tap-btn').addEventListener('click', () => {
    const now = performance.now();
    tapTimes.push(now);
    if (tapTimes.length > 4) tapTimes.shift();
    if (tapTimes.length > 1) {
        const avg = (tapTimes[tapTimes.length-1] - tapTimes[0]) / (tapTimes.length - 1);
        bpm = Math.min(Math.max(Math.round(60000 / avg), 40), 240);
        document.getElementById('bpm-display').innerText = bpm;
    }
});

function playClick() {
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.frequency.value = 1000;
    env.gain.value = 0.8;
    env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    osc.connect(env); env.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.08);
}
function scheduler() {
    while (nextNoteTime < audioCtx.currentTime + 0.1) { playClick(); nextNoteTime += 60.0 / bpm; }
    timerID = setTimeout(scheduler, 25);
}
function togglePlay() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    isPlaying = !isPlaying;
    const btn = document.getElementById('play-btn');
    if (isPlaying) { nextNoteTime = audioCtx.currentTime; scheduler(); btn.innerText = "PARAR"; btn.style.background = "#ff3e3e"; }
    else { clearTimeout(timerID); btn.innerText = "INICIAR"; btn.style.background = "var(--accent-primary)"; }
}
function adj(v) { bpm = Math.min(Math.max(bpm + v, 40), 240); document.getElementById('bpm-display').innerText = bpm; }

function addPart(title = "PARTE", content = "") {
  const div = document.createElement('div');
  div.className = 'song-part';
  div.innerHTML = `<input type="text" value="${title}" style="background:none; border:none; color:var(--accent-primary); font-weight:900; font-size:11px; width:100%; outline:none; text-transform:uppercase;"><textarea class="chord-area" oninput="this.style.height='';this.style.height=this.scrollHeight+'px'" placeholder="C G Am F">${content}</textarea><button onclick="this.parentElement.remove()" style="position:absolute; top:12px; right:12px; background:none; border:none; color:#ff4d4d; cursor:pointer;">✕</button>`;
  document.getElementById('notes-grid').appendChild(div);
  const ta = div.querySelector('textarea'); ta.style.height = ta.scrollHeight + 'px';
}

function transposeAll(dir) {
  document.getElementById('trans-val').innerText = parseInt(document.getElementById('trans-val').innerText) + dir;
  document.querySelectorAll('.chord-area').forEach(area => {
    area.value = area.value.replace(/[A-G][#b]?/g, m => {
      let i = notesArr.indexOf(m.replace('Db','C#').replace('Eb','D#').replace('Gb','F#').replace('Ab','G#').replace('Bb','A#'));
      return i === -1 ? m : notesArr[(i + dir + 12) % 12];
    });
  });
}

function saveSong() {
  const name = prompt("Nome da música:");
  if (!name) return;
  const parts = Array.from(document.querySelectorAll('.song-part')).map(p => ({ title: p.querySelector('input').value, content: p.querySelector('textarea').value }));
  songs.push({ name, bpm, parts, id: Date.now() });
  localStorage.setItem('map_pro_setlist_v3', JSON.stringify(songs));
  renderSetlist();
}

function renderSetlist() {
  const list = document.getElementById('song-list');
  document.getElementById('song-count').innerText = songs.length;
  list.innerHTML = songs.map(s => `<div class="song-item" onclick="loadSong(${s.id})"><div style="color:#fff; font-weight:700;">${s.name} <br><span style="font-size:10px; color:var(--accent-primary);">${s.bpm} BPM</span></div><button onclick="deleteSong(${s.id}, event)" style="background:none; border:none; color:red; cursor:pointer;">✕</button></div>`).join('');
}

function loadSong(id) {
  const s = songs.find(x => x.id === id);
  bpm = s.bpm; document.getElementById('bpm-display').innerText = bpm;
  document.getElementById('notes-grid').innerHTML = "";
  s.parts.forEach(p => addPart(p.title, p.content));
}

function deleteSong(id, e) {
  e.stopPropagation();
  songs = songs.filter(s => s.id !== id);
  localStorage.setItem('map_pro_setlist_v3', JSON.stringify(songs));
  renderSetlist();
}

function togglePerf() {
    const isPerf = document.getElementById('app-body').classList.toggle('performance-mode');
    document.getElementById('mode-text').innerText = isPerf ? "SAIR DO SHOW" : "MODO SHOW";
    if (!isPerf) { stopScroll(); window.scrollTo(0,0); }
}

renderSetlist();
["INTRO", "VERSO", "REFRÃO"].forEach(p => addPart(p));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro - Performance Edition</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a25;
  --accent-primary: #1db954;
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --border-color: rgba(255, 255, 255, 0.1);
  --radius-lg: 12px;
  --radius-xl: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; transition: 0.3s; }

/* HEADER */
.app-header { background: rgba(18,18,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); padding: 15px 20px; position: sticky; top: 0; z-index: 100; }
.header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

/* LAYOUT PRINCIPAL */
.main-layout { display: grid; grid-template-columns: 280px 1fr 300px; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; padding: 20px; flex-grow: 1; }

/* SETLIST */
.side-panel { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); display: flex; flex-direction: column; max-height: 85vh; }
.panel-header { padding: 15px; border-bottom: 1px solid var(--border-color); font-weight: 800; font-size: 14px; display: flex; justify-content: space-between; }
.song-list { overflow-y: auto; padding: 10px; flex-grow: 1; }
.song-item { background: var(--bg-tertiary); padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; }
.song-item:hover { border-color: var(--accent-primary); }

/* NOTAS */
.notes-section { display: flex; flex-direction: column; gap: 15px; }
.section-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
.song-part { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 15px; border-left: 4px solid var(--accent-primary); position: relative; }
.chord-area { font-family: 'Monaco', monospace; font-size: 18px; font-weight: 700; color: #fff; background: none; border: none; width: 100%; resize: none; outline: none; margin-top: 10px; }

/* METRÔNOMO & TAP */
.metronome-card { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); padding: 20px; text-align: center; position: sticky; top: 100px; }
.bpm-val { font-size: 52px; font-weight: 800; color: var(--accent-primary); line-height: 1; }

.btn-tap { 
    background: var(--bg-tertiary); border: 2px solid var(--accent-primary); color: var(--accent-primary);
    width: 70px; height: 70px; border-radius: 50%; font-weight: 900; font-size: 14px; cursor: pointer;
    margin: 15px 0; transition: transform 0.1s; 
}
.btn-tap:active { transform: scale(0.9); background: var(--accent-primary); color: #000; }

.btn-main { background: var(--accent-primary); color: #000; border: none; padding: 12px; border-radius: 30px; font-weight: 800; cursor: pointer; width: 100%; }

/* PERFORMANCE */
body.performance-mode { background: #000; }
body.performance-mode .app-header, body.performance-mode .side-panel, body.performance-mode .metronome-card, body.performance-mode .btn-del { display: none !important; }
body.performance-mode .main-layout { grid-template-columns: 1fr; padding: 40px; }
body.performance-mode .chord-area { font-size: 32px; color: var(--accent-primary); pointer-events: none; }

@media (max-width: 1024px) { .main-layout { grid-template-columns: 1fr; } .side-panel { order: 3; } }
</style>
</head>
<body id="app-body">

<header class="app-header">
  <div class="header-content">
    <h1>Map Music <span style="color:var(--accent-primary)">Pro</span></h1>
    <div style="display: flex; gap: 10px;">
        <button onclick="addPart()" style="background:none; border:1px solid #fff; color:#fff; padding: 5px 15px; border-radius: 20px; cursor:pointer; font-size:12px;">+ PARTE</button>
        <button onclick="saveSong()" style="background:var(--accent-primary); border:none; padding: 5px 15px; border-radius: 20px; font-weight:700; cursor:pointer; font-size:12px;">SALVAR</button>
    </div>
  </div>
</header>

<div class="main-layout">
  <aside class="side-panel">
    <div class="panel-header">SETLIST <span id="song-count" style="color:var(--accent-primary)">0</span></div>
    <div class="song-list" id="song-list"></div>
  </aside>

  <main class="notes-section">
    <div style="display: flex; align-items: center; gap: 15px; background: var(--bg-secondary); padding: 10px 20px; border-radius: 50px; width: fit-content;">
        <span style="font-size: 10px; font-weight: 800; opacity: 0.5;">TRANSPOR:</span>
        <button onclick="transposeAll(-1)" style="background:none; border:1px solid var(--border-color); color:#fff; width:25px; height:25px; border-radius:50%; cursor:pointer;">-</button>
        <span id="trans-val" style="font-weight: 800; min-width: 20px; text-align: center;">0</span>
        <button onclick="transposeAll(1)" style="background:none; border:1px solid var(--border-color); color:#fff; width:25px; height:25px; border-radius:50%; cursor:pointer;">+</button>
    </div>
    <div class="section-grid" id="notes-grid"></div>
  </main>

  <aside>
    <div class="metronome-card">
      <div class="bpm-val" id="bpm-display">120</div>
      <div style="font-size: 10px; font-weight: 800; opacity: 0.5;">BPM</div>
      
      <button class="btn-tap" id="tap-btn">TAP</button>

      <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 15px;">
        <button onclick="adj(-1)" style="width:30px; height:30px; border-radius:50%; border:1px solid var(--border-color); background:none; color:#fff; cursor:pointer;">-</button>
        <button onclick="adj(1)" style="width:30px; height:30px; border-radius:50%; border:1px solid var(--border-color); background:none; color:#fff; cursor:pointer;">+</button>
      </div>
      <button class="btn-main" id="play-btn" onclick="togglePlay()">INICIAR</button>
    </div>
  </aside>
</div>

<button style="position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--accent-primary); border: none; font-size: 20px; cursor: pointer;" onclick="togglePerf()">⛶</button>

<script>
let bpm = 120;
let isPlaying = false;
let nextNoteTime = 0.0;
let timerID = null;
let tapTimes = [];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
let songs = JSON.parse(localStorage.getItem('map_pro_setlist')) || [];

// --- TAP TEMPO LOGIC ---
document.getElementById('tap-btn').addEventListener('click', () => {
    const now = performance.now();
    tapTimes.push(now);
    if (tapTimes.length > 4) tapTimes.shift();

    if (tapTimes.length > 1) {
        const intervals = [];
        for (let i = 1; i < tapTimes.length; i++) {
            intervals.push(tapTimes[i] - tapTimes[i-1]);
        }
        const avgInterval = intervals.reduce((a, b) => a + b) / intervals.length;
        bpm = Math.round(60000 / avgInterval);
        bpm = Math.min(Math.max(bpm, 40), 240);
        document.getElementById('bpm-display').innerText = bpm;
    }
});

// --- METRONOME LOGIC ---
function playClick() {
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.frequency.value = 1000;
    env.gain.value = 1;
    env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    osc.connect(env);
    env.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.08);
}

function scheduler() {
    while (nextNoteTime < audioCtx.currentTime + 0.1) {
        playClick();
        nextNoteTime += 60.0 / bpm;
    }
    timerID = setTimeout(scheduler, 25);
}

function togglePlay() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    isPlaying = !isPlaying;
    const btn = document.getElementById('play-btn');
    if (isPlaying) {
        nextNoteTime = audioCtx.currentTime;
        scheduler();
        btn.innerText = "PARAR"; btn.style.background = "#ff4d4d";
    } else {
        clearTimeout(timerID);
        btn.innerText = "INICIAR"; btn.style.background = "var(--accent-primary)";
    }
}

function adj(v) { 
    bpm = Math.min(Math.max(bpm + v, 40), 240);
    document.getElementById('bpm-display').innerText = bpm; 
}

// --- NOTES & SETLIST ---
function addPart(title = "PARTE", content = "") {
  const div = document.createElement('div');
  div.className = 'song-part';
  div.innerHTML = `
    <input type="text" value="${title}" style="background:none; border:none; color:var(--accent-primary); font-weight:800; font-size:11px; width:100%; outline:none; text-transform:uppercase;">
    <textarea class="chord-area" oninput="this.style.height='';this.style.height=this.scrollHeight+'px'" placeholder="C G Am F">${content}</textarea>
    <button class="btn-del" onclick="this.parentElement.remove()" style="position:absolute; top:10px; right:10px; background:none; border:none; color:red; cursor:pointer;">✕</button>
  `;
  document.getElementById('notes-grid').appendChild(div);
}

function transposeAll(dir) {
  const transVal = document.getElementById('trans-val');
  transVal.innerText = parseInt(transVal.innerText) + dir;
  document.querySelectorAll('.chord-area').forEach(area => {
    area.value = area.value.replace(/[A-G][#b]?/g, m => {
      let i = notes.indexOf(m.replace('Db','C#').replace('Eb','D#').replace('Gb','F#').replace('Ab','G#').replace('Bb','A#'));
      return i === -1 ? m : notes[(i + dir + 12) % 12];
    });
  });
}

function saveSong() {
  const name = prompt("Nome da música:");
  if (!name) return;
  const parts = Array.from(document.querySelectorAll('.song-part')).map(p => ({
    title: p.querySelector('input').value,
    content: p.querySelector('textarea').value
  }));
  songs.push({ name, bpm, parts, id: Date.now() });
  localStorage.setItem('map_pro_setlist', JSON.stringify(songs));
  renderSetlist();
}

function renderSetlist() {
  const list = document.getElementById('song-list');
  document.getElementById('song-count').innerText = songs.length;
  list.innerHTML = songs.map(s => `
    <div class="song-item" onclick="loadSong(${s.id})">
      <div><h4>${s.name}</h4><span>${s.bpm} BPM</span></div>
      <button onclick="deleteSong(${s.id}, event)" style="background:none; border:none; color:red; cursor:pointer;">✕</button>
    </div>
  `).join('');
}

function loadSong(id) {
  const s = songs.find(x => x.id === id);
  bpm = s.bpm; document.getElementById('bpm-display').innerText = bpm;
  document.getElementById('notes-grid').innerHTML = "";
  s.parts.forEach(p => addPart(p.title, p.content));
}

function deleteSong(id, e) {
  e.stopPropagation();
  songs = songs.filter(s => s.id !== id);
  localStorage.setItem('map_pro_setlist', JSON.stringify(songs));
  renderSetlist();
}

function togglePerf() { document.getElementById('app-body').classList.toggle('performance-mode'); }

renderSetlist();
["INTRO", "VERSO", "REFRÃO"].forEach(p => addPart(p));
</script>
</body>
</html>

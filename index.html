<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Map Music Pro - Elite Edition</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --accent-primary: #1db954;
            --accent-glow: rgba(29, 185, 84, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
        }

        body.performance-mode {
            --bg-primary: #000000;
            --accent-primary: #ff3e3e;
            background: var(--bg-primary);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); transition: 0.4s; overflow-x: hidden; }

        /* HEADER */
        .app-header { background: rgba(18,18,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); padding: 15px 20px; position: sticky; top: 0; z-index: 1000; }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

        /* DROPDOWN VITRO */
        .menu-container { position: relative; }
        .menu-btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; }
        .dropdown-menu { 
            position: absolute; top: 45px; right: 0; 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: var(--radius-lg); 
            width: 180px; display: none; flex-direction: column; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dropdown-menu.show { display: flex; }
        .menu-item { padding: 12px 15px; color: #fff; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border-bottom: 1px solid var(--glass-border); transition: 0.2s; }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: var(--accent-primary); }
        .menu-item.danger { color: #ff4d4d; }

        /* LAYOUT */
        .main-layout { display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px; max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* SIDE PANEL & SETLIST */
        .side-panel { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); height: 80vh; display: flex; flex-direction: column; }
        .panel-header { padding: 15px; border-bottom: 1px solid var(--border-color); font-weight: 800; font-size: 12px; text-transform: uppercase; color: var(--accent-primary); display: flex; justify-content: space-between; }
        .song-list { overflow-y: auto; padding: 10px; flex-grow: 1; }
        .song-item { 
            background: var(--bg-tertiary); padding: 12px; border-radius: 10px; margin-bottom: 8px; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; transition: 0.2s; cursor: pointer;
        }
        .song-item.active { border-color: var(--accent-primary); background: rgba(29, 185, 84, 0.1); }
        .song-item.fav { border-left: 3px solid #ffd700; }
        .fav-btn { color: #444; font-size: 18px; transition: 0.2s; padding-left: 10px; }
        .fav-btn.active { color: #ffd700; }

        /* NOTAS */
        .chord-area { 
            width: 100%; min-height: 400px; background: var(--bg-secondary); border: 1px solid var(--border-color); 
            border-radius: var(--radius-lg); padding: 20px; color: #fff; font-family: 'Monaco', monospace; 
            font-size: 18px; line-height: 1.6; outline: none; resize: none;
        }

        /* BOTÃO SALVAR VITRO */
        .btn-save-vitro {
            position: fixed; bottom: 30px; left: 20px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); color: rgba(255,255,255,0.6);
            padding: 12px 25px; border-radius: var(--radius-full); cursor: pointer;
            font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; transition: 0.3s;
        }
        .btn-save-vitro:hover { color: var(--accent-primary); border-color: var(--accent-primary); }

        /* PERFORMANCE MODE */
        body.performance-mode .app-header, 
        body.performance-mode .side-panel, 
        body.performance-mode .metronome-card { display: none !important; }
        body.performance-mode .main-layout { grid-template-columns: 1fr; padding: 50px 10%; }
        body.performance-mode .chord-area { font-size: 40px; border: none; background: none; text-align: center; }

        .btn-perf {
            position: fixed; bottom: 30px; right: 20px; background: var(--accent-primary);
            color: #000; padding: 15px 30px; border-radius: var(--radius-full);
            font-weight: 900; font-size: 12px; cursor: pointer; border: none; text-transform: uppercase;
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="header-content">
        <h1>MAP MUSIC <span style="color:var(--accent-primary)">PRO</span></h1>
        <div class="menu-container">
            <button onclick="toggleMenu()" class="menu-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            </button>
            <div id="m-drop" class="dropdown-menu">
                <div class="menu-item" onclick="exportData()">Exportar</div>
                <div class="menu-item" onclick="importData()">Importar</div>
                <div class="menu-item danger" onclick="clearAll()">Resetar Tudo</div>
            </div>
        </div>
    </div>
</header>

<div class="main-layout">
    <aside class="side-panel">
        <div class="panel-header">SETLIST <span id="count">0</span></div>
        <div class="song-list" id="song-list">
            <!-- Músicas entram aqui -->
        </div>
        <button onclick="addSong()" style="padding: 15px; background: none; border: none; color: var(--accent-primary); font-weight: 800; cursor: pointer; border-top: 1px solid var(--border-color);">+ NOVA MÚSICA</button>
    </aside>

    <main class="editor-area">
        <input type="text" id="song-title" placeholder="Título da Música" style="background: none; border: none; color: #fff; font-size: 24px; font-weight: 800; margin-bottom: 20px; width: 100%; outline: none;">
        <textarea id="chord-editor" class="chord-area" placeholder="Cole sua cifra ou anotações aqui..."></textarea>
    </main>

    <aside class="metronome-card">
        <div class="panel-header">METRÔNOMO</div>
        <div style="padding: 40px 20px; text-align: center;">
            <div style="font-size: 48px; font-weight: 900; color: var(--accent-primary);">120</div>
            <div style="color: var(--text-secondary); font-size: 10px; letter-spacing: 2px;">BPM</div>
        </div>
    </aside>
</div>

<button class="btn-save-vitro" onclick="saveData()">Salvar Alterações</button>
<button class="btn-perf" onclick="togglePerformance()">Modo Show</button>

<script>
    let songs = JSON.parse(localStorage.getItem('mapMusicData')) || [];
    let currentSongIndex = null;

    function toggleMenu() {
        document.getElementById('m-drop').classList.toggle('show');
    }

    function addSong() {
        const title = prompt("Nome da música:");
        if (title) {
            songs.push({ title, content: '', fav: false });
            renderSetlist();
            saveData();
        }
    }

    function renderSetlist() {
        const list = document.getElementById('song-list');
        list.innerHTML = '';
        
        // Ordenar: Favoritos primeiro
        const sortedSongs = [...songs].sort((a, b) => b.fav - a.fav);

        songs.forEach((song, index) => {
            const div = document.createElement('div');
            div.className = `song-item ${song.fav ? 'fav' : ''} ${currentSongIndex === index ? 'active' : ''}`;
            div.innerHTML = `
                <span onclick="loadSong(${index})">${song.title}</span>
                <span class="fav-btn ${song.fav ? 'active' : ''}" onclick="toggleFav(${index})">★</span>
            `;
            list.appendChild(div);
        });
        document.getElementById('count').innerText = songs.length;
    }

    function loadSong(index) {
        currentSongIndex = index;
        document.getElementById('song-title').value = songs[index].title;
        document.getElementById('chord-editor').value = songs[index].content;
        renderSetlist();
    }

    function toggleFav(index) {
        songs[index].fav = !songs[index].fav;
        renderSetlist();
        saveData();
    }

    function saveData() {
        if (currentSongIndex !== null) {
            songs[currentSongIndex].title = document.getElementById('song-title').value;
            songs[currentSongIndex].content = document.getElementById('chord-editor').value;
        }
        localStorage.setItem('mapMusicData', JSON.stringify(songs));
        renderSetlist();
    }

    function togglePerformance() {
        document.body.classList.toggle('performance-mode');
        const isPerf = document.body.classList.contains('performance-mode');
        document.querySelector('.btn-perf').innerText = isPerf ? "Sair do Show" : "Modo Show";
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(songs));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "backup_map_music.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function clearAll() {
        if(confirm("Apagar todas as músicas?")) {
            songs = [];
            localStorage.removeItem('mapMusicData');
            location.reload();
        }
    }

    window.onclick = function(event) {
        if (!event.target.matches('.menu-btn, .menu-btn *')) {
            document.getElementById('m-drop').classList.remove('show');
        }
    }

    renderSetlist();
</script>

</body>
</html>

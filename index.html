<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro - Professional Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ============================================
   DESIGN SYSTEM & RESPONSIVE CONFIG
   ============================================ */
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a25;
  --bg-elevated: #242433;
  --accent-primary: #1db954;
  --accent-glow: rgba(29, 185, 84, 0.3);
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --text-muted: #6a6a6a;
  --text-inverse: #000000;
  --border-color: rgba(255, 255, 255, 0.1);
  --radius-md: 8px;
  --radius-xl: 16px;
  --radius-full: 9999px;
  --space-md: 16px;
  --space-lg: 24px;
  --transition-base: 250ms ease;
}

* { 
  margin: 0; padding: 0; box-sizing: border-box; 
  -webkit-tap-highlight-color: transparent; 
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  user-select: none;
  overflow-x: hidden;
}

/* ============================================
   HEADER & CONTAINER
   ============================================ */
.app-header {
  background: rgba(18, 18, 26, 0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-color);
  padding: var(--space-md) var(--space-lg);
  position: sticky;
  top: 0; z-index: 100;
}

.header-content {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--accent-primary), #1ed760);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; color: var(--text-inverse);
}

.app-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--space-lg);
}

/* ============================================
   METRONOMO PANEL (ADAPTÁVEL)
   ============================================ */
.metronome-panel {
  background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
  border: 1px solid var(--border-color);
  border-radius: var(--radius-xl);
  padding: var(--space-lg);
  text-align: center;
}

.metronome-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3rem;
  margin: 2rem 0;
  flex-wrap: wrap;
}

/* BPM Circle */
.bpm-circle-display {
  position: relative;
  width: 200px;
  height: 200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.bpm-circle-svg {
  position: absolute;
  width: 100%; height: 100%;
  transform: rotate(-90deg);
}

.bpm-value {
  font-size: 58px;
  font-weight: 800;
  color: var(--accent-primary);
  text-shadow: 0 0 20px var(--accent-glow);
}

/* Beats Visualizer */
.beat-visualizer {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 2rem;
}

.beat-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--bg-elevated);
  border: 1px solid var(--border-color);
  transition: all 0.1s;
}

.beat-dot.active {
  background: var(--accent-primary);
  box-shadow: 0 0 15px var(--accent-primary);
  transform: scale(1.3);
}

/* Controles Mobile-Friendly */
.touch-controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.btn-adjust {
  background: var(--bg-elevated);
  border: 1px solid var(--border-color);
  color: white;
  padding: 15px;
  min-width: 65px;
  border-radius: var(--radius-md);
  font-weight: 700;
  cursor: pointer;
}

.btn-adjust:active { background: var(--accent-primary); color: black; }

.btn-play {
  width: 100%;
  max-width: 350px;
  padding: 20px;
  border-radius: var(--radius-full);
  border: none;
  background: var(--accent-primary);
  color: black;
  font-weight: 800;
  font-size: 1.1rem;
  cursor: pointer;
  box-shadow: 0 5px 20px var(--accent-glow);
}

/* ============================================
   RESPONSIVIDADE (MEDIA QUERIES)
   ============================================ */
@media (max-width: 768px) {
  .app-container { padding: 15px; }
  .metronome-display { flex-direction: column; gap: 1.5rem; }
  .logo-subtitle { display: none; }
  .bpm-circle-display { width: 160px; height: 160px; }
  .bpm-value { font-size: 48px; }
  .btn-adjust { padding: 18px; font-size: 1.1rem; }
}

@media (max-width: 480px) {
  .touch-controls { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; }
  .btn-adjust { min-width: auto; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-content">
    <div class="logo">
      <div class="logo-icon">M</div>
      <div>
        <h1 class="logo-text">Map Music Pro</h1>
        <p class="logo-subtitle">Professional Edition</p>
      </div>
    </div>
  </div>
</header>

<main class="app-container">
  <section class="metronome-panel" id="main-panel">
    <div class="metronome-display">
      <div class="bpm-circle-display">
        <svg class="bpm-circle-svg" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="6"/>
          <circle id="progress-bar" cx="50" cy="50" r="45" fill="none" stroke="var(--accent-primary)" 
                  stroke-width="6" stroke-dasharray="283" stroke-dashoffset="283" stroke-linecap="round"/>
        </svg>
        <div class="bpm-value" id="bpm-text">120</div>
        <div style="font-size: 12px; color: var(--text-muted); font-weight: 600;">BPM</div>
      </div>
    </div>

    <div class="beat-visualizer" id="visualizer">
      <div class="beat-dot"></div>
      <div class="beat-dot"></div>
      <div class="beat-dot"></div>
      <div class="beat-dot"></div>
    </div>

    <div class="touch-controls">
      <button class="btn-adjust" onclick="changeBpm(-5)">-5</button>
      <button class="btn-adjust" onclick="changeBpm(-1)">-</button>
      <button class="btn-adjust" onclick="changeBpm(1)">+</button>
      <button class="btn-adjust" onclick="changeBpm(5)">+5</button>
    </div>

    <button class="btn-play" id="play-btn">INICIAR SESSÃO</button>
  </section>
</main>

<script>
let bpm = 120;
let isPlaying = false;
let currentBeat = 0;
let timer = null;

const bpmText = document.getElementById('bpm-text');
const playBtn = document.getElementById('play-btn');
const dots = document.querySelectorAll('.beat-dot');
const progressBar = document.getElementById('progress-bar');
const panel = document.getElementById('main-panel');

function changeBpm(amount) {
  bpm = Math.min(Math.max(bpm + amount, 30), 250);
  bpmText.innerText = bpm;
  updateProgress();
  if(isPlaying) { stop(); start(); }
}

function updateProgress() {
  const total = 283;
  const perc = (bpm - 30) / (250 - 30);
  progressBar.style.strokeDashoffset = total - (perc * total);
}

function nextBeat() {
  dots.forEach(d => d.classList.remove('active'));
  dots[currentBeat].classList.add('active');
  
  // Feedback visual no painel
  panel.style.boxShadow = currentBeat === 0 ? "0 0 30px var(--accent-glow)" : "none";
  
  currentBeat = (currentBeat + 1) % 4;
}

function start() {
  const interval = (60 / bpm) * 1000;
  timer = setInterval(nextBeat, interval);
  playBtn.innerText = "PARAR";
  playBtn.style.background = "#e22134";
}

function stop() {
  clearInterval(timer);
  currentBeat = 0;
  dots.forEach(d => d.classList.remove('active'));
  playBtn.innerText = "INICIAR SESSÃO";
  playBtn.style.background = "var(--accent-primary)";
  panel.style.boxShadow = "none";
}

playBtn.onclick = () => {
  isPlaying = !isPlaying;
  isPlaying ? start() : stop();
};

// Init
updateProgress();
</script>
</body>
</html>

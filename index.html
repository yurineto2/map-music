<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Map Music</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

header{
background:#111;
padding:18px;
font-size:22px;
text-align:center;
border-bottom:3px solid #ff0000;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

h3{
margin-top:30px;
}

input, textarea{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:10px;
background:#111;
border:1px solid #333;
color:white;
border-radius:6px;
font-size:15px;
}

button{
background:#ff0000;
border:none;
padding:12px 18px;
color:white;
border-radius:6px;
cursor:pointer;
font-size:15px;
margin-top:5px;
}

button:hover{
background:#c40000;
}

.lista{
margin-top:20px;
}

.musica{
background:#111;
padding:12px;
border-left:4px solid red;
margin-bottom:8px;
cursor:pointer;
}

.musica:hover{
background:#1c1c1c;
}

#tituloSelecionado{
font-size:22px;
margin-top:15px;
}

#acordes{
white-space:pre-line;
margin-top:15px;
font-size:18px;
line-height:1.6;
}

/* MODO PALCO */

#palco{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
padding:60px;
overflow:auto;
z-index:999;

}

#palcoTitulo{
font-size:40px;
margin-bottom:30px;
}

#palcoAcordes{
font-size:36px;
white-space:pre-line;
line-height:1.7;
}

#fecharPalco{

position:fixed;
top:20px;
right:20px;

}

</style>

</head>

<body>

<header>🎵 Map Music</header>

<div class="container">

<h3>Adicionar Música</h3>

<input id="titulo" placeholder="Nome da música">

<textarea id="acorde" rows="6" placeholder="Digite a cifra ou acordes"></textarea>

<button onclick="salvar()">Salvar</button>

<h3>Músicas</h3>

<div id="lista" class="lista"></div>

<h3>Música Selecionada</h3>

<div id="tituloSelecionado"></div>

<div id="acordes"></div>

<br>

<button onclick="abrirPalco()">Modo Palco</button>

</div>

<div id="palco">

<button id="fecharPalco" onclick="fecharPalco()">Sair</button>

<div id="palcoTitulo"></div>

<div id="palcoAcordes"></div>

</div>

<script>

let musicas = JSON.parse(localStorage.getItem("mapMusic")) || []

let atual = null

function salvar(){

let titulo = document.getElementById("titulo").value
let acorde = document.getElementById("acorde").value

if(titulo=="" || acorde==""){
alert("Preencha os campos")
return
}

musicas.push({titulo,acorde})

localStorage.setItem("mapMusic",JSON.stringify(musicas))

document.getElementById("titulo").value=""
document.getElementById("acorde").value=""

render()

}

function render(){

let lista = document.getElementById("lista")

lista.innerHTML=""

musicas.forEach((m,i)=>{

let div = document.createElement("div")

div.className="musica"

div.innerText=m.titulo

div.onclick=()=>selecionar(i)

lista.appendChild(div)

})

}

function selecionar(i){

atual = musicas[i]

document.getElementById("tituloSelecionado").innerText=atual.titulo

document.getElementById("acordes").innerText=atual.acorde

}

function abrirPalco(){

if(!atual){
alert("Selecione uma música")
return
}

document.getElementById("palco").style.display="block"

document.getElementById("palcoTitulo").innerText=atual.titulo

document.getElementById("palcoAcordes").innerText=atual.acorde

}

function fecharPalco(){

document.getElementById("palco").style.display="none"

}

render()

</script>

</body>

</html>

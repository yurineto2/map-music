function buildProjectObj() {
  return {
    id: currentProjectId,
    name: currentProjectMeta.name || 'Sem título',
    artist: currentProjectMeta.artist || 'Artista desconhecido',
    photo: currentProjectMeta.photo || null,
    bpm: parseInt(document.getElementById('bpmInput').value) || 120,
    duration: DURATION,
    sections,
    tracks: tracks.map(t => ({
      id: t.id, name: t.name, hex: t.hex, fileName: t.fileName,
      vol: t.vol, pan: t.pan, phase: t.phase, muted: t.muted, soloed: t.soloed,
      eq: t.eq, sends: t.sends,
      // Store waveform peaks so UI can restore instantly without reading full audio
      peaks: t.waveformCache ? Array.from(t.waveformCache) : null
    }))
  };
}

async function saveProject() {
  if (!tracks.length) { setSt('Nenhuma faixa para salvar','var(--danger)'); return; }
  setSt('Salvando projeto...','var(--warn)');
  try {
    // Ensure we have a stable ID
    if (!currentProjectId) currentProjectId = 'proj_' + Date.now();
    // Save audio for every track (overwrites with latest data)
    for (const track of tracks) {
      if (!track.buffer) continue;
      await _saveTrackAudio(track);
    }
    await _flushProjectMeta();
    setSt('Projeto "' + currentProjectMeta.name + '" salvo','var(--ok)');
  } catch(err) {
    setSt('Erro ao salvar: ' + err.message,'var(--danger)');
    console.error('saveProject error:', err);
  }
}

async function loadProject(id, autoPlay = false) {
  if (isLoadingProject) return;
  isLoadingProject = true;

  // ── Phase 1: Read project metadata only (KB, instant) ──
  let proj;
  try { proj = await dbGet('projects', id); } catch(e) {}
  if (!proj) {
    setSt('Projeto não encontrado','var(--danger)');
    isLoadingProject = false;
    return;
  }
  if (isPlaying) pause();

  // Clear state
  tracks.forEach(t => destroyChain(t.id));
  tracks = []; nextId = 1; DURATION = 0; pauseOffset = 0; masterPeaks = null;
  document.getElementById('trackList').innerHTML = '';
  trackNodes = {};
  _savedAudioKeys.clear();
  _compositeMixRunning = false;
  allMuted = false;
  document.getElementById('toggleMuteLbl').textContent = 'Silenciar tudo';
  document.getElementById('toggleMuteIcon').innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/>';
  document.getElementById('btnToggleMute').classList.remove('active');
  initAudio();
  currentProjectId = proj.id;
  currentProjectMeta = { name: proj.name, artist: proj.artist, photo: proj.photo||null };
  sections = proj.sections || [];
  document.getElementById('bpmInput').value = proj.bpm || 120;
  DURATION = proj.duration || 0;

  const tInfos = proj.tracks || [];

  // ── Phase 1a: Build track objects + render UI immediately ──
  tInfos.forEach(tInfo => {
    const track = {
      id: nextId++, name: tInfo.name, hex: tInfo.hex, fileName: tInfo.fileName,
      buffer: null,
      waveformCache: tInfo.peaks ? new Float32Array(tInfo.peaks) : null,
      // Store the real IDB key so _ensureBuffers can find audio even if IDs drifted
      _idbKey: `${proj.id}_${tInfo.id}`,
      muted: tInfo.muted||false, soloed: tInfo.soloed||false, vol: tInfo.vol||80,
      pan: tInfo.pan||0, phase: tInfo.phase||false, settingsOpen: false,
      eq: tInfo.eq||{low:{gain:0,freq:80},mid:{gain:0,freq:1000,q:1},high:{gain:0,freq:8000}},
      sends: tInfo.sends||{reverb:0,delay:0}
    };
    tracks.push(track);
    renderTrackEl(track);
    showTrackLoad(track.id, true);
  });

  // ── Phase 1b: Draw waveforms from stored peaks (instant, no IO) ──
  tracks.forEach(t => { if (t.waveformCache) drawStaticWave(t.id); });
  _drawApproxComposite();
  updateChips(); countSt();
  _rebuildMeterCache();
  drawSectionsOverlay();
  saveSession();
  renderProjectList();
  isLoadingProject = false; // unlock — UI is ready, audio loads in background

  // ── Phase 2: Load audio in background, one track at a time ──
  _loadAudioInBackground(proj, tInfos, autoPlay);
  // ── Phase 3: Pre-load adjacent projects so next advance is instant ──
  setTimeout(() => _preloadAdjacentProjects(), 800);
}

// Decode IDB audio record → AudioBuffer.
// float32 (mobile): sync, zero-copy copyToChannel — ~1ms per channel.
// int16 (desktop): async chunked Int16→Float32 conversion.
function _decodeAudioRecSync(audioRec) {
  // Fast sync path for float32 (mobile) — no async overhead at all
  if (!audioRec || !audioRec.channels || !audioRec.channels.length) return null;
  const { channels, sampleRate, length } = audioRec;
  const buf = audioCtx.createBuffer(channels.length, length, sampleRate);
  channels.forEach((ch, c) =>
    buf.copyToChannel(ch instanceof Float32Array ? ch : new Float32Array(ch), c)
  );
  return buf;
}

async function _decodeAudioRec(audioRec) {
  if (!audioRec || !audioRec.channels || !audioRec.channels.length) return null;
  const { channels, sampleRate, length, format } = audioRec;
  if (format !== 'int16') {
    // float32: sync zero-copy — instant on mobile
    return _decodeAudioRecSync(audioRec);
  }
  // int16: async chunked conversion (desktop only)
  const buf = audioCtx.createBuffer(channels.length, length, sampleRate);
  const CHUNK = 65536;
  for (let c = 0; c < channels.length; c++) {
    const ch = channels[c];
    const i16 = ch instanceof Int16Array ? ch : new Int16Array(ch);
    const f32 = new Float32Array(length);
    for (let j = 0; j < length; j += CHUNK) {
      const end = Math.min(j + CHUNK, length);
      for (let k = j; k < end; k++) f32[k] = i16[k] / 32767;
      await new Promise(r => setTimeout(r, 0));
    }
    buf.copyToChannel(f32, c);
  }
  return buf;
}

let _bgLoadRunning = false;

async function _loadAudioInBackground(proj, tInfos, autoPlay) {
  _bgLoadRunning = true;
  let anyLoaded = false;

  // Step A: Read ALL tracks from IDB in parallel — much faster than sequential
  const entries = tInfos.map((tInfo, i) => ({
    tInfo, track: tracks[i],
    idbKey: (tracks[i] && tracks[i]._idbKey) || `${proj.id}_${tInfo.id}`
  })).filter(e => e.track && !e.track.buffer);

  const audioRecs = await Promise.all(
    entries.map(e => dbGet('audio', e.idbKey).catch(() => null))
  );

  // Step B: Decode each buffer (sync for float32, async for int16)
  for (let i = 0; i < entries.length; i++) {
    const { tInfo, track, idbKey } = entries[i];
    const audioRec = audioRecs[i];
    if (!audioRec || !audioRec.channels || !audioRec.channels.length) {
      showTrackLoad(track.id, false); continue;
    }
    try {
      const buf = await _decodeAudioRec(audioRec); // sync for float32
      if (!buf) { showTrackLoad(track.id, false); continue; }
      track.buffer = buf;
      track._idbKey = idbKey;
      DURATION = Math.max(DURATION, buf.duration);
      if (!track.waveformCache) { cacheWave(track, buf); drawStaticWave(track.id); }
      showTrackLoad(track.id, false);
      _savedAudioKeys.add(idbKey);
      anyLoaded = true;
      if (IS_MOBILE && !autoPlay) track.buffer = null; // release RAM, reload at play()
    } catch(e) {
      showTrackLoad(track.id, false);
      console.warn('Audio load failed:', e);
    }
    await new Promise(r => setTimeout(r, 0)); // yield between decodes
  }

  if (!anyLoaded) { _bgLoadRunning = false; return; }
  _bgLoadRunning = false;

  updateChips(); countSt(); _rebuildMeterCache();
  setTimeout(() => renderCompositeMix(), 0);

  if (autoPlay) {
    const readyCount = tracks.filter(t => t.buffer).length;
    const expectedCount = tInfos.length;
    if (readyCount > 0) {
      if (readyCount < expectedCount) {
        setSt(`Iniciando com ${readyCount}/${expectedCount} faixas`, 'var(--warn)');
      }
      play();
    }
  } else {
    setSt(tracks.filter(t=>t.buffer).length + ' faixa' + (tracks.length!==1?'s':'') + ' prontas', 'var(--ok)');
  }
}

// ═══════════════════════════════════════════════════════════════
// PLAYLIST PRE-LOADER — keeps prev/next project audio warm in RAM
// ═══════════════════════════════════════════════════════════════
const _preloadCache = {};
let _preloadTaskId = 0;

async function _preloadAdjacentProjects() {
  // Mobile Safari has ~150-200MB RAM limit — preloading would cause crashes
  if (IS_MOBILE) return;
  const taskId = ++_preloadTaskId;
  const curIdx = projects.findIndex(p => p.id === currentProjectId);
  if (curIdx < 0) return;

  const toPreload = [];
  if (curIdx + 1 < projects.length) toPreload.push(projects[curIdx + 1]);
  if (curIdx - 1 >= 0)              toPreload.push(projects[curIdx - 1]);

  for (const proj of toPreload) {
    if (taskId !== _preloadTaskId) return;
    if (_preloadCache[proj.id]) continue;
    try {
      const projRec = await dbGet('projects', proj.id);
      if (!projRec || taskId !== _preloadTaskId) continue;
      const tInfos = projRec.tracks || [];
      const cachedTracks = [];
      for (const tInfo of tInfos) {
        if (taskId !== _preloadTaskId) break;
        await new Promise(r => setTimeout(r, 0));
        try {
          const audioRec = await dbGet('audio', `${proj.id}_${tInfo.id}`).catch(() => null);
          const ct = {
            id: tInfo.id, name: tInfo.name, hex: tInfo.hex, fileName: tInfo.fileName,
            waveformCache: tInfo.peaks ? new Float32Array(tInfo.peaks) : null,
            vol: tInfo.vol||80, pan: tInfo.pan||0, muted: tInfo.muted||false,
            soloed: tInfo.soloed||false, phase: tInfo.phase||false,
            eq: tInfo.eq||{low:{gain:0,freq:80},mid:{gain:0,freq:1000,q:1},high:{gain:0,freq:8000}},
            sends: tInfo.sends||{reverb:0,delay:0}, buffer: null
          };
          if (audioRec) { const buf = await _decodeAudioRec(audioRec); if (buf) ct.buffer = buf; }
          cachedTracks.push(ct);
        } catch(e) { cachedTracks.push(null); }
      }
      if (taskId === _preloadTaskId) _preloadCache[proj.id] = { projRec, tracks: cachedTracks };
    } catch(e) { console.warn('Preload failed:', proj.id, e); }
  }
  // Evict stale entries — keep only prev, current, next
  const keepIds = new Set([currentProjectId, ...toPreload.map(p => p.id)]);
  for (const key of Object.keys(_preloadCache)) {
    if (!keepIds.has(key)) delete _preloadCache[key];
  }
}

async function _loadFromCache(id, autoPlay) {
  const cached = _preloadCache[id];
  if (!cached) return false;
  const { projRec, tracks: cachedTracks } = cached;
  if (isPlaying) pause();
  tracks.forEach(t => destroyChain(t.id));
  tracks = []; nextId = 1; DURATION = 0; pauseOffset = 0; masterPeaks = null;
  document.getElementById('trackList').innerHTML = '';
  trackNodes = {};
  _savedAudioKeys.clear(); _compositeMixRunning = false; allMuted = false;
  document.getElementById('toggleMuteLbl').textContent = 'Silenciar tudo';
  document.getElementById('toggleMuteIcon').innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/>';
  document.getElementById('btnToggleMute').classList.remove('active');
  initAudio();
  currentProjectId = projRec.id;
  currentProjectMeta = { name: projRec.name, artist: projRec.artist, photo: projRec.photo||null };
  sections = projRec.sections || [];
  document.getElementById('bpmInput').value = projRec.bpm || 120;
  DURATION = projRec.duration || 0;
  for (const ct of cachedTracks) {
    if (!ct) continue;
    const track = {
      id: nextId++, name: ct.name, hex: ct.hex, fileName: ct.fileName,
      buffer: ct.buffer || null, waveformCache: ct.waveformCache || null,
      muted: ct.muted, soloed: ct.soloed, vol: ct.vol, pan: ct.pan,
      phase: ct.phase, settingsOpen: false, eq: ct.eq, sends: ct.sends
    };
    if (track.buffer) {
      DURATION = Math.max(DURATION, track.buffer.duration);
      _savedAudioKeys.add(`${projRec.id}_${ct.id}`);
    }
    tracks.push(track); renderTrackEl(track);
    if (!track.buffer) showTrackLoad(track.id, true);
  }
  tracks.forEach(t => { if (t.waveformCache) drawStaticWave(t.id); });
  _drawApproxComposite();
  updateChips(); countSt(); _rebuildMeterCache();
  drawSectionsOverlay(); saveSession(); renderProjectList();
  delete _preloadCache[id]; // consumed
  if (autoPlay && tracks.some(t => t.buffer)) play();
  setTimeout(() => renderCompositeMix(), 0);
  setTimeout(() => _preloadAdjacentProjects(), 500);
  return true;
}

// ═══════════════════════════════════════════════════════════════
// EXPORT / IMPORT .ptracks
// ═══════════════════════════════════════════════════════════════
async function exportPtracks() {
  if (!tracks.length) { setSt('Nenhuma faixa para exportar','var(--danger)'); return; }
  try {
    const proj = buildProjectObj();
    const audioRaw = {};

    for (const track of tracks) {
      if (!track.buffer) continue;
      setSt('Codificando "' + track.name + '"...','var(--warn)');
      await new Promise(r => setTimeout(r, 0)); // yield — keep UI alive
      const channels = [];
      for (let c = 0; c < track.buffer.numberOfChannels; c++) {
        const f32 = track.buffer.getChannelData(c).slice(); // Float32Array copy
        channels.push(arrayBufferToBase64(f32.buffer));
      }
      audioRaw[track.id] = { channels, sampleRate: track.buffer.sampleRate, length: track.buffer.length, format: 'float32' };
    }

    setSt('Gerando arquivo...','var(--warn)');
    await new Promise(r => setTimeout(r, 0)); // yield before heavy JSON serialisation

    const exportObj = { ...proj, audioRaw, exportedAt: new Date().toISOString(), version: '2.0' };
    // Stringify in a yielded microtask so UI stays responsive
    const json = await new Promise(r => setTimeout(() => r(JSON.stringify(exportObj)), 0));
    const blob = new Blob([json], { type: 'application/json' });

    if (window.showSaveFilePicker) {
      try {
        const fh = await window.showSaveFilePicker({
          suggestedName: (proj.name || 'projeto').replace(/\s+/g,'_') + '.ptracks',
          types: [{ description: 'PlayTracks Project', accept: { 'application/json': ['.ptracks'] } }]
        });
        const writable = await fh.createWritable();
        await writable.write(blob);
        await writable.close();
        setSt('Projeto exportado com sucesso','var(--ok)');
        return;
      } catch(e) { if (e.name === 'AbortError') return; }
    }

    // Fallback: <a> download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (proj.name || 'projeto').replace(/\s+/g,'_') + '.ptracks';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000);
    setSt('Arquivo .ptracks baixado','var(--ok)');
  } catch(err) {
    setSt('Erro ao exportar: ' + err.message,'var(--danger)');
    console.error('exportPtracks error:', err);
  }
}

async function importPtracks(file) {
  setSt('Importando projeto...','var(--warn)');
  try {
    const text = await file.text();
    const proj = JSON.parse(text);
    if (!proj.tracks) throw new Error('Formato inválido');
    if (isPlaying) pause();
    tracks.forEach(t=>destroyChain(t.id));
    tracks=[]; nextId=1; DURATION=0; pauseOffset=0; masterPeaks=null;
    document.getElementById('trackList').innerHTML='';
    trackNodes={};
    _savedAudioKeys.clear();
    _compositeMixRunning = false;
    // Reset mute state
    allMuted = false;
    document.getElementById('toggleMuteLbl').textContent = 'Silenciar tudo';
    document.getElementById('toggleMuteIcon').innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/>';
    document.getElementById('btnToggleMute').classList.remove('active');
    initAudio();
    // Always generate a fresh ID on import to avoid collisions
    currentProjectId = 'proj_' + Date.now();
    currentProjectMeta = {name:proj.name||'',artist:proj.artist||'',photo:proj.photo||null};
    sections = proj.sections||[];
    document.getElementById('bpmInput').value = proj.bpm||120;
  
    for (const tInfo of proj.tracks) {
      const track={id:nextId++,name:tInfo.name,hex:tInfo.hex,fileName:tInfo.fileName,buffer:null,waveformCache:null,muted:tInfo.muted||false,soloed:tInfo.soloed||false,vol:tInfo.vol||80,pan:tInfo.pan||0,phase:tInfo.phase||false,settingsOpen:false,eq:tInfo.eq||{low:{gain:0,freq:80},mid:{gain:0,freq:1000,q:1},high:{gain:0,freq:8000}},sends:tInfo.sends||{reverb:0,delay:0}};
      tracks.push(track); renderTrackEl(track);

      if (proj.audioRaw && proj.audioRaw[tInfo.id]) {
        // New Float32 format — fast, no decode step
        showTrackLoad(track.id, true);
        try {
          const raw = proj.audioRaw[tInfo.id];
          if (!raw.channels || !raw.channels.length) throw new Error('channels empty');
          const buf = audioCtx.createBuffer(raw.channels.length, raw.length, raw.sampleRate);
          raw.channels.forEach((b64, i) => {
            buf.copyToChannel(new Float32Array(base64ToArrayBuffer(b64)), i);
          });
          track.buffer = buf; DURATION = Math.max(DURATION, buf.duration);
          cacheWave(track, buf); drawStaticWave(track.id);
        } catch(err) {
          const fe = document.getElementById('tfile-'+track.id);
          if (fe) { fe.textContent = 'áudio corrompido'; fe.style.color = 'var(--danger)'; }
        } finally { showTrackLoad(track.id, false); }
      } else if (proj.audioData && proj.audioData[tInfo.id]) {
        // Legacy WAV format — backward compat
        showTrackLoad(track.id, true);
        try {
          const ab = base64ToArrayBuffer(proj.audioData[tInfo.id]);
          const buf = await new Promise((r,j)=>audioCtx.decodeAudioData(ab.slice(0),r,j));
          track.buffer=buf; DURATION=Math.max(DURATION,buf.duration);
          cacheWave(track,buf); drawStaticWave(track.id);
        } catch(err) {
          const fe = document.getElementById('tfile-'+track.id);
          if (fe) { fe.textContent = 'formato inválido'; fe.style.color = 'var(--danger)'; }
        } finally { showTrackLoad(track.id, false); }
      } else {
        // No audio data — mark and dismiss spinner
        showTrackLoad(track.id, false);
        const fe = document.getElementById('tfile-'+track.id);
        if (fe) { fe.textContent = 'sem áudio'; fe.style.color = 'var(--txt3)'; }
      }
    }
    updateChips(); countSt();
    _rebuildMeterCache();
    _drawApproxComposite();
    setTimeout(() => renderCompositeMix(), 0);
    drawSectionsOverlay();
    await autoBackup();
    setSt('Projeto "'+proj.name+'" importado com sucesso','var(--ok)');
  } catch(e) { setSt('Erro ao importar .ptracks: '+e.message,'var(--danger)'); console.error(e); }
}

// ─── base64 helpers ───
function arrayBufferToBase64(buf){
  const bytes=new Uint8Array(buf);
  const chunk=8192;
  let b='';
  for(let i=0;i<bytes.length;i+=chunk) b+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk));
  return btoa(b);
}
function base64ToArrayBuffer(b64){const bin=atob(b64);const b=new ArrayBuffer(bin.length);const v=new Uint8Array(b);for(let i=0;i<bin.length;i++)v[i]=bin.charCodeAt(i);return b;}

// ═══════════════════════════════════════════════════════════════
// AUTO-BACKUP (mobile page-eviction protection)
// ═══════════════════════════════════════════════════════════════
// Set of audio keys already persisted in this session — avoids redundant dbGet checks
const _savedAudioKeys = new Set();

async function autoBackup() {
  if (!tracks.length || !db) { saveSession(); return; }
  if (!currentProjectId) currentProjectId = 'autosave_' + Date.now();
  for (const track of tracks) {
    const key = track._idbKey || `${currentProjectId}_${track.id}`;
    if (_savedAudioKeys.has(key)) continue; // already saved this session
    if (!track.buffer) {
      // Buffer was released to RAM after save — trust _savedAudioKeys
      // On mobile, avoid dbGet per-track (slow). Mark as saved and move on.
      if (IS_MOBILE) { _savedAudioKeys.add(key); continue; }
      const exists = await dbGet('audio', key).catch(() => null);
      if (exists) { _savedAudioKeys.add(key); continue; }
      continue; // not in IDB and no buffer — skip
    }
    await _saveTrackAudio(track);
  }
  await _flushProjectMeta();
}

function saveSession() {
  // Strip photo from localStorage entries — photos can be MB-sized and cause QuotaExceededError.
  // The full photo is stored in IndexedDB (in the project record) and restored from there.
  const session = {
    currentProjectId,
    autoAdvance,
    projects: projects.map(p => ({
      id: p.id, name: p.name, artist: p.artist,
      photo: null, // never persist photo in localStorage
      bpm: p.bpm, duration: p.duration,
      trackCount: (p.tracks||[]).length
    }))
  };
  try { localStorage.setItem('playtracks_session', JSON.stringify(session)); } catch(e) {
    // If still quota-exceeded (many projects), save minimal version
    try {
      const minimal = { currentProjectId, autoAdvance, projects: [] };
      localStorage.setItem('playtracks_session', JSON.stringify(minimal));
    } catch(e2) { console.warn('localStorage full, session not saved'); }
  }
}

async function restoreSession() {
  // Never restore if user already has tracks loaded — would wipe unsaved work
  if (tracks.length > 0) return;
  if (isLoadingProject || isTransitioning) return; // background load running
  try {
    const raw = localStorage.getItem('playtracks_session');
    if (!raw) return;
    const session = JSON.parse(raw);
    autoAdvance = session.autoAdvance || false;
    document.getElementById('autoAdvToggle').classList.toggle('on', autoAdvance);
    projects = session.projects || [];
    document.getElementById('projCount').textContent = projects.length;
    renderProjectList();
    // Restore photos from IDB (stripped from localStorage to save space)
    _restoreProjectPhotos().catch(() => {});
    if (session.currentProjectId) {
      const rec = await dbGet('projects', session.currentProjectId);
      if (rec) await loadProject(session.currentProjectId);
    }
  } catch(e) { console.warn('Session restore failed', e); }
}

// Pull photos back from IDB into the in-memory projects list
async function _restoreProjectPhotos() {
  let updated = false;
  for (const p of projects) {
    if (p.photo) continue; // already has photo
    try {
      const rec = await dbGet('projects', p.id);
      if (rec && rec.photo) { p.photo = rec.photo; updated = true; }
    } catch(e) {}
  }
  if (updated) renderProjectList();
}

function _reorderProject(fromId, toId) {
  if (!fromId || !toId || fromId === toId) return;
  const fromIdx = projects.findIndex(p => p.id === fromId);
  const toIdx   = projects.findIndex(p => p.id === toId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [moved] = projects.splice(fromIdx, 1);
  projects.splice(toIdx, 0, moved);
  saveSession();
  renderProjectList();
}

function renderProjectList() {
  const list = document.getElementById('projList');
  list.innerHTML = '';
  if (!projects.length) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--txt3);font-size:12px">Nenhum projeto salvo ainda</div>';
    _updateNavButtons();
    return;
  }

  projects.forEach((proj, idx) => {
    const isActive = proj.id === currentProjectId;
    const isNowPlaying = isActive && isPlaying;
    const isTransit = isActive && isTransitioning;
    const m = Math.floor((proj.duration||0)/60), s = Math.floor((proj.duration||0)%60);

    const card = document.createElement('div');
    card.className = 'proj-card' +
      (isNowPlaying ? ' now-playing' : isActive ? ' active' : '') +
      (isTransit ? ' transitioning' : '');
    card.dataset.projId = proj.id;
    card.dataset.idx = idx;

    const photoEl = proj.photo
      ? `<img class="pc-photo" src="${proj.photo}" alt="">`
      : `<div class="pc-photo-ph"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--txt3)" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>`;

    const statusDot = isNowPlaying
      ? `<div class="pc-playing-dot"></div>`
      : `<span style="font-size:10px;font-weight:700;color:var(--txt3);font-family:'JetBrains Mono',monospace;width:16px;text-align:center;flex-shrink:0">${idx+1}</span>`;

    card.innerHTML = `
      <div class="pc-drag" title="Arrastar para reordenar">
        <div class="pc-drag-dot"></div><div class="pc-drag-dot"></div>
        <div class="pc-drag-dot"></div><div class="pc-drag-dot"></div>
        <div class="pc-drag-dot"></div><div class="pc-drag-dot"></div>
      </div>
      ${statusDot}
      ${photoEl}
      <div class="pc-meta">
        <div class="pc-name">${proj.name}</div>
        <div class="pc-artist">${proj.artist}</div>
        <div class="pc-info">${proj.trackCount||0} faixa${(proj.trackCount||0)!==1?'s':''} · ${p2(m)}:${p2(s)} · ${proj.bpm||120} BPM</div>
      </div>
      <div class="pc-actions">
        <button class="pc-btn play-now" data-load="${proj.id}" title="Tocar agora">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
        </button>
        <button class="pc-btn" data-del="${proj.id}" title="Remover">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        </button>
      </div>`;

    // Play button
    card.querySelector('[data-load]').onclick = e => {
      e.stopPropagation();
      loadProject(proj.id).then(() => { if (!isPlaying) play(); });
      closeDrawer();
    };
    // Delete button
    card.querySelector('[data-del]').onclick = e => {
      e.stopPropagation();
      deleteProject(proj.id, e);
    };
    // Click card body = load (not play)
    card.addEventListener('click', e => {
      if (e.target.closest('.pc-actions,.pc-drag')) return;
      loadProject(proj.id);
      closeDrawer();
    });

    // ── Drag-to-reorder (mouse + touch) ──
    card.draggable = true;
    card.addEventListener('dragstart', e => {
      if (e.target.closest('.pc-actions')) { e.preventDefault(); return; }
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', proj.id);
      setTimeout(() => card.classList.add('transitioning'), 0);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('transitioning');
      list.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; card.classList.add('drag-over'); });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      _reorderProject(e.dataTransfer.getData('text/plain'), proj.id);
    });
    // Touch drag support
    let _projTouchId = null, _projTouchTimer = null, _projDragging = false;
    card.querySelector('.pc-drag').addEventListener('touchstart', e => {
      _projTouchId = proj.id;
      _projTouchTimer = setTimeout(() => {
        _projDragging = true;
        card.classList.add('transitioning');
      }, 250);
    }, { passive: true });
    card.addEventListener('touchmove', e => {
      if (!_projDragging) { clearTimeout(_projTouchTimer); return; }
      e.preventDefault();
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el && el.closest('.proj-card');
      list.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
      if (target && target !== card) target.classList.add('drag-over');
    }, { passive: false });
    card.addEventListener('touchend', e => {
      clearTimeout(_projTouchTimer);
      if (!_projDragging) { _projTouchId = null; return; }
      _projDragging = false;
      card.classList.remove('transitioning');
      const over = list.querySelector('.proj-card.drag-over');
      list.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
      if (over && _projTouchId) {
        const toId = over.dataset.projId;
        if (toId && toId !== _projTouchId) _reorderProject(_projTouchId, toId);
      }
      _projTouchId = null;
    });

    list.appendChild(card);
  });

  _updateNavButtons();
}

function _updateNavButtons() {
  const idx = projects.findIndex(p => p.id === currentProjectId);
  const prevBtn = document.getElementById('btnPrevProj');
  const nextBtn = document.getElementById('btnNextProj');
  if (prevBtn) prevBtn.disabled = idx <= 0;
  if (nextBtn) nextBtn.disabled = idx < 0 || idx >= projects.length - 1;
}

async function deleteProject(id, e) {
  if (e) e.stopPropagation();
  projects = projects.filter(p => p.id !== id);
  try { await dbDelete('projects', id); } catch(er){}
  // Delete all audio entries — continue on missing keys, don't break
  for (let i = 1; i <= 100; i++) {
    try { await dbDelete('audio', `${id}_${i}`); } catch(er) { continue; }
  }
  if (currentProjectId === id) currentProjectId = null;
  saveSession();
  renderProjectList();
  document.getElementById('projCount').textContent = projects.length;
}

// ═══════════════════════════════════════════════════════════════
// TIMELINE SEEK + SECTION MAPPING
// ═══════════════════════════════════════════════════════════════
// ── Section ID counter (avoids Date.now() collisions) ──
let _secIdCounter = 0;
function _newSecId() { return 'sec_' + (++_secIdCounter); }

// ═══════════════════════════════════════════════════════════════
// TIMELINE SEEK + SECTION MAPPING
// ═══════════════════════════════════════════════════════════════
(function(){
  const tl = document.getElementById('masterTl');
  let seeking = false;
  let wasPlaying = false; // local var — never stored on DOM element
  let seekRect = null;    // cached getBoundingClientRect for the seek gesture

  function posRatio(clientX) {
    if (!seekRect) seekRect = tl.getBoundingClientRect();
    return Math.max(0, Math.min(1, (clientX - seekRect.left) / seekRect.width));
  }

  // Shared seek start — stops audio cleanly via internal helper
  function beginSeek(clientX) {
    seekRect = tl.getBoundingClientRect(); // fresh rect at gesture start
    wasPlaying = isPlaying;
    if (isPlaying) {
      // Stop sources without full pause() so we can resume smoothly
      tracks.forEach(t => {
        const n = trackNodes[t.id];
        if (n && n.source) { try { n.source.stop(); } catch(ex){} n.source = null; }
      });
      isPlaying = false;
      cancelAnimationFrame(animId);
      document.getElementById('btnPlay').classList.remove('playing');
      document.getElementById('playIcon').innerHTML = '<path d="M5 3l14 9-14 9V3z"/>';
    }
    seeking = true;
    const r = posRatio(clientX);
    pauseOffset = Math.max(0, r * DURATION);
    movePH(DURATION > 0 ? pauseOffset / DURATION : 0);
    updT(pauseOffset);
  }

  function doSeek(clientX) {
    const r = posRatio(clientX);
    pauseOffset = Math.max(0, r * DURATION);
    movePH(DURATION > 0 ? pauseOffset / DURATION : 0);
    updT(pauseOffset);
  }

  function endSeek() {
    seekRect = null;
    seeking = false;
    if (wasPlaying) play();
  }

  // ── MOUSE ──
  tl.addEventListener('mousedown', e => {
    if (e.button !== 0) return; // left click only
    if (mappingMode) {
      const ratio = posRatio(e.clientX);
      const W = tl.clientWidth;
      // Drag existing marker?
      const near = sections.find(s => Math.abs(s.pos * W - ratio * W) < 10);
      if (near) { dragSec = near; return; }
      // Add new section
      if (selectedSecType) {
        const secDef = SECTION_TYPES.find(s => s.id === selectedSecType);
        sections.push({ id: _newSecId(), type: secDef.id, label: secDef.label, color: secDef.color, pos: ratio });
        sections.sort((a, b) => a.pos - b.pos);
        drawSectionsOverlay();
      }
      return;
    }
    if (DURATION === 0) return;
    beginSeek(e.clientX);
  });

  document.addEventListener('mousemove', e => {
    if (dragSec) {
      const rect = tl.getBoundingClientRect();
      dragSec.pos = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      drawSectionsOverlay();
      return;
    }
    if (!seeking) return;
    doSeek(e.clientX);
  });

  document.addEventListener('mouseup', e => {
    if (dragSec) { dragSec = null; _flushProjectMeta().catch(() => {}); return; }
    if (!seeking) return;
    endSeek();
  });

  // ── TOUCH ──
  tl.addEventListener('touchstart', e => {
    e.preventDefault();
    const touch = e.touches[0];
    if (mappingMode) {
      // Touch section drag
      const rect = tl.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width));
      const W = tl.clientWidth;
      const near = sections.find(s => Math.abs(s.pos * W - ratio * W) < 18); // wider hit on touch
      if (near) { dragSec = near; return; }
      if (selectedSecType) {
        const secDef = SECTION_TYPES.find(s => s.id === selectedSecType);
        sections.push({ id: _newSecId(), type: secDef.id, label: secDef.label, color: secDef.color, pos: ratio });
        sections.sort((a, b) => a.pos - b.pos);
        drawSectionsOverlay();
      }
      return;
    }
    if (DURATION === 0) return;
    beginSeek(touch.clientX);
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!e.touches.length) return;
    const touch = e.touches[0];
    if (dragSec) {
      e.preventDefault();
      const rect = tl.getBoundingClientRect();
      dragSec.pos = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width));
      drawSectionsOverlay();
      return;
    }
    if (!seeking) return;
    e.preventDefault();
    doSeek(touch.clientX);
  }, { passive: false });

  document.addEventListener('touchend', e => {
    if (dragSec) { dragSec = null; _flushProjectMeta().catch(() => {}); return; }
    if (!seeking) return;
    endSeek();
  });
})();

// ═══════════════════════════════════════════════════════════════
// NEW PROJECT
// ═══════════════════════════════════════════════════════════════
function newProject() {
  if (tracks.length) {
    const ok = confirm('Criar novo projeto? As faixas não salvas serão perdidas.');
    if (!ok) return;
  }
  if (isPlaying) pause();
  tracks.forEach(t => destroyChain(t.id));
  tracks = []; nextId = 1; DURATION = 0; pauseOffset = 0; masterPeaks = null;
  sections = []; currentProjectId = null;
  currentProjectMeta = { name: '', artist: '', photo: null };
  trackNodes = {};
  _savedAudioKeys.clear();
  _compositeMixRunning = false;
  stereoSplit = false;
  document.getElementById('btnStereoSplit').classList.remove('active');
  // Reset mute state
  allMuted = false;
  document.getElementById('toggleMuteLbl').textContent = 'Silenciar tudo';
  document.getElementById('toggleMuteIcon').innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/>';
  document.getElementById('btnToggleMute').classList.remove('active');
  document.getElementById('trackList').innerHTML = buildEmpty();
  movePH(0); updT(0);
  drawMasterWaveform();
  updateChips();

  saveSession();
}

};

// Fix 6: rewind — stop cleanly then restart from 0
document.getElementById('btnRew').onclick = () => {
  if (isPlaying) {
    // Stop all sources, reset position, restart
    tracks.forEach(t => { const n=trackNodes[t.id]; if(n&&n.source){try{n.source.stop()}catch(ex){}n.source=null;} });
    isPlaying = false; cancelAnimationFrame(animId);
    pauseOffset = 0;
    play();
  } else {
    pauseOffset = 0;
    movePH(0);
    updT(0);
  }
};

// Fix 3: debounced resize handler
let _resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    drawMasterWaveform();
    tracks.forEach(t => {
      const cv = document.getElementById('wave-'+t.id);
      if (!cv) return;
      cv.width = cv.offsetWidth || 200;
      if (t.waveformCache) drawStaticWave(t.id);
      else drawFlatWave(cv.getContext('2d'), cv.width, cv.height||46, t.hex);
    });
  }, 120);
});

// Fix 4+5: drag-and-drop — reliable dragleave, handle multiple .ptracks
const dropZone = document.getElementById('dropZone');
let _dragCounter = 0; // track enter/leave pairs to avoid flickering on child elements
document.addEventListener('dragenter', e => { e.preventDefault(); _dragCounter++; dropZone.classList.add('active'); });
document.addEventListener('dragleave', e => { _dragCounter = Math.max(0, _dragCounter - 1); if (_dragCounter === 0) dropZone.classList.remove('active'); });
document.addEventListener('dragover', e => { e.preventDefault(); });
document.addEventListener('drop', async e => {
  e.preventDefault();
  _dragCounter = 0;
  dropZone.classList.remove('active');
  const files = Array.from(e.dataTransfer.files);
  // Handle .ptracks files first (import first one found, warn if multiple)
  const ptFiles = files.filter(f => f.name.endsWith('.ptracks'));
  const audioFiles = files.filter(isAudioFile);
  if (ptFiles.length > 0) {
    if (ptFiles.length > 1) setSt('Múltiplos .ptracks — importando o primeiro', 'var(--warn)');
    await importPtracks(ptFiles[0]);
    return;
  }
  if (audioFiles.length) await loadFiles(audioFiles);
});

// Prevent uncaught async errors from crashing/reloading the page on mobile
window.addEventListener('unhandledrejection', e => {
  console.warn('[PlayTracks] Unhandled rejection:', e.reason);
  e.preventDefault();
});
window.addEventListener('error', e => {
  console.warn('[PlayTracks] Uncaught error:', e.message);
});

// ── Mobile resilience: handle iOS bfcache + foreground restore ──
let _wasHidden = false;
let _isRestoring = false; // lock: never run two restores at once

function _resumeAudio() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
}

// A "real" empty state: tracks array is empty AND no background load is running
function _genuinelyEmpty() {
  return tracks.length === 0 && !isLoadingProject && !isTransitioning && !_isRestoring;
}

async function _safeRestore() {
  if (_isRestoring || !db) return;
  if (!_genuinelyEmpty()) return; // tracks loading in background — don't restart
  _isRestoring = true;
  try { await restoreSession(); }
  catch(e) { console.warn('Safe restore failed:', e); }
  finally { _isRestoring = false; }
}

// iOS bfcache: JS state is intact, only AudioContext needs resuming
window.addEventListener('pageshow', e => {
  _resumeAudio();
  if (e.persisted && _genuinelyEmpty()) {
    // Page came from bfcache but state was wiped — full restore needed
    setTimeout(() => _safeRestore(), 200);
  }
});

// Android/iOS foreground: save on hide, restore only if genuinely empty on show
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    _wasHidden = true;
    saveSession();
    // Mobile: release audio buffers to free RAM before iOS kills the page
    if (IS_MOBILE) {
      if (isPlaying) pause();
      tracks.forEach(t => {
        if (t.buffer && t.waveformCache) t.buffer = null;
      });
    }
    return;
  }
  if (_wasHidden) {
    _wasHidden = false;
    _resumeAudio();
    // Wait 300ms for the JS engine to stabilise before checking state
    // This prevents false "empty" readings during background audio load
    setTimeout(() => {
      if (_genuinelyEmpty()) _safeRestore();
    }, 300);
  }
});

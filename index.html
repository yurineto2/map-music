<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Map Music - Transposição Funcional</title>
<style>
body { 
  background: #111; 
  color: #fff; 
  font-family: Arial; 
  padding: 20px;
  max-width: 800px;
  margin: 0 auto;
}
h1 { 
  background: #c00000; 
  padding: 15px; 
  text-align: center;
  margin: -20px -20px 20px -20px;
}
.section { 
  background: #222; 
  padding: 15px; 
  margin-bottom: 15px; 
  border-radius: 8px;
  border-left: 4px solid #c00000;
}
h3 { 
  color: #ff4444; 
  margin-top: 0;
}
textarea { 
  width: 100%; 
  min-height: 80px; 
  background: #000; 
  color: #0f0;
  border: 1px solid #444;
  padding: 10px;
  font-family: monospace;
  font-size: 16px;
}
button { 
  background: #c00000; 
  color: #fff; 
  border: none; 
  padding: 10px 20px; 
  cursor: pointer;
  font-weight: bold;
  margin-right: 10px;
}
select {
  padding: 10px;
  background: #333;
  color: #fff;
  border: 1px solid #c00000;
}
#status {
  color: #ff0;
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>
<body>

<h1>🎸 Map Music - Teste de Transposição</h1>

<div class="section">
  <h3>Controles</h3>
  <select id="shift">
    <option value="0">Original</option>
    <option value="1">+1 (C→C#)</option>
    <option value="2">+2 (C→D)</option>
    <option value="3">+3 (C→D#)</option>
    <option value="4">+4 (C→E)</option>
    <option value="5">+5 (C→F)</option>
    <option value="-1">-1 (C→B)</option>
    <option value="-2">-2 (C→A#)</option>
    <option value="-3">-3 (C→A)</option>
  </select>
  <button onclick="doTranspose()">TRANSPOR AGORA</button>
  <button onclick="resetTest()" style="background:#444;">Resetar</button>
  <div id="status"></div>
</div>

<div class="section">
  <h3>Teste 1 - Acordes Simples</h3>
  <textarea id="test1">C G Am F</textarea>
</div>

<div class="section">
  <h3>Teste 2 - Com Espaços</h3>
  <textarea id="test2">C        G        Am       F</textarea>
</div>

<div class="section">
  <h3>Teste 3 - Múltiplas Linhas</h3>
  <textarea id="test3">C G Am F
F G Am C/G</textarea>
</div>

<div class="section">
  <h3>Teste 4 - Acordes Complexos</h3>
  <textarea id="test4">Cmaj7 Dm G7 C/G</textarea>
</div>

<script>
// NOTAS
var NOTAS = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

// FUNÇÃO PRINCIPAL
function doTranspose() {
  var shift = parseInt(document.getElementById("shift").value);
  var status = document.getElementById("status");
  
  if(shift === 0) {
    status.innerHTML = "Selecione um valor diferente de 'Original'";
    return;
  }
  
  status.innerHTML = "Transpondo " + shift + " semitons...";
  
  // Transpor cada textarea
  transposeElement("test1", shift);
  transposeElement("test2", shift);
  transposeElement("test3", shift);
  transposeElement("test4", shift);
  
  status.innerHTML = "✅ TRANSPOSIÇÃO CONCLUÍDA! Verifique os resultados.";
  
  setTimeout(function() {
    status.innerHTML = "";
  }, 3000);
}

function transposeElement(id, shift) {
  var el = document.getElementById(id);
  var texto = el.value;
  
  if(!texto) return;
  
  // Dividir em linhas
  var linhas = texto.split("\\n");
  var novasLinhas = [];
  
  for(var i = 0; i < linhas.length; i++) {
    var linha = linhas[i];
    
    // Preservar espaços iniciais
    var espacosIniciais = "";
    while(linha.length > 0 && linha.charAt(0) === " ") {
      espacosIniciais += " ";
      linha = linha.substring(1);
    }
    
    // Dividir por espaços
    var partes = linha.split(" ");
    var novasPartes = [];
    
    for(var j = 0; j < partes.length; j++) {
      var parte = partes[j];
      if(parte === "") {
        novasPartes.push("");
      } else {
        novasPartes.push(transporAcorde(parte, shift));
      }
    }
    
    novasLinhas.push(espacosIniciais + novasPartes.join(" "));
  }
  
  el.value = novasLinhas.join("\\n");
}

function transporAcorde(acorde, shift) {
  // Verificar se é acorde com baixo (C/G)
  if(acorde.indexOf("/") >= 0) {
    var partes = acorde.split("/");
    return transporRaiz(partes[0], shift) + "/" + transporRaiz(partes[1], shift);
  }
  
  return transporRaiz(acorde, shift);
}

function transporRaiz(acorde, shift) {
  // Pegar apenas a nota (primeiro caractere + opcional # ou b)
  var nota = "";
  var sufixo = "";
  
  if(acorde.length === 0) return acorde;
  
  // Primeira letra
  nota = acorde.charAt(0).toUpperCase();
  
  // Verificar se tem # ou b
  if(acorde.length > 1) {
    var segundo = acorde.charAt(1);
    if(segundo === "#" || segundo === "b") {
      nota += segundo;
      sufixo = acorde.substring(2);
    } else {
      sufixo = acorde.substring(1);
    }
  }
  
  // Converter enarmônicas
  if(nota === "Db") nota = "C#";
  if(nota === "Eb") nota = "D#";
  if(nota === "Gb") nota = "F#";
  if(nota === "Ab") nota = "G#";
  if(nota === "Bb") nota = "A#";
  
  // Encontrar índice
  var idx = -1;
  for(var i = 0; i < NOTAS.length; i++) {
    if(NOTAS[i] === nota) {
      idx = i;
      break;
    }
  }
  
  if(idx === -1) return acorde; // Não encontrou, retorna original
  
  // Calcular nova posição
  var novoIdx = idx + shift;
  while(novoIdx < 0) novoIdx += 12;
  while(novoIdx >= 12) novoIdx -= 12;
  
  return NOTAS[novoIdx] + sufixo;
}

function resetTest() {
  document.getElementById("test1").value = "C G Am F";
  document.getElementById("test2").value = "C        G        Am       F";
  document.getElementById("test3").value = "C G Am F\\nF G Am C/G";
  document.getElementById("test4").value = "Cmaj7 Dm G7 C/G";
  document.getElementById("shift").value = "0";
  document.getElementById("status").innerHTML = "Resetado!";
}
</script>

</body>
</html>

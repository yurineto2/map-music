<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro - Professional Edition</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a25;
  --bg-elevated: #242433;
  --accent-primary: #1db954;
  --accent-secondary: #1ed760;
  --accent-glow: rgba(29, 185, 84, 0.3);
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --text-muted: #6a6a6a;
  --text-inverse: #000000;
  --border-color: rgba(255, 255, 255, 0.1);
  --radius-md: 8px;
  --radius-xl: 16px;
  --radius-full: 9999px;
  --space-lg: 24px;
  --space-xl: 32px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }

/* HEADER */
.app-header {
  background: rgba(18,18,26,0.95); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-color); padding: 15px var(--space-xl);
  position: sticky; top: 0; z-index: 100;
}
.header-content { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 35px; height: 35px; background: var(--accent-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #000; }

/* LAYOUT PRINCIPAL (GRID) */
.main-layout {
  display: grid; grid-template-columns: 1fr 350px; gap: 20px;
  max-width: 1400px; margin: 0 auto; width: 100%; padding: 20px;
}

/* METRONOMO */
.metronome-section { background: var(--bg-secondary); border-radius: var(--radius-xl); padding: 40px; border: 1px solid var(--border-color); text-align: center; }
.bpm-circle-display { position: relative; width: 220px; height: 220px; margin: 0 auto 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.bpm-circle-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }
.bpm-value { font-size: 72px; font-weight: 800; color: var(--accent-primary); line-height: 1; }

.beat-visualizer { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }
.beat-dot { width: 15px; height: 15px; border-radius: 50%; background: var(--bg-elevated); transition: 0.1s; }
.beat-dot.active { background: var(--accent-primary); box-shadow: 0 0 15px var(--accent-primary); transform: scale(1.2); }

/* TAP TEMPO */
.btn-tap {
  background: var(--bg-tertiary); border: 2px solid var(--accent-primary); color: var(--accent-primary);
  width: 80px; height: 80px; border-radius: 50%; font-weight: 800; cursor: pointer;
  margin-bottom: 20px; transition: 0.1s;
}
.btn-tap:active { background: var(--accent-primary); color: #000; transform: scale(0.9); }

/* SETLIST */
.setlist-section { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); display: flex; flex-direction: column; height: fit-content; max-height: 80vh; }
.setlist-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
.setlist-items { overflow-y: auto; padding: 10px; }
.song-item {
  background: var(--bg-tertiary); padding: 15px; border-radius: 10px; margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid transparent;
}
.song-item:hover { border-color: var(--accent-primary); }
.song-info h4 { font-size: 14px; margin-bottom: 4px; }
.song-info span { font-size: 12px; color: var(--text-muted); }

/* CONTROLES */
.controls-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
.btn-ctrl { background: var(--bg-elevated); border: none; color: #fff; padding: 15px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
.btn-main { width: 100%; max-width: 300px; padding: 20px; border-radius: 30px; border: none; background: var(--accent-primary); font-weight: 800; cursor: pointer; }

/* RESPONSIVIDADE */
@media (max-width: 900px) {
  .main-layout { grid-template-columns: 1fr; }
  .setlist-section { order: 2; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-content">
    <div class="logo"><div class="logo-icon">M</div><h1 style="font-size: 20px;">Map Music Pro</h1></div>
    <button onclick="saveCurrentSong()" style="background:none; border: 1px solid var(--accent-primary); color: var(--accent-primary); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 700;">+ SALVAR BPM</button>
  </div>
</header>

<div class="main-layout">
  <!-- METRÔNOMO CENTRAL -->
  <section class="metronome-section">
    <div class="bpm-circle-display">
      <svg class="bpm-circle-svg" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="5"/>
        <circle id="progress" cx="50" cy="50" r="45" fill="none" stroke="var(--accent-primary)" stroke-width="5" stroke-dasharray="283" stroke-dashoffset="200" stroke-linecap="round"/>
      </svg>
      <div class="bpm-value" id="bpm-text">120</div>
      <div style="font-size: 10px; color: var(--text-muted); font-weight: 700; letter-spacing: 2px;">BPM</div>
    </div>

    <button class="btn-tap" id="tap-btn">TAP</button>

    <div class="beat-visualizer">
      <div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div>
    </div>

    <div class="controls-row">
      <button class="btn-ctrl" onclick="updateBpm(-5)">-5</button>
      <button class="btn-ctrl" onclick="updateBpm(-1)">-</button>
      <button class="btn-ctrl" onclick="updateBpm(1)">+</button>
      <button class="btn-ctrl" onclick="updateBpm(5)">+5</button>
    </div>

    <button class="btn-main" id="play-btn">INICIAR</button>
  </section>

  <!-- GERENCIADOR DE SETLIST -->
  <aside class="setlist-section">
    <div class="setlist-header">
      <h3 style="font-size: 16px;">Setlist Salva</h3>
      <span id="count" style="font-size: 12px; color: var(--accent-primary);">0 músicas</span>
    </div>
    <div class="setlist-items" id="setlist-container">
      <!-- Músicas aparecem aqui -->
    </div>
  </aside>
</div>

<script>
let bpm = 120;
let isPlaying = false;
let currentBeat = 0;
let nextNoteTime = 0.0;
let timerID = null;
let tapTimes = [];
let songs = JSON.parse(localStorage.getItem('map_music_songs')) || [];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const bpmText = document.getElementById('bpm-text');
const playBtn = document.getElementById('play-btn');
const dots = document.querySelectorAll('.beat-dot');
const progress = document.getElementById('progress');
const tapBtn = document.getElementById('tap-btn');

// --- LÓGICA DO TAP TEMPO ---
tapBtn.addEventListener('click', () => {
    const now = performance.now();
    tapTimes.push(now);
    if (tapTimes.length > 4) tapTimes.shift();

    if (tapTimes.length > 1) {
        const diffs = [];
        for (let i = 1; i < tapTimes.length; i++) {
            diffs.push(tapTimes[i] - tapTimes[i-1]);
        }
        const avg = diffs.reduce((a, b) => a + b) / diffs.length;
        bpm = Math.round(60000 / avg);
        updateBpm(0);
    }
});

function updateBpm(v) {
    bpm = Math.min(Math.max(bpm + v, 30), 250);
    bpmText.innerText = bpm;
    const offset = 283 - ((bpm - 30) / (220)) * 283;
    progress.style.strokeDashoffset = offset;
}

// --- LÓGICA DO SETLIST ---
function saveCurrentSong() {
    const name = prompt("Nome da música:", "Nova Música");
    if (name) {
        songs.push({ name, bpm, id: Date.now() });
        localStorage.setItem('map_music_songs', JSON.stringify(songs));
        renderSetlist();
    }
}

function loadSong(sBpm) {
    bpm = sBpm;
    updateBpm(0);
}

function deleteSong(id, e) {
    e.stopPropagation();
    songs = songs.filter(s => s.id !== id);
    localStorage.setItem('map_music_songs', JSON.stringify(songs));
    renderSetlist();
}

function renderSetlist() {
    const container = document.getElementById('setlist-container');
    document.getElementById('count').innerText = `${songs.length} músicas`;
    container.innerHTML = songs.map(s => `
        <div class="song-item" onclick="loadSong(${s.bpm})">
            <div class="song-info">
                <h4>${s.name}</h4>
                <span>${s.bpm} BPM</span>
            </div>
            <button onclick="deleteSong(${s.id}, event)" style="background:none; border:none; color:#ff4d4d; cursor:pointer;">✕</button>
        </div>
    `).join('');
}

// --- CORE DO ÁUDIO ---
function playSound() {
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.frequency.value = currentBeat === 0 ? 1000 : 700;
    env.gain.value = 0.5;
    env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    osc.connect(env);
    env.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);

    dots.forEach((d, i) => d.classList.toggle('active', i === currentBeat));
    currentBeat = (currentBeat + 1) % 4;
}

function scheduler() {
    while (nextNoteTime < audioCtx.currentTime + 0.1) {
        playSound();
        nextNoteTime += 60.0 / bpm;
    }
    timerID = setTimeout(scheduler, 25);
}

playBtn.onclick = () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    isPlaying = !isPlaying;
    if (isPlaying) {
        currentBeat = 0; nextNoteTime = audioCtx.currentTime;
        scheduler(); playBtn.innerText = "PARAR"; playBtn.style.background = "#e22134";
    } else {
        clearTimeout(timerID); playBtn.innerText = "INICIAR"; playBtn.style.background = "var(--accent-primary)";
        dots.forEach(d => d.classList.remove('active'));
    }
};

updateBpm(0);
renderSetlist();
</script>
</body>
</html>

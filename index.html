<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro - Full Hybrid Edition</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a25;
  --accent-primary: #1db954;
  --text-primary: #ffffff;
  --border-color: rgba(255, 255, 255, 0.1);
  --glass-bg: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;
}

body.performance-mode {
  --bg-primary: #050000;
  --accent-primary: #ff3e3e;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); transition: 0.4s; overflow-x: hidden; }

/* HEADER VITRO */
.app-header { background: rgba(18,18,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); padding: 15px 20px; position: sticky; top: 0; z-index: 1000; }
.header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

/* DROPDOWN VITRO */
.menu-container { position: relative; }
.dropdown-menu { 
  position: absolute; top: 45px; right: 0; 
  background: rgba(20, 20, 30, 0.8); backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border); border-radius: var(--radius-lg); 
  width: 200px; display: none; flex-direction: column; z-index: 2000;
}
.dropdown-menu.show { display: flex; }
.menu-item { padding: 14px 18px; color: #fff; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; border-bottom: 1px solid var(--glass-border); }

/* LAYOUT HÍBRIDO 3 COLUNAS */
.main-layout { display: grid; grid-template-columns: 260px 1fr 280px; gap: 20px; max-width: 1400px; margin: 0 auto; padding: 20px; }

@media (max-width: 1100px) {
    .main-layout { grid-template-columns: 1fr; }
    .side-panel { order: 2; height: 300px; }
    .metronome-card { order: 3; }
}

/* COMPONENTES LATERAIS */
.side-panel, .metronome-card { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); height: fit-content; }
.panel-header { padding: 12px 15px; border-bottom: 1px solid var(--border-color); font-weight: 800; font-size: 11px; color: var(--accent-primary); text-transform: uppercase; }

/* TOOLBAR CENTRAL (VOLTOU!) */
.toolbar-central { 
    display: flex; gap: 10px; margin-bottom: 20px; background: var(--bg-secondary); 
    padding: 10px; border-radius: 50px; border: 1px solid var(--border-color); 
    width: fit-content; align-items: center;
}
.tool-btn { background: none; border: 1px solid var(--glass-border); color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; cursor: pointer; }
.tool-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

/* SEÇÕES DE MÚSICA (VOLTOU!) */
.section-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
.song-part { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 15px; border-left: 4px solid var(--accent-primary); }
.chord-area { 
    font-family: 'Monaco', monospace; font-size: 18px; font-weight: 700; color: #fff; 
    background: none; border: none; width: 100%; resize: none; outline: none; margin-top: 10px;
}

/* BOTÃO SALVAR VITRO */
.btn-save-vitro {
    position: fixed; bottom: 30px; left: 20px; z-index: 900;
    background: var(--glass-bg); backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border); color: rgba(255,255,255,0.4);
    padding: 12px 20px; border-radius: var(--radius-full); cursor: pointer; font-size: 10px; font-weight: 800;
}

/* MODO PERFORMANCE */
body.performance-mode .app-header, body.performance-mode .side-panel, 
body.performance-mode .metronome-card, body.performance-mode .toolbar-central { display: none !important; }
body.performance-mode .main-layout { grid-template-columns: 1fr; padding: 10% 15%; }
body.performance-mode .chord-area { font-size: 45px; text-align: center; }

.btn-show { position: fixed; bottom: 30px; right: 20px; background: var(--accent-primary); color: #000; padding: 15px 30px; border-radius: 50px; font-weight: 900; border: none; cursor: pointer; z-index: 1001; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-content">
    <h1>MAP MUSIC <span style="color:var(--accent-primary)">PRO</span></h1>
    <div class="menu-container">
        <button onclick="toggleMenu()" style="background:none; border:none; color:#fff; cursor:pointer;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg></button>
        <div id="m-drop" class="dropdown-menu">
            <div class="menu-item" onclick="exportData()">Exportar Backup</div>
            <div class="menu-item" onclick="importData()">Importar Backup</div>
            <div class="menu-item danger" style="color:#ff4d4d" onclick="clearAll()">Limpar Seção</div>
        </div>
    </div>
  </div>
</header>

<div class="main-layout">
  <!-- SETLIST -->
  <aside class="side-panel">
    <div class="panel-header">SETLIST <span id="count" style="float:right">0</span></div>
    <div id="song-list" style="padding:10px; overflow-y:auto; max-height:60vh;"></div>
    <button onclick="addSong()" style="width:100%; padding:15px; background:none; border:none; color:var(--accent-primary); font-weight:900; cursor:pointer; font-size:10px;">+ NOVA MÚSICA</button>
  </aside>

  <!-- EDITOR PRINCIPAL -->
  <main>
    <div class="toolbar-central">
        <span style="font-size:9px; font-weight:900; margin-right:5px; color:var(--accent-primary)">TOM</span>
        <button class="tool-btn" onclick="transpose(-1)">-</button>
        <button class="tool-btn" onclick="transpose(1)">+</button>
        <div style="width:1px; height:15px; background:var(--border-color); margin:0 10px;"></div>
        <span style="font-size:9px; font-weight:900; margin-right:5px; color:var(--accent-primary)">FONTE</span>
        <button class="tool-btn" onclick="resizeFont(-2)">A-</button>
        <button class="tool-btn" onclick="resizeFont(2)">A+</button>
    </div>

    <input type="text" id="song-title" placeholder="Título" style="background:none; border:none; color:#fff; font-size:32px; font-weight:900; margin-bottom:20px; outline:none; width:100%;">

    <div class="section-grid" id="sections-container">
        <!-- As partes da música (Intro, Verso) entram aqui -->
        <div class="song-part">
            <input type="text" value="INTRO" style="background:none; border:none; color:var(--accent-primary); font-weight:900; font-size:11px; outline:none;">
            <textarea class="chord-area" rows="3" placeholder="C G Am F"></textarea>
        </div>
    </div>
    <button onclick="addSection()" style="margin-top:20px; background:none; border:1px dashed var(--border-color); color:var(--text-secondary); padding:15px; width:100%; border-radius:10px; cursor:pointer; font-size:10px; font-weight:800;">+ ADICIONAR SEÇÃO (VERSO/PONTE)</button>
  </main>

  <!-- METRONOMO -->
  <aside class="metronome-card">
    <div class="panel-header">METRÔNOMO</div>
    <div style="padding:40px 20px; text-align:center;">
        <div style="font-size:48px; font-weight:900; color:var(--accent-primary);">120</div>
        <p style="font-size:9px; opacity:0.4; letter-spacing:2px;">BPM</p>
    </div>
  </aside>
</div>

<button class="btn-save-vitro" onclick="save()">Salvar Alterações</button>
<button class="btn-show" onclick="toggleShow()">MODO SHOW</button>

<script>
    function toggleMenu() { document.getElementById('m-drop').classList.toggle('show'); }
    
    function addSection() {
        const container = document.getElementById('sections-container');
        const div = document.createElement('div');
        div.className = 'song-part';
        div.innerHTML = `
            <input type="text" value="NOVA SEÇÃO" style="background:none; border:none; color:var(--accent-primary); font-weight:900; font-size:11px; outline:none;">
            <textarea class="chord-area" rows="3" placeholder="..."></textarea>
        `;
        container.appendChild(div);
    }

    function toggleShow() {
        document.body.classList.toggle('performance-mode');
        const isPerf = document.body.classList.contains('performance-mode');
        document.querySelector('.btn-show').innerText = isPerf ? "SAIR DO SHOW" : "MODO SHOW";
    }

    function resizeFont(val) {
        document.querySelectorAll('.chord-area').forEach(el => {
            let current = parseInt(window.getComputedStyle(el).fontSize);
            el.style.fontSize = (current + val) + 'px';
        });
    }

    // Lógica de Setlist e Save simplificada para o exemplo
    let count = 0;
    function addSong() {
        count++;
        document.getElementById('count').innerText = count;
        const list = document.getElementById('song-list');
        const item = document.createElement('div');
        item.style.cssText = "background:var(--bg-tertiary); padding:10px; border-radius:8px; margin-bottom:5px; font-size:12px; cursor:pointer;";
        item.innerText = "Música " + count;
        list.appendChild(item);
    }
</script>

</body>
</html>

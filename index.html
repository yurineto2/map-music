<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Map Music</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:22px;
    border-bottom:2px solid red;
}

.container{
    padding:20px;
}

button{
    background:red;
    border:none;
    color:white;
    padding:10px 18px;
    margin:5px;
    cursor:pointer;
    border-radius:5px;
    font-size:15px;
}

button:hover{
    background:#cc0000;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:10px;
    border:none;
    border-radius:5px;
    font-size:15px;
}

.music-list{
    margin-top:20px;
}

.music-item{
    background:#111;
    padding:10px;
    margin-bottom:8px;
    border-left:4px solid red;
    cursor:pointer;
}

.music-item:hover{
    background:#1a1a1a;
}

#acordes{
    white-space:pre-line;
    margin-top:20px;
    font-size:18px;
}

/* MODO PALCO */

#stageMode{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    padding:40px;
    overflow:auto;
}

#stageTitle{
    font-size:35px;
    margin-bottom:30px;
}

#stageChords{
    font-size:32px;
    line-height:1.6;
    white-space:pre-line;
}

.stageControls{
    position:fixed;
    bottom:20px;
    right:20px;
}

</style>
</head>

<body>

<header>🎵 Map Music</header>

<div class="container">

<h3>Adicionar Música</h3>

<input id="titulo" placeholder="Nome da música">

<textarea id="acordeInput" rows="6" placeholder="Digite os acordes ou cifra"></textarea>

<button onclick="salvarMusica()">Salvar Música</button>

<hr>

<h3>Minhas Músicas</h3>

<div class="music-list" id="lista"></div>

<hr>

<h3>Música Selecionada</h3>

<div id="tituloMusica"></div>

<div id="acordes"></div>

<br>

<button onclick="abrirPalco()">Modo Palco</button>

</div>

<!-- MODO PALCO -->

<div id="stageMode">

<div id="stageTitle"></div>

<div id="stageChords"></div>

<div class="stageControls">
<button onclick="fecharPalco()">Sair</button>
</div>

</div>

<script>

let musicas = []
let musicaAtual = null

function salvarMusica(){

let titulo = document.getElementById("titulo").value
let acorde = document.getElementById("acordeInput").value

if(titulo == "" || acorde == ""){
alert("Preencha todos os campos")
return
}

let musica = {
titulo:titulo,
acorde:acorde
}

musicas.push(musica)

document.getElementById("titulo").value=""
document.getElementById("acordeInput").value=""

renderLista()

}

function renderLista(){

let lista = document.getElementById("lista")
lista.innerHTML=""

musicas.forEach((m,i)=>{

let div = document.createElement("div")
div.className="music-item"
div.innerText = m.titulo

div.onclick = ()=>{
mostrarMusica(i)
}

lista.appendChild(div)

})

}

function mostrarMusica(index){

musicaAtual = musicas[index]

document.getElementById("tituloMusica").innerText = musicaAtual.titulo
document.getElementById("acordes").innerText = musicaAtual.acorde

}

function abrirPalco(){

if(!musicaAtual){
alert("Selecione uma música")
return
}

document.getElementById("stageMode").style.display="block"

document.getElementById("stageTitle").innerText = musicaAtual.titulo
document.getElementById("stageChords").innerText = musicaAtual.acorde

}

function fecharPalco(){

document.getElementById("stageMode").style.display="none"

}

</script>

</body>
</html>

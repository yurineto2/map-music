<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro - Elite Edition</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a25;
  --accent-primary: #1db954;
  --accent-glow: rgba(29, 185, 84, 0.3);
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --border-color: rgba(255, 255, 255, 0.1);
  --glass-bg: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; transition: 0.4s ease; overflow-x: hidden; }

/* HEADER */
.app-header { background: rgba(18,18,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); padding: 15px 20px; position: sticky; top: 0; z-index: 1000; }
.header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

/* MENU */
.menu-container { position: relative; }
.menu-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 8px; }
.dropdown-menu { 
  position: absolute; top: 45px; right: 0; 
  background: rgba(20, 20, 30, 0.95); backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border); border-radius: var(--radius-lg); 
  width: 220px; display: none; flex-direction: column; z-index: 2000; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}
.dropdown-menu.show { display: flex; }
.menu-item { padding: 14px 18px; color: #fff; font-size: 11px; font-weight: 600; text-transform: uppercase; cursor: pointer; border-bottom: 1px solid var(--glass-border); }
.menu-item:hover { background: rgba(255,255,255,0.05); color: var(--accent-primary); }

/* LAYOUT */
.main-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; padding: 20px; }

.side-panel { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); height: fit-content; min-height: 400px; }
.panel-header { padding: 15px; border-bottom: 1px solid var(--border-color); font-weight: 800; color: var(--accent-primary); display: flex; justify-content: space-between; }
.song-list { padding: 10px; }
.song-item { background: var(--bg-tertiary); padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; }

/* ÁREA DE NOTAS */
.notes-area { background: var(--bg-secondary); border-radius: var(--radius-xl); padding: 20px; border: 1px solid var(--border-color); }
textarea { width: 100%; height: 300px; background: transparent; border: none; color: #fff; font-family: monospace; font-size: 18px; outline: none; resize: none; }

.btn-add { background: var(--accent-primary); color: #000; border: none; padding: 10px 20px; border-radius: var(--radius-full); font-weight: bold; cursor: pointer; margin-bottom: 20px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-content">
    <h1>Map Music <span style="color:var(--accent-primary)">Pro</span></h1>
    <div class="menu-container">
        <button onclick="toggleMenu()" class="menu-btn">☰</button>
        <div id="m-drop" class="dropdown-menu">
            <div class="menu-item" onclick="compartilharSetlist()">📤 Compartilhar Setlist</div>
            <div class="menu-item" onclick="limparTudo()" style="color: #ff4d4d;">⚠️ Apagar Tudo</div>
        </div>
    </div>
  </div>
</header>

<div class="main-layout">
  <aside class="side-panel">
    <div class="panel-header">SETLIST <span id="song-count">0</span></div>
    <div class="song-list" id="lista-musicas">
        <!-- Musicas aparecem aqui -->
    </div>
  </aside>

  <main class="notes-section">
    <button class="btn-add" onclick="novaMusica()">+ Nova Música</button>
    <div class="notes-area">
        <input type="text" id="titulo-atual" placeholder="Título da Música" style="background:transparent; border:none; color:var(--accent-primary); font-size:24px; font-weight:bold; margin-bottom:10px; width:100%; outline:none;">
        <textarea id="texto-musica" placeholder="Cole sua cifra ou anotações aqui..."></textarea>
        <button onclick="salvarMusica()" style="background:var(--accent-primary); border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold;">Salvar Alterações</button>
    </div>
  </main>
</div>

<script>
let setlist = JSON.parse(localStorage.getItem('map_music_data')) || [];
let musicaSelecionadaIdx = null;

// MOSTRAR/ESCONDER MENU
function toggleMenu() {
    document.getElementById('m-drop').classList.toggle('show');
}

// CRIAR NOVA MÚSICA
function novaMusica() {
    const titulo = prompt("Nome da música:");
    if(titulo) {
        setlist.push({ titulo: titulo, conteudo: "" });
        salvarNoStorage();
        renderizarLista();
    }
}

// SALVAR NO NAVEGADOR
function salvarNoStorage() {
    localStorage.setItem('map_music_data', JSON.stringify(setlist));
    document.getElementById('song-count').innerText = setlist.length;
}

// SALVAR TEXTO DA MÚSICA ATUAL
function salvarMusica() {
    if(musicaSelecionadaIdx !== null) {
        setlist[musicaSelecionadaIdx].titulo = document.getElementById('titulo-atual').value;
        setlist[musicaSelecionadaIdx].conteudo = document.getElementById('texto-musica').value;
        salvarNoStorage();
        renderizarLista();
        alert("Salvo com sucesso!");
    }
}

// RENDERIZAR LISTA NA LATERAL
function renderizarLista() {
    const container = document.getElementById('lista-musicas');
    container.innerHTML = "";
    setlist.forEach((musica, index) => {
        const item = document.createElement('div');
        item.className = 'song-item';
        item.innerText = musica.titulo;
        item.onclick = () => carregarMusica(index);
        container.appendChild(item);
    });
    document.getElementById('song-count').innerText = setlist.length;
}

// CARREGAR MÚSICA NA TELA
function carregarMusica(index) {
    musicaSelecionadaIdx = index;
    document.getElementById('titulo-atual').value = setlist[index].titulo;
    document.getElementById('texto-musica').value = setlist[index].conteudo;
}

// --- FUNÇÃO DE COMPARTILHAR (A QUE VOCÊ PEDIU) ---
function compartilharSetlist() {
    if (setlist.length === 0) return alert("Adicione músicas primeiro!");

    // Converte a lista em um código seguro para URL
    const dadosCodificados = btoa(unescape(encodeURIComponent(JSON.stringify(setlist))));
    const link = window.location.origin + window.location.pathname + "?share=" + dadosCodificados;

    if (navigator.share) {
        navigator.share({ title: 'Minha Setlist', url: link });
    } else {
        navigator.clipboard.writeText(link);
        alert("Link de compartilhamento copiado!");
    }
}

// --- LÓGICA DE IMPORTAÇÃO AO ABRIR O LINK ---
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const dadosImportados = urlParams.get('share');

    if (dadosImportados) {
        if (confirm("Você recebeu uma setlist! Deseja substituir a sua por esta?")) {
            try {
                const listaDecodificada = JSON.parse(decodeURIComponent(escape(atob(dadosImportados))));
                setlist = listaDecodificada;
                salvarNoStorage();
                renderizarLista();
                // Limpa a URL para não importar toda vez que der F5
                window.history.replaceState({}, document.title, window.location.pathname);
            } catch (e) {
                alert("Erro ao ler os dados compartilhados.");
            }
        }
    }
    renderizarLista();
};

function limparTudo() {
    if(confirm("Apagar todas as músicas?")) {
        setlist = [];
        salvarNoStorage();
        location.reload();
    }
}
</script>

</body>
</html>

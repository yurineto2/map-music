<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Map Music</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  padding:20px;
}
h1{
  background:#c00000;
  padding:15px;
}
.section{
  margin-top:20px;
}
textarea{
  width:100%;
  height:80px;
  background:#111;
  color:white;
  border:1px solid #c00000;
  padding:10px;
}
button{
  background:#c00000;
  color:white;
  border:none;
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}
select{
  padding:5px;
  margin-left:10px;
}
</style>
</head>
<body>

<h1>Map Music</h1>

<label>Alterar Tom:</label>
<select id="keyShift">
  <option value="0">Original</option>
  <option value="1">+1</option>
  <option value="2">+2</option>
  <option value="-1">-1</option>
  <option value="-2">-2</option>
</select>
<button onclick="transpose()">Aplicar</button>

<div class="section">
<h3>Introdução</h3>
<textarea id="intro"></textarea>
</div>

<div class="section">
<h3>Verso</h3>
<textarea id="verse"></textarea>
</div>

<div class="section">
<h3>Pré-Refrão</h3>
<textarea id="prechorus"></textarea>
</div>

<div class="section">
<h3>Refrão</h3>
<textarea id="chorus"></textarea>
</div>

<div class="section">
<h3>Ponte</h3>
<textarea id="bridge"></textarea>
</div>

<div class="section">
<h3>Final</h3>
<textarea id="ending"></textarea>
</div>

<script>
const sharpNotes = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const flatNotes  = ["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"];

function normalizeNote(note){
  let index = sharpNotes.indexOf(note);
  if(index !== -1) return index;

  index = flatNotes.indexOf(note);
  return index;
}

function transposeChord(chord, shift){
  const match = chord.match(/^([A-G][b#]?)(.*)$/);
  if(!match) return chord;

  const root = match[1];
  const suffix = match[2];

  const index = normalizeNote(root);
  if(index === -1) return chord;

  const newIndex = (index + shift + 12) % 12;

  return sharpNotes[newIndex] + suffix;
}

function transpose(){
  const shift = parseInt(document.getElementById("keyShift").value);
  if(shift === 0) return;

  const areas = ["intro","verse","prechorus","chorus","bridge","ending"];

  areas.forEach(id=>{
    let content = document.getElementById(id).value;
    let words = content.split(/\s+/);
    let transposed = words.map(w=>transposeChord(w, shift));
    document.getElementById(id).value = transposed.join(" ");
  });
}
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro - Professional Edition</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
/* ============================================
   DESIGN SYSTEM - PROFESSIONAL EDITION
   ============================================ */
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a25;
  --bg-elevated: #242433;
  --accent-primary: #1db954;
  --accent-secondary: #1ed760;
  --accent-glow: rgba(29, 185, 84, 0.3);
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --text-muted: #6a6a6a;
  --text-inverse: #000000;
  --border-color: rgba(255, 255, 255, 0.1);
  --radius-md: 8px;
  --radius-xl: 16px;
  --radius-full: 9999px;
  --space-md: 16px;
  --space-lg: 24px;
  --transition-base: 250ms ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  user-select: none;
  overflow-x: hidden;
}

/* HEADER RESPONSIVO */
.app-header {
  background: linear-gradient(180deg, rgba(18,18,26,0.95) 0%, rgba(10,10,15,0.8) 100%);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-color);
  padding: var(--space-md) var(--space-lg);
  position: sticky; top: 0; z-index: 100;
}

.header-content {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
}

.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; color: var(--text-inverse);
}

.logo-text { font-size: 22px; font-weight: 800; }

/* CONTAINER PRINCIPAL */
.app-container { max-width: 1200px; margin: 0 auto; padding: var(--space-lg); }

/* PAINEL DO METRÔNOMO */
.metronome-panel {
  background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
  border: 1px solid var(--border-color);
  border-radius: var(--radius-xl);
  padding: var(--space-lg);
  text-align: center;
  position: relative;
}

.metronome-display {
  display: flex; align-items: center; justify-content: center;
  gap: 30px; margin: 40px 0; flex-wrap: wrap;
}

/* CIRCULO DE BPM */
.bpm-circle-display {
  position: relative; width: 200px; height: 200px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

.bpm-circle-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }

.bpm-value { font-size: 64px; font-weight: 800; color: var(--accent-primary); line-height: 1; }

/* VISUALIZADOR DE BEATS */
.beat-visualizer { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }
.beat-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--bg-elevated); border: 1px solid var(--border-color);
}
.beat-dot.active { background: var(--accent-primary); box-shadow: 0 0 15px var(--accent-primary); transform: scale(1.2); }

/* CONTROLES TOUCH (PC/MOBILE) */
.controls-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
.btn-adjust {
  background: var(--bg-elevated); border: 1px solid var(--border-color);
  color: white; padding: 15px 20px; border-radius: var(--radius-md);
  font-weight: 700; cursor: pointer; min-width: 60px;
}
.btn-adjust:active { background: var(--accent-primary); color: black; }

.btn-play {
  width: 100%; max-width: 350px; padding: 20px;
  border-radius: var(--radius-full); border: none;
  background: var(--accent-primary); color: black;
  font-weight: 800; font-size: 18px; cursor: pointer;
  box-shadow: 0 5px 20px var(--accent-glow);
}

/* RESPONSIVIDADE MOBILE */
@media (max-width: 768px) {
  .metronome-display { flex-direction: column; }
  .bpm-circle-display { width: 180px; height: 180px; }
  .logo-subtitle { display: none; }
  .controls-group { display: grid; grid-template-columns: repeat(4, 1fr); width: 100%; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-content">
    <div class="logo">
      <div class="logo-icon">M</div>
      <div class="logo-text">Map Music Pro</div>
    </div>
  </div>
</header>

<main class="app-container">
  <section class="metronome-panel">
    <div class="metronome-display">
      <div class="bpm-circle-display">
        <svg class="bpm-circle-svg" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="6"/>
          <circle id="progress" cx="50" cy="50" r="45" fill="none" stroke="var(--accent-primary)" 
                  stroke-width="6" stroke-dasharray="283" stroke-dashoffset="283" stroke-linecap="round"/>
        </svg>
        <div class="bpm-value" id="bpm-number">120</div>
        <div style="font-size: 12px; color: var(--text-muted); font-weight: 600; letter-spacing: 2px;">BPM</div>
      </div>
    </div>

    <div class="beat-visualizer" id="dots-container">
      <div class="beat-dot"></div>
      <div class="beat-dot"></div>
      <div class="beat-dot"></div>
      <div class="beat-dot"></div>
    </div>

    <div class="controls-group">
      <button class="btn-adjust" onclick="updateBpm(-5)">-5</button>
      <button class="btn-adjust" onclick="updateBpm(-1)">-</button>
      <button class="btn-adjust" onclick="updateBpm(1)">+</button>
      <button class="btn-adjust" onclick="updateBpm(5)">+5</button>
    </div>

    <button class="btn-play" id="play-btn">INICIAR METRÔNOMO</button>
  </section>
</main>

<script>
let bpm = 120;
let isPlaying = false;
let currentBeat = 0;
let nextNoteTime = 0.0;
let timerID = null;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const bpmNumber = document.getElementById('bpm-number');
const playBtn = document.getElementById('play-btn');
const dots = document.querySelectorAll('.beat-dot');
const progress = document.getElementById('progress');

function updateBpm(val) {
    bpm = Math.min(Math.max(bpm + val, 40), 240);
    bpmNumber.innerText = bpm;
    const offset = 283 - ((bpm - 40) / (240 - 40)) * 283;
    progress.style.strokeDashoffset = offset;
}

function playClick() {
    const osc = audioCtx.createOscillator();
    const envelope = audioCtx.createGain();

    osc.frequency.value = currentBeat === 0 ? 1000 : 800;
    envelope.gain.value = 1;
    envelope.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

    osc.connect(envelope);
    envelope.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);

    // Visual
    dots.forEach(d => d.classList.remove('active'));
    dots[currentBeat].classList.add('active');
    currentBeat = (currentBeat + 1) % 4;
}

function scheduler() {
    while (nextNoteTime < audioCtx.currentTime + 0.1) {
        playClick();
        nextNoteTime += 60.0 / bpm;
    }
    timerID = setTimeout(scheduler, 25.0);
}

playBtn.onclick = () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    isPlaying = !isPlaying;
    
    if (isPlaying) {
        currentBeat = 0;
        nextNoteTime = audioCtx.currentTime;
        scheduler();
        playBtn.innerText = "PARAR";
        playBtn.style.background = "#e22134";
    } else {
        clearTimeout(timerID);
        playBtn.innerText = "INICIAR METRÔNOMO";
        playBtn.style.background = "var(--accent-primary)";
        dots.forEach(d => d.classList.remove('active'));
    }
};

updateBpm(0); // Init progress
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Map Music</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  padding:20px;
  #stageMode{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  padding:40px;
  overflow:auto;
  font-size:36px;
}
#stageMode h2{
  color:#c00000;
}
}
h1{
  background:#c00000;
  padding:15px;
}
.section{
  margin-top:20px;
}
textarea{
  width:100%;
  height:80px;
  background:#111;
  color:white;
  border:1px solid #c00000;
  padding:10px;
}
button{
  background:#c00000;
  color:white;
  border:none;
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}
select{
  padding:5px;
  margin-left:10px;
}
</style>
</head>
<body>

<h1>Map Music</h1>

<label>Alterar Tom:</label>
<select id="keyShift">
  <option value="0">Original</option>
  <option value="1">+1</option>
  <option value="2">+2</option>
  <option value="-1">-1</option>
  <option value="-2">-2</option>
</select>
<button onclick="transpose()">Aplicar</button>
  <button onclick="openStageMode()">Modo Palco</button>

<div class="section">
<h3>Introdução</h3>
<textarea id="intro"></textarea>
</div>

<div class="section">
<h3>Verso</h3>
<textarea id="verse"></textarea>
</div>

<div class="section">
<h3>Pré-Refrão</h3>
<textarea id="prechorus"></textarea>
</div>

<div class="section">
<h3>Refrão</h3>
<textarea id="chorus"></textarea>
</div>

<div class="section">
<h3>Ponte</h3>
<textarea id="bridge"></textarea>
</div>

<div class="section">
<h3>Final</h3>
<textarea id="ending"></textarea>
</div>
<div id="stageMode">
  <div style="margin-bottom:20px;">
    <button onclick="startScroll()">Iniciar</button>
    <button onclick="stopScroll()">Parar</button>
    <label>Velocidade:</label>
    <input type="range" id="speedControl" min="1" max="10" value="3">
    <button onclick="closeStageMode()">Fechar</button>
  </div>
  <div id="stageContent"></div>
</div>
<script>
const notes = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const enharmonics = {
  "Db":"C#",
  "Eb":"D#",
  "Gb":"F#",
  "Ab":"G#",
  "Bb":"A#",
  "Cb":"B",
  "Fb":"E"
};

function normalize(note){
  if(enharmonics[note]) return enharmonics[note];
  return note;
}

function transposeChord(chord, shift){
  const match = chord.match(/^([A-G][b#]?)(.*)$/);
  if(!match) return chord;

  let root = normalize(match[1]);
  const suffix = match[2];

  let index = notes.indexOf(root);
  if(index === -1) return chord;

  let newIndex = (index + shift + 12) % 12;

  return notes[newIndex] + suffix;
}

function transpose(){
  const shift = parseInt(document.getElementById("keyShift").value);
  if(shift === 0) return;

  const areas = ["intro","verse","prechorus","chorus","bridge","ending"];

  areas.forEach(id=>{
    let content = document.getElementById(id).value;
    let words = content.split(/\s+/);
    let transposed = words.map(w=>transposeChord(w, shift));
    document.getElementById(id).value = transposed.join(" ");
  });
}
  function openStageMode(){
  let content = `
    <h2>Introdução</h2><p>${intro.value}</p>
    <h2>Verso</h2><p>${verse.value}</p>
    <h2>Pré-Refrão</h2><p>${prechorus.value}</p>
    <h2>Refrão</h2><p>${chorus.value}</p>
    <h2>Ponte</h2><p>${bridge.value}</p>
    <h2>Final</h2><p>${ending.value}</p>
  `;
  document.getElementById("stageContent").innerHTML = content;
  document.getElementById("stageMode").style.display = "block";
}

function closeStageMode(){
  document.getElementById("stageMode").style.display = "none";
}
  let scrollInterval = null;

function startScroll(){
  const speed = document.getElementById("speedControl").value;
  const stage = document.getElementById("stageMode");

  stopScroll();

  scrollInterval = setInterval(()=>{
    stage.scrollTop += speed;
  }, 100);
}

function stopScroll(){
  if(scrollInterval){
    clearInterval(scrollInterval);
    scrollInterval = null;
  }
}
</script>

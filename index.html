<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro - Mobile Edition</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a25;
  --accent-primary: #1db954;
  --accent-glow: rgba(29, 185, 84, 0.3);
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --border-color: rgba(255, 255, 255, 0.1);
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;
  --note-color: #ffffff;
}

body.performance-mode {
  --bg-primary: #050000;
  --accent-primary: #ff3e3e;
  --note-color: #ffee00;
  background: var(--bg-primary);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; padding-bottom: 80px; }

/* HEADER MOBILE */
.app-header { 
    background: rgba(18,18,26,0.95); backdrop-filter: blur(20px); 
    border-bottom: 1px solid var(--border-color); padding: 12px 16px; 
    position: sticky; top: 0; z-index: 100; 
}
.header-content { display: flex; justify-content: space-between; align-items: center; }
.logo-text { font-size: 18px; font-weight: 800; }

/* LAYOUT MOBILE (COLUNA ÚNICA) */
.main-layout { display: flex; flex-direction: column; gap: 16px; padding: 16px; }

/* COMPONENTES MOBILE */
.side-panel { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); overflow: hidden; }
.panel-header { padding: 12px 16px; background: var(--bg-tertiary); font-weight: 800; font-size: 12px; text-transform: uppercase; color: var(--accent-primary); display: flex; justify-content: space-between; }
.song-list { max-height: 200px; overflow-y: auto; padding: 8px; }
.song-item { background: var(--bg-primary); padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }

/* METRÔNOMO COMPACTO */
.metronome-card { background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-color); padding: 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.bpm-val { font-size: 32px; font-weight: 800; color: var(--accent-primary); min-width: 65px; text-align: center; }

/* NOTAS MOBILE */
.section-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
.song-part { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 16px; border-left: 4px solid var(--accent-primary); position: relative; }
.chord-area { font-family: 'Monaco', monospace; font-size: 18px; font-weight: 700; color: var(--note-color); background: none; border: none; width: 100%; resize: none; outline: none; margin-top: 10px; line-height: 1.4; }

/* CONTROLES FLUTUANTES */
.action-bar {
    position: fixed; bottom: 0; left: 0; right: 0; 
    background: rgba(18,18,26,0.98); border-top: 1px solid var(--border-color);
    padding: 12px 16px; display: flex; justify-content: space-around; z-index: 200;
}
.btn-mobile { background: var(--accent-primary); color: #000; border: none; padding: 10px 16px; border-radius: var(--radius-full); font-weight: 800; font-size: 12px; display: flex; align-items: center; gap: 8px; }

/* MODO SHOW MOBILE */
body.performance-mode .app-header, body.performance-mode .side-panel, body.performance-mode .metronome-card, body.performance-mode .action-bar { display: none !important; }
body.performance-mode .main-layout { padding: 80px 20px 150px; }
body.performance-mode .chord-area { font-size: 38px; pointer-events: none; }
body.performance-mode .song-part { border-left-width: 8px; background: transparent; }

/* TELEPROMPTER TOP BAR */
.scroll-controls {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1001;
    display: none; align-items: center; justify-content: space-between;
    background: rgba(0, 0, 0, 0.9); padding: 12px 20px; border-bottom: 2px solid #ff3e3e;
}
body.performance-mode .scroll-controls { display: flex; }

.mode-exit-btn {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #ff3e3e; color: #fff; padding: 14px 40px; border-radius: var(--radius-full);
    font-weight: 900; box-shadow: 0 10px 30px rgba(255, 62, 62, 0.5); display: none; z-index: 1002;
}
body.performance-mode .mode-exit-btn { display: block; }
</style>
</head>
<body id="app-body">

<header class="app-header">
  <div class="header-content">
    <div class="logo-text">Map Music <span style="color:var(--accent-primary)">Pro</span></div>
    <button onclick="saveSong()" style="background:var(--accent-primary); border:none; padding: 6px 12px; border-radius: 8px; font-weight:800; font-size:10px;">SALVAR</button>
  </div>
</header>

<div class="main-layout">
  <!-- SETLIST COMPACTA -->
  <aside class="side-panel">
    <div class="panel-header">SETLIST <span id="song-count">0</span></div>
    <div class="song-list" id="song-list"></div>
  </aside>

  <!-- METRÔNOMO HORIZONTAL (TIPO BARRA) -->
  <div class="metronome-card">
    <button onclick="adj(-1)" style="width:40px; height:40px; border-radius:50%; background:var(--bg-tertiary); color:#fff; border:none; font-size:20px;">-</button>
    <div style="text-align: center;">
        <div class="bpm-val" id="bpm-display">120</div>
        <div style="font-size: 8px; font-weight: 800; opacity: 0.5;">BPM</div>
    </div>
    <button onclick="adj(1)" style="width:40px; height:40px; border-radius:50%; background:var(--bg-tertiary); color:#fff; border:none; font-size:20px;">+</button>
    <button onclick="togglePlay()" id="play-btn" style="background:var(--accent-primary); border:none; padding: 10px 20px; border-radius: 20px; font-weight:800; font-size:12px;">PLAY</button>
  </div>

  <!-- NOTAS -->
  <main class="notes-section">
    <div class="section-grid" id="notes-grid"></div>
  </main>
</div>

<!-- BARRA DE AÇÕES MOBILE -->
<div class="action-bar">
    <button onclick="addPart()" class="btn-mobile" style="background:var(--bg-tertiary); color:#fff; border:1px solid var(--border-color);">+ PARTE</button>
    <button onclick="togglePerf()" class="btn-mobile">MODO SHOW</button>
</div>

<!-- CONTROLES MODO SHOW -->
<div class="scroll-controls">
    <span style="color:#ff3e3e; font-size:10px;">VELOCIDADE</span>
    <input type="range" id="scroll-speed" min="0" max="100" value="0" style="flex-grow:1; margin: 0 15px; accent-color:#ff3e3e;">
    <button onclick="stopScroll()" style="background:none; border:none; color:#fff; font-size:10px; font-weight:800;">STOP</button>
</div>

<button class="mode-exit-btn" onclick="togglePerf()">SAIR DO SHOW</button>

<script>
let bpm = 120;
let isPlaying = false;
let nextNoteTime = 0.0;
let timerID = null;
let scrollInterval = null;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let songs = JSON.parse(localStorage.getItem('map_pro_mobile_v1')) || [];

// --- AUTO SCROLL ---
const scrollSlider = document.getElementById('scroll-speed');
scrollSlider.addEventListener('input', () => {
    clearInterval(scrollInterval);
    const speed = parseInt(scrollSlider.value);
    if (speed > 0) {
        scrollInterval = setInterval(() => window.scrollBy(0, 1), 150 - speed);
    }
});
function stopScroll() { clearInterval(scrollInterval); scrollSlider.value = 0; }

// --- METRONOME ---
function playClick() {
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.frequency.value = 1000;
    env.gain.value = 0.8;
    env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    osc.connect(env); env.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.08);
}
function scheduler() {
    while (nextNoteTime < audioCtx.currentTime + 0.1) {
        playClick();
        nextNoteTime += 60.0 / bpm;
    }
    timerID = setTimeout(scheduler, 25);
}
function togglePlay() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    isPlaying = !isPlaying;
    const btn = document.getElementById('play-btn');
    if (isPlaying) { nextNoteTime = audioCtx.currentTime; scheduler(); btn.innerText = "STOP"; btn.style.background = "#ff3e3e"; }
    else { clearTimeout(timerID); btn.innerText = "PLAY"; btn.style.background = "var(--accent-primary)"; }
}
function adj(v) { bpm = Math.min(Math.max(bpm + v, 40), 240); document.getElementById('bpm-display').innerText = bpm; }

// --- CORE ---
function addPart(title = "PARTE", content = "") {
  const div = document.createElement('div');
  div.className = 'song-part';
  div.innerHTML = `
    <input type="text" value="${title}" style="background:none; border:none; color:var(--accent-primary); font-weight:900; font-size:11px; width:100%; outline:none; text-transform:uppercase;">
    <textarea class="chord-area" oninput="this.style.height='';this.style.height=this.scrollHeight+'px'" placeholder="C G Am F">${content}</textarea>
  `;
  document.getElementById('notes-grid').appendChild(div);
  const ta = div.querySelector('textarea'); ta.style.height = ta.scrollHeight + 'px';
}

function saveSong() {
  const name = prompt("Nome da música:");
  if (!name) return;
  const parts = Array.from(document.querySelectorAll('.song-part')).map(p => ({
    title: p.querySelector('input').value,
    content: p.querySelector('textarea').value
  }));
  songs.push({ name, bpm, parts, id: Date.now() });
  localStorage.setItem('map_pro_mobile_v1', JSON.stringify(songs));
  renderSetlist();
}

function renderSetlist() {
  const list = document.getElementById('song-list');
  document.getElementById('song-count').innerText = songs.length;
  list.innerHTML = songs.map(s => `
    <div class="song-item" onclick="loadSong(${s.id})">
      <div style="font-size:13px; font-weight:700;">${s.name}</div>
      <button onclick="deleteSong(${s.id}, event)" style="background:none; border:none; color:red;">✕</button>
    </div>
  `).join('');
}

function loadSong(id) {
  const s = songs.find(x => x.id === id);
  bpm = s.bpm; document.getElementById('bpm-display').innerText = bpm;
  document.getElementById('notes-grid').innerHTML = "";
  s.parts.forEach(p => addPart(p.title, p.content));
}

function deleteSong(id, e) {
  e.stopPropagation();
  songs = songs.filter(s => s.id !== id);
  localStorage.setItem('map_pro_mobile_v1', JSON.stringify(songs));
  renderSetlist();
}

function togglePerf() {
    const isPerf = document.getElementById('app-body').classList.toggle('performance-mode');
    if (!isPerf) { stopScroll(); window.scrollTo(0,0); }
}

renderSetlist();
["INTRO", "VERSO", "REFRÃO"].forEach(p => addPart(p));
</script>
</body>
</html>

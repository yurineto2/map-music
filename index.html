<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Map Music Pro</title>

<style>

:root{
--bg-primary:#0a0a0f;
--bg-secondary:#12121a;
--bg-tertiary:#1a1a25;
--accent-primary:#1db954;
--text-primary:#ffffff;
--border-color:rgba(255,255,255,0.1);
--radius-lg:12px;
--radius-xl:16px;
--radius-full:999px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:var(--bg-primary);
color:var(--text-primary);
}

/* HEADER */

.app-header{
background:rgba(18,18,26,0.95);
padding:15px 20px;
border-bottom:1px solid var(--border-color);
}

.header-content{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1400px;
margin:auto;
}

/* BOTÕES PADRÃO */

button{
background:var(--bg-tertiary);
border:1px solid var(--border-color);
color:white;
padding:10px 18px;
border-radius:30px;
cursor:pointer;
font-weight:700;
font-size:12px;
transition:0.2s;
}

button:hover{
background:var(--accent-primary);
color:black;
}

/* BOTÕES PEQUENOS */

.btn-circle{
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
padding:0;
font-size:16px;
}

/* LAYOUT */

.main-layout{
display:grid;
grid-template-columns:280px 1fr 300px;
gap:20px;
max-width:1400px;
margin:auto;
padding:20px;
}

@media(max-width:1100px){

.main-layout{
grid-template-columns:1fr;
}

}

/* SETLIST */

.side-panel{
background:var(--bg-secondary);
border-radius:var(--radius-xl);
border:1px solid var(--border-color);
max-height:80vh;
overflow:auto;
}

.panel-header{
padding:15px;
border-bottom:1px solid var(--border-color);
font-weight:800;
font-size:13px;
color:var(--accent-primary);
}

.song-item{
background:var(--bg-tertiary);
padding:12px;
margin:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.song-item:hover{
border:1px solid var(--accent-primary);
}

/* TOOLBAR */

.toolbar-central{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tool-group{
display:flex;
align-items:center;
gap:10px;
background:var(--bg-secondary);
padding:8px 18px;
border-radius:50px;
border:1px solid var(--border-color);
}

/* PARTES DA MUSICA */

.section-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:15px;
}

.song-part{
background:var(--bg-secondary);
padding:15px;
border-radius:var(--radius-lg);
border-left:5px solid var(--accent-primary);
position:relative;
}

.song-part input{
background:none;
border:none;
color:var(--accent-primary);
font-weight:900;
width:100%;
margin-bottom:10px;
}

.chord-area{
width:100%;
background:none;
border:none;
color:white;
font-size:18px;
font-family:monospace;
resize:none;
outline:none;
line-height:1.4;
}

/* METRONOMO */

.metronome-card{
background:var(--bg-secondary);
padding:20px;
border-radius:var(--radius-xl);
border:1px solid var(--border-color);
text-align:center;
}

.bpm-val{
font-size:56px;
font-weight:800;
color:var(--accent-primary);
}

.tap-btn{
width:70px;
height:70px;
border-radius:50%;
border:2px solid var(--accent-primary);
background:none;
color:var(--accent-primary);
font-weight:900;
margin:15px 0;
}

/* BOTAO SALVAR */

.btn-save{
position:fixed;
bottom:30px;
left:20px;
background:var(--bg-secondary);
border:1px solid var(--border-color);
}

</style>
</head>

<body>

<header class="app-header">
<div class="header-content">
<h1>Map Music <span style="color:var(--accent-primary)">Pro</span></h1>
</div>
</header>

<div class="main-layout">

<!-- SETLIST -->

<aside class="side-panel">

<div class="panel-header">
Setlist
</div>

<div id="song-list">

<div class="song-item">
<span>Minha Música</span>
<button class="btn-circle">★</button>
</div>

</div>

</aside>

<!-- NOTAS -->

<main>

<div class="toolbar-central">

<div class="tool-group">

<span style="font-size:11px;font-weight:900;color:var(--accent-primary)">
TOM
</span>

<button class="btn-circle">-</button>

<span>0</span>

<button class="btn-circle">+</button>

</div>

<button>+ PARTE</button>

</div>

<div class="section-grid">

<div class="song-part">

<input value="VERSO">

<textarea class="chord-area">
C  G  Am  F
</textarea>

<button class="btn-circle" style="position:absolute;top:10px;right:10px;color:red">
✕
</button>

</div>

</div>

</main>

<!-- METRONOMO -->

<aside>

<div class="metronome-card">

<div class="bpm-val">
120
</div>

<div style="font-size:11px;margin-bottom:10px">
BPM
</div>

<button class="tap-btn">
TAP
</button>

<div style="display:flex;justify-content:center;gap:10px;margin-bottom:15px">

<button class="btn-circle">-</button>

<button class="btn-circle">+</button>

</div>

<button style="width:100%;background:var(--accent-primary);color:black">
INICIAR
</button>

</div>

</aside>

</div>

<button class="btn-save">
Salvar Música
</button>

</body>
</html>

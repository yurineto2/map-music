<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Map Music Pro</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: white; line-height: 1.5; padding: 16px; padding-bottom: 100px; }
button { font-family: inherit; cursor: pointer; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; margin: 4px; touch-action: manipulation; }
input, textarea, select { font-family: inherit; font-size: 16px; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a25; color: white; width: 100%; margin: 4px 0; }
textarea { min-height: 100px; resize: vertical; }
.card { background: #12121a; border: 1px solid #333; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
h2 { font-size: 18px; margin-bottom: 12px; color: #1db954; }
.green { background: #1db954; color: black; font-weight: bold; }
.gray { background: #333; color: white; }
.red { background: #ef4444; color: white; }
.metro { text-align: center; padding: 20px; }
.bpm { font-size: 64px; font-weight: bold; color: #1db954; }
.beats { display: flex; gap: 8px; justify-content: center; margin: 16px 0; }
.beat { width: 16px; height: 16px; border-radius: 50%; background: #333; border: 2px solid #555; }
.beat.on { background: #1db954; border-color: #1db954; box-shadow: 0 0 10px #1db954; }
.beat.accent { width: 20px; height: 20px; background: #22c55e; }
.song-item { background: #1a1a25; padding: 12px; margin: 8px 0; border-radius: 8px; cursor: pointer; position: relative; }
.song-item.active { border: 2px solid #1db954; }
.del { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: #ef4444; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; padding-top: 60px; }
.modal.show { display: block; }
.stage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0f; z-index: 2000; overflow: auto; padding: 20px; padding-bottom: 100px; }
.stage.show { display: block; }
.stage-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #12121a; padding: 16px; display: flex; gap: 8px; border-top: 1px solid #333; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; padding: 12px 24px; border-radius: 8px; display: none; z-index: 3000; }
.toast.show { display: block; }
</style>
</head>
<body>

<div class="toast" id="toast">Mensagem</div>

<!-- METRONOMO -->
<div class="card metro">
  <h2>Metronomo</h2>
  <div class="bpm" id="bpmDisplay">120</div>
  <div style="color: #888; font-size: 12px; margin-bottom: 16px;">BPM</div>
  
  <div class="beats" id="beats">
    <div class="beat accent" data-b="0"></div>
    <div class="beat" data-b="1"></div>
    <div class="beat" data-b="2"></div>
    <div class="beat" data-b="3"></div>
  </div>
  
  <div>
    <button class="gray" onclick="adjBPM(-10)">-10</button>
    <button class="gray" onclick="adjBPM(-1)">-1</button>
    <button class="green" id="playBtn" onclick="toggleMetro()" style="font-size: 20px; padding: 16px 24px;">▶</button>
    <button class="gray" onclick="adjBPM(1)">+1</button>
    <button class="gray" onclick="adjBPM(10)">+10</button>
  </div>
  
  <input type="range" min="40" max="240" value="120" id="bpmSlider" oninput="setBPM(this.value)" style="margin-top: 16px;">
</div>

<!-- BIBLIOTECA -->
<div class="card">
  <h2>Biblioteca</h2>
  <input type="text" id="songName" placeholder="Nome da musica...">
  <div>
    <button class="green" onclick="saveSong()">Salvar</button>
    <button class="gray" onclick="newSong()">Nova</button>
  </div>
  <div id="songList" style="margin-top: 16px;">
    <div style="color: #888; text-align: center; padding: 40px;">Nenhuma musica salva</div>
  </div>
</div>

<!-- CONTROLES -->
<div class="card">
  <h2>Controles</h2>
  <div style="display: flex; gap: 8px; flex-wrap: wrap;">
    <select id="trans" onchange="showTrans()">
      <option value="0">Original</option>
      <option value="1">+1</option>
      <option value="2">+2</option>
      <option value="3">+3</option>
      <option value="4">+4</option>
      <option value="5">+5</option>
      <option value="6">+6</option>
      <option value="-1">-1</option>
      <option value="-2">-2</option>
      <option value="-3">-3</option>
      <option value="-4">-4</option>
      <option value="-5">-5</option>
      <option value="-6">-6</option>
    </select>
    <button class="green" onclick="doTrans()">Aplicar</button>
    <button class="gray" onclick="clearAll()">Limpar</button>
  </div>
  <div style="margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;">
    <button class="green" onclick="expJSON()">JSON</button>
    <button class="green" onclick="expTXT()">TXT</button>
    <button class="green" onclick="share()">Link</button>
    <button class="gray" onclick="showImp()">Importar</button>
    <button class="green" onclick="openStage()">Palco</button>
  </div>
  <div style="margin-top: 12px; text-align: center; padding: 12px; background: #1a1a25; border-radius: 8px;">
    <div style="font-size: 12px; color: #888;">Tom Atual</div>
    <div id="keyDisp" style="font-size: 24px; font-weight: bold; color: #1db954;">Original</div>
  </div>
</div>

<!-- SECOES -->
<div class="card">
  <h2>Secoes</h2>
  
  <div style="margin-bottom: 12px;">
    <div style="font-size: 12px; color: #888; margin-bottom: 4px;">INTRO</div>
    <textarea id="intro" placeholder="C G Am F..."></textarea>
  </div>
  
  <div style="margin-bottom: 12px;">
    <div style="font-size: 12px; color: #888; margin-bottom: 4px;">VERSO</div>
    <textarea id="verse" placeholder="C G Am F..."></textarea>
  </div>
  
  <div style="margin-bottom: 12px;">
    <div style="font-size: 12px; color: #888; margin-bottom: 4px;">PRE-REFRAO</div>
    <textarea id="prechorus" placeholder="Am F C G..."></textarea>
  </div>
  
  <div style="margin-bottom: 12px;">
    <div style="font-size: 12px; color: #888; margin-bottom: 4px;">REFRAO</div>
    <textarea id="chorus" placeholder="F G Am C..."></textarea>
  </div>
  
  <div style="margin-bottom: 12px;">
    <div style="font-size: 12px; color: #888; margin-bottom: 4px;">PONTE</div>
    <textarea id="bridge" placeholder="Dm G C..."></textarea>
  </div>
  
  <div>
    <div style="font-size: 12px; color: #888; margin-bottom: 4px;">FINAL</div>
    <textarea id="ending" placeholder="C..."></textarea>
  </div>
</div>

<!-- MODAL IMPORT -->
<div class="modal" id="impModal">
  <button class="red" onclick="hideImp()" style="position: absolute; top: 16px; right: 16px;">✕</button>
  <h2>Importar</h2>
  <textarea id="impText" placeholder='{"name":"Musica","sections":{"intro":"C G"}}' style="min-height: 200px; margin: 16px 0;"></textarea>
  <button class="green" onclick="doImp()" style="width: 100%;">Importar</button>
</div>

<!-- MODO PALCO -->
<div class="stage" id="stage">
  <div class="stage-bar">
    <button class="green" onclick="startScroll()">▶</button>
    <button class="gray" onclick="stopScroll()">⏸</button>
    <input type="range" min="1" max="10" value="3" id="speed" style="width: 100px;">
    <button class="red" onclick="closeStage()">✕</button>
  </div>
  <div id="stageContent" style="padding-bottom: 100px;"></div>
  <div id="prog" style="position: fixed; bottom: 0; left: 0; height: 3px; background: #1db954; width: 0%;"></div>
</div>

<script>
// ============== VARIAVEIS ==============
var songs = [];
var curId = null;
var bpm = 120;
var playing = false;
var audioCtx = null;
var nextT = 0;
var beatN = 0;
var tim = null;
var scrollT = null;
var transV = 0;
var undo = [];

var NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// ============== UTIL ==============
function show(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ============== METRONOMO ==============
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function toggleMetro() {
  initAudio();
  if (playing) {
    stopMetro();
  } else {
    startMetro();
  }
}

function startMetro() {
  playing = true;
  nextT = audioCtx.currentTime + 0.1;
  beatN = 0;
  document.getElementById('playBtn').textContent = '⏸';
  sched();
  show('Metronomo: ' + bpm + ' BPM');
}

function stopMetro() {
  playing = false;
  clearTimeout(tim);
  document.getElementById('playBtn').textContent = '▶';
  document.querySelectorAll('.beat').forEach(function(b) {
    b.classList.remove('on');
  });
}

function sched() {
  if (!playing) return;
  while (nextT < audioCtx.currentTime + 0.1) {
    playNote(beatN, nextT);
    nextT += 60 / bpm;
    beatN = (beatN + 1) % 4;
  }
  tim = setTimeout(sched, 25);
}

function playNote(n, t) {
  try {
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.frequency.value = n === 0 ? 1000 : 800;
    osc.type = 'sine';
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.05);
    
    var d = Math.max(0, (t - audioCtx.currentTime) * 1000);
    setTimeout(function() {
      document.querySelectorAll('.beat').forEach(function(b) {
        b.classList.remove('on');
      });
      document.querySelector('.beat[data-b="' + n + '"]').classList.add('on');
    }, d);
  } catch(e) {}
}

function setBPM(v) {
  bpm = parseInt(v);
  document.getElementById('bpmDisplay').textContent = bpm;
  document.getElementById('bpmSlider').value = bpm;
}

function adjBPM(d) {
  var n = bpm + d;
  if (n >= 40 && n <= 240) setBPM(n);
}

// ============== BIBLIOTECA ==============
function loadSongs() {
  try {
    var s = localStorage.getItem('songs');
    if (s) {
      songs = JSON.parse(s);
      renderSongs();
    }
  } catch(e) {
    songs = [];
  }
}

function renderSongs() {
  var list = document.getElementById('songList');
  if (songs.length === 0) {
    list.innerHTML = '<div style="color:#888;text-align:center;padding:40px;">Nenhuma musica salva</div>';
    return;
  }
  
  list.innerHTML = '';
  for (var i = 0; i < songs.length; i++) {
    var s = songs[i];
    var act = s.id === curId ? 'active' : '';
    var div = document.createElement('div');
    div.className = 'song-item ' + act;
    div.onclick = (function(id) {
      return function() { loadSong(id); };
    })(s.id);
    
    var name = document.createElement('div');
    name.textContent = s.name;
    name.style.fontWeight = 'bold';
    name.style.marginBottom = '4px';
    
    var date = document.createElement('div');
    date.textContent = new Date(s.date).toLocaleDateString('pt-BR');
    date.style.fontSize = '12px';
    date.style.color = '#888';
    
    var del = document.createElement('button');
    del.className = 'del';
    del.textContent = '×';
    del.onclick = (function(id) {
      return function(e) {
        e.stopPropagation();
        delSong(id);
      };
    })(s.id);
    
    div.appendChild(name);
    div.appendChild(date);
    div.appendChild(del);
    list.appendChild(div);
  }
}

function saveSong() {
  var name = document.getElementById('songName').value.trim();
  if (!name) {
    show('Digite um nome');
    return;
  }
  
  var song = {
    id: curId || Date.now().toString(),
    name: name,
    date: new Date().toISOString(),
    intro: document.getElementById('intro').value,
    verse: document.getElementById('verse').value,
    prechorus: document.getElementById('prechorus').value,
    chorus: document.getElementById('chorus').value,
    bridge: document.getElementById('bridge').value,
    ending: document.getElementById('ending').value,
    trans: transV
  };
  
  var found = false;
  for (var i = 0; i < songs.length; i++) {
    if (songs[i].id === song.id) {
      songs[i] = song;
      found = true;
      break;
    }
  }
  
  if (!found) {
    songs.push(song);
    curId = song.id;
  }
  
  localStorage.setItem('songs', JSON.stringify(songs));
  renderSongs();
  show('Salvo!');
}

function loadSong(id) {
  saveUndo();
  for (var i = 0; i < songs.length; i++) {
    if (songs[i].id === id) {
      var s = songs[i];
      curId = s.id;
      document.getElementById('songName').value = s.name;
      document.getElementById('intro').value = s.intro || '';
      document.getElementById('verse').value = s.verse || '';
      document.getElementById('prechorus').value = s.prechorus || '';
      document.getElementById('chorus').value = s.chorus || '';
      document.getElementById('bridge').value = s.bridge || '';
      document.getElementById('ending').value = s.ending || '';
      transV = s.trans || 0;
      document.getElementById('trans').value = transV;
      showTrans();
      renderSongs();
      show('Carregado: ' + s.name);
      
      if (window.innerWidth < 768) {
        window.scrollTo(0, 0);
      }
      return;
    }
  }
}

function delSong(id) {
  if (!confirm('Excluir?')) return;
  var newSongs = [];
  for (var i = 0; i < songs.length; i++) {
    if (songs[i].id !== id) {
      newSongs.push(songs[i]);
    }
  }
  songs = newSongs;
  if (curId === id) {
    curId = null;
    newSong(false);
  }
  localStorage.setItem('songs', JSON.stringify(songs));
  renderSongs();
  show('Excluido');
}

function newSong(ask) {
  if (ask !== false && document.getElementById('intro').value) {
    if (!confirm('Descartar?')) return;
  }
  saveUndo();
  curId = null;
  document.getElementById('songName').value = '';
  document.getElementById('intro').value = '';
  document.getElementById('verse').value = '';
  document.getElementById('prechorus').value = '';
  document.getElementById('chorus').value = '';
  document.getElementById('bridge').value = '';
  document.getElementById('ending').value = '';
  transV = 0;
  document.getElementById('trans').value = 0;
  showTrans();
  renderSongs();
}

// ============== TRANSPOSICAO ==============
function showTrans() {
  var v = parseInt(document.getElementById('trans').value);
  var d = document.getElementById('keyDisp');
  if (v === 0) {
    d.textContent = 'Original';
    d.style.color = '#888';
  } else {
    d.textContent = (v > 0 ? '+' : '') + v;
    d.style.color = '#1db954';
  }
}

function doTrans() {
  var shift = parseInt(document.getElementById('trans').value);
  if (shift === 0) {
    show('Selecione valor');
    return;
  }
  
  saveUndo();
  transV = shift;
  
  var ids = ['intro', 'verse', 'prechorus', 'chorus', 'bridge', 'ending'];
  for (var i = 0; i < ids.length; i++) {
    var el = document.getElementById(ids[i]);
    if (!el.value.trim()) continue;
    
    var lines = el.value.split('\n');
    var newLines = [];
    for (var j = 0; j < lines.length; j++) {
      var line = lines[j];
      var spaces = '';
      while (line.length > 0 && line.charAt(0) === ' ') {
        spaces += ' ';
        line = line.substring(1);
      }
      
      var parts = line.split(' ');
      var newParts = [];
      for (var k = 0; k < parts.length; k++) {
        if (parts[k]) {
          newParts.push(transChord(parts[k], shift));
        } else {
          newParts.push('');
        }
      }
      newLines.push(spaces + newParts.join(' '));
    }
    el.value = newLines.join('\n');
  }
  
  showTrans();
  show('Transposto ' + (shift > 0 ? '+' : '') + shift);
}

function transChord(chord, shift) {
  if (chord.indexOf('/') >= 0) {
    var parts = chord.split('/');
    return transNote(parts[0], shift) + '/' + transNote(parts[1], shift);
  }
  return transNote(chord, shift);
}

function transNote(note, shift) {
  var n = note.charAt(0).toUpperCase();
  var rest = note.substring(1);
  
  if (rest && (rest.charAt(0) === '#' || rest.charAt(0) === 'b')) {
    n += rest.charAt(0);
    rest = rest.substring(1);
  }
  
  var enh = {Db:'C#', Eb:'D#', Gb:'F#', Ab:'G#', Bb:'A#', Cb:'B', Fb:'E', E#:'F', B#:'C'};
  if (enh[n]) n = enh[n];
  
  var idx = -1;
  for (var i = 0; i < NOTES.length; i++) {
    if (NOTES[i] === n) {
      idx = i;
      break;
    }
  }
  
  if (idx < 0) return note;
  
  var newIdx = idx + shift;
  while (newIdx < 0) newIdx += 12;
  while (newIdx >= 12) newIdx -= 12;
  
  return NOTES[newIdx] + rest;
}

function clearAll() {
  if (!confirm('Limpar tudo?')) return;
  saveUndo();
  document.getElementById('intro').value = '';
  document.getElementById('verse').value = '';
  document.getElementById('prechorus').value = '';
  document.getElementById('chorus').value = '';
  document.getElementById('bridge').value = '';
  document.getElementById('ending').value = '';
  document.getElementById('trans').value = 0;
  transV = 0;
  showTrans();
  show('Limpo');
}

// ============== EXPORTAR ==============
function expJSON() {
  var data = {
    name: document.getElementById('songName').value || 'musica',
    date: new Date().toISOString(),
    sections: {
      intro: document.getElementById('intro').value,
      verse: document.getElementById('verse').value,
      prechorus: document.getElementById('prechorus').value,
      chorus: document.getElementById('chorus').value,
      bridge: document.getElementById('bridge').value,
      ending: document.getElementById('ending').value
    },
    trans: transV
  };
  
  var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = data.name.replace(/\s+/g, '_') + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  show('JSON exportado');
}

function expTXT() {
  var name = document.getElementById('songName').value || 'musica';
  var txt = name + '\n' + '='.repeat(name.length) + '\n\n';
  txt += 'Tom: ' + (transV === 0 ? 'Original' : (transV > 0 ? '+' : '') + transV) + '\n\n';
  
  var secs = {
    'INTRODUCAO': document.getElementById('intro').value,
    'VERSO': document.getElementById('verse').value,
    'PRE-REFRAO': document.getElementById('prechorus').value,
    'REFRAO': document.getElementById('chorus').value,
    'PONTE': document.getElementById('bridge').value,
    'FINAL': document.getElementById('ending').value
  };
  
  for (var t in secs) {
    if (secs[t].trim()) {
      txt += '[' + t + ']\n' + secs[t] + '\n\n';
    }
  }
  
  var blob = new Blob([txt], {type: 'text/plain'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = name.replace(/\s+/g, '_') + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  show('TXT exportado');
}

function share() {
  var data = {
    n: document.getElementById('songName').value || 'musica',
    i: document.getElementById('intro').value,
    v: document.getElementById('verse').value,
    p: document.getElementById('prechorus').value,
    c: document.getElementById('chorus').value,
    b: document.getElementById('bridge').value,
    e: document.getElementById('ending').value,
    t: transV
  };
  
  try {
    var json = JSON.stringify(data);
    var comp = btoa(encodeURIComponent(json).replace(/%([0-9A-F]{2})/g, function(m, p1) {
      return String.fromCharCode('0x' + p1);
    }));
    var url = location.origin + location.pathname + '?d=' + comp;
    
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(function() {
        show('Link copiado!');
      }, function() {
        prompt('Copie:', url);
      });
    } else {
      prompt('Copie:', url);
    }
  } catch(e) {
    show('Erro ao gerar link');
  }
}

// ============== IMPORTAR ==============
function showImp() {
  document.getElementById('impModal').classList.add('show');
}

function hideImp() {
  document.getElementById('impModal').classList.remove('show');
}

function doImp() {
  var text = document.getElementById('impText').value.trim();
  if (!text) {
    show('Cole algo primeiro');
    return;
  }
  
  saveUndo();
  
  // Tentar JSON
  try {
    var data = JSON.parse(text);
    if (data.sections) {
      document.getElementById('songName').value = data.name || 'importada';
      for (var key in data.sections) {
        var el = document.getElementById(key);
        if (el) el.value = data.sections[key] || '';
      }
      transV = data.trans || 0;
      document.getElementById('trans').value = transV;
      showTrans();
      hideImp();
      show('JSON importado');
      return;
    }
  } catch(e) {}
  
  // Texto
  var lines = text.split('\n');
  var cur = null;
  var cont = [];
  
  var ids = ['intro', 'verse', 'prechorus', 'chorus', 'bridge', 'ending'];
  for (var i = 0; i < ids.length; i++) {
    document.getElementById(ids[i]).value = '';
  }
  
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    
    var m = line.match(/^\[(.+)\]$/i);
    if (m) {
      if (cur && cont.length) {
        document.getElementById(cur).value = cont.join('\n');
      }
      
      var n = m[1].toUpperCase();
      var map = {
        'INTRODUCAO':'intro', 'INTRO':'intro', 'INT':'intro',
        'VERSO':'verse', 'VRS':'verse', 'VERSE':'verse',
        'PRE-REFRAO':'prechorus', 'PRE':'prechorus', 'PRECHORUS':'prechorus',
        'REFRAO':'chorus', 'REF':'chorus', 'CHORUS':'chorus',
        'PONTE':'bridge', 'PON':'bridge', 'BRIDGE':'bridge',
        'FINAL':'ending', 'END':'ending', 'OUTRO':'ending'
      };
      cur = map[n];
      cont = [];
    } else if (cur) {
      cont.push(line);
    } else if (!document.getElementById('songName').value && line.charAt(0) !== '=' && !line.startsWith('Tom:')) {
      document.getElementById('songName').value = line;
    }
  }
  
  if (cur && cont.length) {
    document.getElementById(cur).value = cont.join('\n');
  }
  
  hideImp();
  show('Importado');
}

function loadURL() {
  var p = new URLSearchParams(location.search);
  var d = p.get('d');
  if (!d) return;
  
  try {
    var dec = decodeURIComponent(d.split('').map(function(c) {
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    
    var s = JSON.parse(dec);
    document.getElementById('songName').value = s.n || '';
    document.getElementById('intro').value = s.i || '';
    document.getElementById('verse').value = s.v || '';
    document.getElementById('prechorus').value = s.p || '';
    document.getElementById('chorus').value = s.c || '';
    document.getElementById('bridge').value = s.b || '';
    document.getElementById('ending').value = s.e || '';
    transV = s.t || 0;
    document.getElementById('trans').value = transV;
    showTrans();
    show('Carregado da URL');
  } catch(e) {
    console.error('Erro URL:', e);
  }
}

// ============== MODO PALCO ==============
function openStage() {
  var html = '';
  var map = {
    'Introducao': 'intro',
    'Verso': 'verse',
    'Pre-Refrão': 'prechorus',
    'Refrão': 'chorus',
    'Ponte': 'bridge',
    'Final': 'ending'
  };
  
  for (var t in map) {
    var v = document.getElementById(map[t]).value.trim();
    if (v) {
      html += '<div style="margin-bottom: 40px;">' +
        '<div style="color: #1db954; font-size: 20px; margin-bottom: 12px; text-transform: uppercase; border-bottom: 3px solid #1db954; padding-bottom: 8px;">' + t + '</div>' +
        '<div style="font-family: monospace; white-space: pre-wrap; font-size: 24px; line-height: 1.8;">' + esc(v) + '</div>' +
        '</div>';
    }
  }
  
  if (!html) {
    html = '<div style="color: #888; text-align: center; padding: 40px;">Sem conteudo</div>';
  }
  
  document.getElementById('stageContent').innerHTML = html;
  document.getElementById('stage').classList.add('show');
}

function closeStage() {
  stopScroll();
  document.getElementById('stage').classList.remove('show');
}

function startScroll() {
  stopScroll();
  var st = document.getElementById('stage');
  var sp = parseInt(document.getElementById('speed').value);
  var px = 0.5 + (sp * 0.5);
  
  function scroll() {
    if (st.scrollTop + st.clientHeight >= st.scrollHeight - 10) {
      stopScroll();
      return;
    }
    st.scrollTop += px;
    
    var max = st.scrollHeight - st.clientHeight;
    var pct = (st.scrollTop / max) * 100;
    document.getElementById('prog').style.width = Math.min(100, pct) + '%';
    
    scrollT = requestAnimationFrame(scroll);
  }
  
  scrollT = requestAnimationFrame(scroll);
}

function stopScroll() {
  if (scrollT) {
    cancelAnimationFrame(scrollT);
    scrollT = null;
  }
}

// ============== UNDO ==============
function saveUndo() {
  var st = {
    name: document.getElementById('songName').value,
    intro: document.getElementById('intro').value,
    verse: document.getElementById('verse').value,
    prechorus: document.getElementById('prechorus').value,
    chorus: document.getElementById('chorus').value,
    bridge: document.getElementById('bridge').value,
    ending: document.getElementById('ending').value,
    trans: transV
  };
  undo.push(st);
  if (undo.length > 10) undo.shift();
}

function doUndo() {
  if (undo.length === 0) {
    show('Nada para desfazer');
    return;
  }
  var st = undo.pop();
  document.getElementById('songName').value = st.name;
  document.getElementById('intro').value = st.intro;
  document.getElementById('verse').value = st.verse;
  document.getElementById('prechorus').value = st.prechorus;
  document.getElementById('chorus').value = st.chorus;
  document.getElementById('bridge').value = st.bridge;
  document.getElementById('ending').value = st.ending;
  transV = st.trans;
  document.getElementById('trans').value = transV;
  showTrans();
  show('Desfeito');
}

// ============== INICIALIZAR ==============
window.onload = function() {
  loadSongs();
  setTimeout(loadURL, 100);
  
  // Atalhos
  document.onkeydown = function(e) {
    if (e.key === 'Escape') {
      closeStage();
      hideImp();
    }
    if (e.ctrlKey && e.key === 'z') {
      e.preventDefault();
      doUndo();
    }
  };
  
  // Prevenir zoom duplo iOS
  var last = 0;
  document.ontouchend = function(e) {
    var now = Date.now();
    if (now - last <= 300) e.preventDefault();
    last = now;
  };
};
</script>
